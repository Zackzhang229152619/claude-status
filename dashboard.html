-scope {\n  font-size: clamp(14px, 1.3vw, 18px);\n  font-weight: 600;\n  color: var(--fg);\n}\n.tok-hit {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--c-done);\n  letter-spacing: 0.08em;\n  padding: 3px 8px;\n  border-radius: 999px;\n  background: oklch(0.30 0.08 150 / 0.18);\n  border: 1px solid oklch(0.60 0.10 150 / 0.30);\n}\n.tok-stats {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: clamp(10px, 1vw, 16px);\n  align-items: end;\n}\n.tok-stat { display: flex; flex-direction: column; gap: 4px; }\n.tok-num {\n  font-family: var(--font-mono);\n  font-size: clamp(24px, 2.6vw, 38px);\n  font-weight: 600;\n  line-height: 1;\n  letter-spacing: -0.01em;\n  white-space: nowrap;\n}\n.tok-in  { color: var(--fg); text-shadow: 0 0 20px oklch(0.80 0.10 240 / 0.5); }\n.tok-out { color: var(--c-working); text-shadow: 0 0 20px oklch(0.80 0.16 70 / 0.5); }\n.tok-cap {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--fg-4);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\n\n/* ============================================================\n   needConfirm — red glass plate rises from below\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  display: flex; align-items: center; justify-content: center;\n  opacity: 0;\n  pointer-events: none;\n  transition: opacity 0.6s;\n  background:\n    radial-gradient(ellipse at 50% 50%,\n      oklch(0.35 0.20 25 / 0.55) 0%,\n      oklch(0.10 0.08 25 / 0.85) 70%);\n  backdrop-filter: blur(40px) saturate(150%);\n  perspective: 1200px;\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n\n.confirm-plate {\n  position: relative;\n  padding: clamp(40px, 5vw, 80px) clamp(60px, 8vw, 140px);\n  border-radius: 40px;\n  background: oklch(0.32 0.10 25 / 0.55);\n  backdrop-filter: blur(30px) saturate(180%);\n  box-shadow:\n    0 40px 100px -10px oklch(0.20 0.20 25 / 0.7),\n    0 12px 30px -6px rgba(0,0,0,0.5),\n    inset 0 1px 0 oklch(1 0 0 / 0.20),\n    inset 0 -1px 0 oklch(0 0 0 / 0.30),\n    inset 0 0 0 1px oklch(0.65 0.20 25 / 0.40);\n  text-align: center;\n  transform: translateY(60px) scale(0.92);\n  opacity: 0;\n  animation: plate-rise 0.7s cubic-bezier(0.18, 1, 0.32, 1) 0.1s forwards;\n}\n#confirm.visible .confirm-plate { /* re-trigger via class */ }\n@keyframes plate-rise {\n  to { transform: none; opacity: 1; }\n}\n.confirm-plate::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  background: linear-gradient(160deg, oklch(1 0 0 / 0.15) 0%, transparent 40%);\n  pointer-events: none;\n}\n\n.confirm-eyebrow {\n  display: inline-flex; align-items: center; gap: 12px;\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1.1vw, 14px);\n  letter-spacing: 0.4em;\n  color: oklch(0.96 0.05 25);\n  padding: 8px 20px;\n  border-radius: 999px;\n  background: oklch(0.25 0.10 25 / 0.6);\n  border: 1px solid oklch(0.70 0.20 25 / 0.5);\n  margin-bottom: clamp(20px, 3vw, 36px);\n  text-transform: uppercase;\n}\n.confirm-text {\n  font-size: clamp(80px, 13vw, 220px);\n  font-weight: 800;\n  color: oklch(0.97 0.04 25);\n  letter-spacing: -0.04em;\n  line-height: 1.0;\n  text-shadow:\n    0 4px 30px oklch(0.70 0.22 25 / 0.7),\n    0 0 80px oklch(0.70 0.22 25 / 0.4);\n  margin-bottom: clamp(20px, 2.4vw, 32px);\n}\n.confirm-list {\n  display: flex; flex-direction: column; gap: 10px; align-items: center;\n}\n.confirm-row {\n  display: inline-flex; align-items: baseline; gap: 16px;\n  padding: 10px 22px;\n  border-radius: 999px;\n  background: oklch(0.25 0.06 25 / 0.55);\n  border: 1px solid oklch(0.70 0.20 25 / 0.45);\n  backdrop-filter: blur(16px);\n  box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.12);\n  animation: none;\n}\n@keyframes row-in {\n  from { opacity: 0; transform: translateY(10px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-size: clamp(20px, 2.2vw, 28px);\n  font-weight: 600;\n  color: oklch(0.97 0.04 25);\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: oklch(0.85 0.08 25);\n  letter-spacing: 0.05em;\n}\n\n.confirm-clock {\n  position: absolute;\n  top: clamp(20px, 2.6vw, 36px);\n  right: clamp(24px, 2.8vw, 40px);\n  font-family: var(--font-mono);\n  font-size: clamp(16px, 1.5vw, 22px);\n  font-weight: 500;\n  color: oklch(0.88 0.08 25);\n  letter-spacing: 0.02em;\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: oklch(0.10 0.04 270 / 0.90);\n  backdrop-filter: blur(30px);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 14px;\n  z-index: 80;\n}\n.err-title {\n  font-size: clamp(20px, 2.2vw, 30px);\n  font-weight: 600;\n  color: var(--c-confirm);\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n}\n\u003c/style>\n\u003c/head>\n<body data-state=\"idle\">\n\n<div class=\"scene\">\u003c/div>\n<div class=\"motes\" id=\"motes\">\u003c/div>\n<div class=\"state-tint\">\u003c/div>\n\n<div id=\"stage\">\n  <header class=\"top\">\n    <div class=\"pill glass\">\n      <span id=\"g-dot\" class=\"dot dot-idle\">\u003c/span>\n      <span class=\"label\" id=\"g-label\">IDLE\u003c/span>\n    \u003c/div>\n    <div class=\"pill glass\">\n      <span class=\"summary\" id=\"g-summary\" style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">无活动 session\u003c/span>\n    \u003c/div>\n    <div class=\"pill glass clock-pill\">\n      <span class=\"time\" id=\"clock\"><span>00\u003c/span><span class=\"colon\">:\u003c/span><span>00\u003c/span>\u003c/span>\n      <span class=\"date\" id=\"date\">— —\u003c/span>\n    \u003c/div>\n  \u003c/header>\n\n  <main class=\"body\">\n    <section class=\"sessions-col\">\n      <div class=\"s-head\">\n        <span class=\"s-title\">Sessions\u003c/span>\n        <span class=\"s-count\"><span id=\"sess-count\">0\u003c/span> ACTIVE\u003c/span>\n      \u003c/div>\n      <div class=\"glass sessions-shelf\">\n        <div class=\"sessions-list\" id=\"sessions\">\n          <div class=\"placeholder\">awaiting signal\u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    <aside class=\"token-col\">\n      <div class=\"s-head\">\n        <span class=\"s-title\">Tokens\u003c/span>\n        <span class=\"s-count\" id=\"tok-updated\">— —\u003c/span>\n      \u003c/div>\n      <div class=\"token-shelf\">\n        <div class=\"tok-card\">\n          <div class=\"tok-h\"><span class=\"tok-scope\">今日\u003c/span><span class=\"tok-hit\" id=\"hit-today\">缓存 —\u003c/span>\u003c/div>\n          <div class=\"tok-stats\">\n            <div class=\"tok-stat\"><span class=\"tok-num tok-in\"  id=\"t-today-in\">—\u003c/span><span class=\"tok-cap\">输入\u003c/span>\u003c/div>\n            <div class=\"tok-stat\"><span class=\"tok-num tok-out\" id=\"t-today-out\">—\u003c/span><span class=\"tok-cap\">输出\u003c/span>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        <div class=\"tok-card\">\n          <div class=\"tok-h\"><span class=\"tok-scope\">本月\u003c/span><span class=\"tok-hit\" id=\"hit-month\">缓存 —\u003c/span>\u003c/div>\n          <div class=\"tok-stats\">\n            <div class=\"tok-stat\"><span class=\"tok-num tok-in\"  id=\"t-month-in\">—\u003c/span><span class=\"tok-cap\">输入\u003c/span>\u003c/div>\n            <div class=\"tok-stat\"><span class=\"tok-num tok-out\" id=\"t-month-out\">—\u003c/span><span class=\"tok-cap\">输出\u003c/span>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        <div class=\"tok-card\">\n          <div class=\"tok-h\"><span class=\"tok-scope\">累计\u003c/span><span class=\"tok-hit\" id=\"hit-total\">缓存命中 —\u003c/span>\u003c/div>\n          <div class=\"tok-stats\">\n            <div class=\"tok-stat\"><span class=\"tok-num tok-in\"  id=\"t-total-in\">—\u003c/span><span class=\"tok-cap\">输入\u003c/span>\u003c/div>\n            <div class=\"tok-stat\"><span class=\"tok-num tok-out\" id=\"t-total-out\">—\u003c/span><span class=\"tok-cap\">输出\u003c/span>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/aside>\n  \u003c/main>\n\u003c/div>\n\n<div id=\"confirm\" aria-hidden=\"true\">\n  <div class=\"confirm-plate\">\n    <div class=\"confirm-eyebrow\"><span class=\"dot dot-needConfirm\">\u003c/span><span>NEED CONFIRMATION\u003c/span>\u003c/div>\n    <div class=\"confirm-text\">等你拍板\u003c/div>\n    <div class=\"confirm-list\" id=\"confirm-list\">\u003c/div>\n  \u003c/div>\n  <div class=\"confirm-clock\" id=\"confirm-clock\">--:--\u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">连接 Mac 失败\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI · SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_state, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n// ───── Spawn motes ─────\n(function spawnMotes() {\n  const wrap = document.getElementById('motes');\n  for (let i = 0; i < 25; i++) {\n    const m = document.createElement('div');\n    m.className = 'mote';\n    m.style.left = Math.random() * 100 + '%';\n    m.style.animationDuration = (15 + Math.random() * 18) + 's';\n    m.style.animationDelay = (-Math.random() * 30) + 's';\n    m.style.opacity = (0.2 + Math.random() * 0.4);\n    m.style.transform = `scale(${0.5 + Math.random()})`;\n    wrap.appendChild(m);\n  }\n})();\n\n// ───── Clock ─────\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours());\n  const mm = C.pad2(now.getMinutes());\n  document.getElementById('clock').innerHTML = `<span>${hh}\u003c/span><span class=\"colon\">:\u003c/span><span>${mm}\u003c/span>`;\n  document.getElementById('date').textContent = C.fmtDate(now);\n  document.getElementById('confirm-clock').textContent = hh + ':' + mm;\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n// ───── Sessions ─────\nfunction renderSessions(sessions, detail) {\n  const panel = document.getElementById('sessions');\n  document.getElementById('sess-count').textContent = sessions.length;\n\n  if (!sessions.length) {\n    panel.innerHTML = '<div class=\"placeholder\">awaiting signal\u003c/div>';\n    return;\n  }\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n  const sorted = C.sortSessions(sessions);\n  const VIS = 5;\n  const visible = sorted.slice(0, VIS);\n  const extra = sorted.length - visible.length;\n\n  panel.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知项目';\n    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;\n    const age = C.timeAgo(s.updated_at);\n    const toolHtml = tool\n      ? `<div class=\"c-tool\"><span class=\"c-tool-name\">${C.esc(tool)}\u003c/span>${target?`<span class=\"c-tool-target\">${C.esc(target)}\u003c/span>`:''}\u003c/div>` : '';\n    const promptHtml = prompt\n      ? `<div class=\"c-prompt\">${C.esc(prompt)}\u003c/div>` : '';\n    return `\n      <div class=\"card state-${state}\" style=\"animation-delay:${i*70}ms\">\n        <div class=\"c-row1\">\n          <span class=\"c-badge\">${C.STATE_LABEL[state] || state}\u003c/span>\n          <span class=\"c-project\">${C.esc(project)}\u003c/span>\n          <span class=\"c-id\">${C.esc((s.id||'').slice(0,8))}\u003c/span>\n          <span class=\"c-age\">${age}\u003c/span>\n        \u003c/div>\n        ${toolHtml}${promptHtml}\n      \u003c/div>`;\n  }).join('') + (extra > 0 ? `<div class=\"more\">+ ${extra} 更多 session\u003c/div>` : '');\n}\n\nfunction renderTop(gs, sessions) {\n  document.getElementById('g-dot').className = 'dot dot-' + (gs || 'idle');\n  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);\n  const summary = total === 0 ? '无活动 session'\n    : `${total} session${total!==1?'s':''}` + (parts.length ? ` · ${parts.join(' · ')}` : '');\n  document.getElementById('g-summary').textContent = summary;\n  document.body.dataset.state = gs || 'idle';\n}\n\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*100 + 300}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知项目')}\u003c/span>\n      <span class=\"confirm-id\">${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\nfunction setNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  el.style.transition = 'opacity .25s, transform .25s';\n  el.style.opacity = '0'; el.style.transform = 'translateY(-4px)';\n  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 220);\n}\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setNum('t-today-in', t.input); setNum('t-today-out', t.output);\n  setNum('t-month-in', m.input); setNum('t-month-out', m.output);\n  setNum('t-total-in', a.input); setNum('t-total-out', a.output);\n  const th=C.hitRate(t),mh=C.hitRate(m),ah=C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?`缓存 ${th}%`:'缓存 —';\n  document.getElementById('hit-month').textContent = mh!==null?`缓存 ${mh}%`:'缓存 —';\n  document.getElementById('hit-total').textContent = ah!==null?`缓存命中 ${ah}%`:'缓存命中 —';\n  if (data.last_updated) document.getElementById('tok-updated').textContent = C.fmtTimeHM(new Date(data.last_updated)) + ' UPDATED';\n}\n\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n    document.getElementById('stage').classList.toggle('recede', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n    renderTop(gs, sessions);\n    renderSessions(sessions, detail);\n    renderConfirm(sessions);\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "garden": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · Garden\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --sky-0: #0a1820;\n  --sky-1: #112a30;\n  --earth: #1f3024;\n\n  --leaf-1: #6da37a;\n  --leaf-2: #87b888;\n  --stem:   #4a6a52;\n\n  --fg:   #e6efe6;\n  --fg-2: #b8c8b8;\n  --fg-3: #7a8c80;\n  --fg-4: #54665a;\n\n  --c-working:  #f3c969;\n  --c-thinking: #7adfff;\n  --c-done:     #ff96c2;\n  --c-idle:     #8b9a8e;\n  --c-confirm:  #ff5b50;\n\n  --font-serif: \"Cormorant Garamond\", \"Times New Roman\", serif;\n  --font-mono:  \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n  --font-sans:  -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: var(--sky-0);\n  color: var(--fg);\n  font-family: var(--font-sans);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ============================================================\n   Sky background — gradient & stars\n   ============================================================ */\n#sky {\n  position: fixed; inset: 0;\n  background:\n    radial-gradient(ellipse at 50% 100%, oklch(0.30 0.06 160) 0%, transparent 65%),\n    linear-gradient(180deg, #050a10 0%, #0a1820 40%, #112a30 75%, #1f3024 100%);\n  z-index: 0;\n  transition: background 1.6s ease;\n}\nbody[data-state=\"working\"]     #sky { background: radial-gradient(ellipse at 50% 100%, oklch(0.32 0.10 80)  0%, transparent 60%), linear-gradient(180deg, #050a10 0%, #1a1a20 40%, #2e2520 78%, #1f3024 100%); }\nbody[data-state=\"thinking\"]    #sky { background: radial-gradient(ellipse at 50% 100%, oklch(0.30 0.10 220) 0%, transparent 60%), linear-gradient(180deg, #050a18 0%, #0d1d2c 40%, #14313c 75%, #1f3024 100%); }\nbody[data-state=\"done\"]        #sky { background: radial-gradient(ellipse at 50% 100%, oklch(0.34 0.10 320) 0%, transparent 60%), linear-gradient(180deg, #0a0612 0%, #1b1124 40%, #2a1c34 75%, #1f3024 100%); }\nbody[data-state=\"needConfirm\"] #sky { background: radial-gradient(ellipse at 50% 50%, oklch(0.36 0.20 25)  0%, transparent 65%), linear-gradient(180deg, #1a0508 0%, #2a0a10 40%, #38121a 75%, #2c0a14 100%); }\n\n#stars {\n  position: fixed; inset: 0;\n  z-index: 1;\n  pointer-events: none;\n}\n\n/* ============================================================\n   Stage\n   ============================================================ */\n#stage {\n  position: relative;\n  z-index: 5;\n  width: 100%; height: 100%;\n  display: grid;\n  grid-template-rows: auto 1fr auto;\n  transition: opacity 0.6s, transform 0.6s;\n}\n#stage.recede { opacity: 0.18; transform: scale(0.95); pointer-events: none; filter: blur(2px); }\n\n/* ============================================================\n   Top — status + clock (corners)\n   ============================================================ */\n.top {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  padding: clamp(20px, 2.4vw, 32px) clamp(24px, 2.8vw, 40px) 0;\n}\n.status-card {\n  display: inline-flex;\n  align-items: baseline;\n  gap: 12px;\n  padding: 10px 18px;\n  border-radius: 999px;\n  background: oklch(0.15 0.02 180 / 0.5);\n  border: 1px solid oklch(0.55 0.03 160 / 0.20);\n  backdrop-filter: blur(14px);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.1em;\n  color: var(--fg-2);\n}\n.dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--c-idle);\n  transform: translateY(1px);\n  display: inline-block;\n  margin-right: 6px;\n}\n.dot-working     { background: var(--c-working);  box-shadow: 0 0 14px var(--c-working); animation: none; }\n.dot-thinking    { background: var(--c-thinking); box-shadow: 0 0 14px var(--c-thinking); animation: none; }\n.dot-done        { background: var(--c-done);     box-shadow: 0 0 12px var(--c-done); }\n.dot-idle        { background: var(--c-idle);     opacity: 0.5; }\n.dot-needConfirm { background: var(--c-confirm);  box-shadow: 0 0 16px var(--c-confirm); animation: none; }\n@keyframes breathe {\n  0%,100% { transform: scale(1)    translateY(1px); }\n  50%     { transform: scale(1.35) translateY(1px); filter: brightness(1.3); }\n}\n.status-label { color: var(--fg); text-transform: uppercase; font-weight: 500; }\n.status-sum   { color: var(--fg-3); }\n\n.clock-area {\n  text-align: right;\n  font-family: var(--font-serif);\n  line-height: 1;\n}\n.clock {\n  font-size: clamp(40px, 5vw, 64px);\n  font-weight: 400;\n  font-style: italic;\n  color: var(--fg);\n  letter-spacing: -0.02em;\n  text-shadow: 0 0 30px oklch(0.5 0.10 180 / 0.5);\n}\n.clock .colon { opacity: 0.5; animation: blink 2s ease-in-out infinite; }\n@keyframes blink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }\n.date {\n  margin-top: 6px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n}\n\n/* ============================================================\n   The garden — plants row\n   ============================================================ */\n.garden {\n  position: relative;\n  min-height: 0;\n  display: flex;\n  align-items: flex-end;\n  justify-content: center;\n  padding: 0 clamp(24px, 3vw, 60px);\n  overflow: hidden;\n}\n.garden-strip {\n  flex: 1;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n  gap: clamp(12px, 1.5vw, 24px);\n  align-items: end;\n  justify-items: center;\n  max-width: 1400px;\n}\n\n@media (orientation: portrait), (max-width: 820px) {\n  .garden-strip { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }\n}\n\n/* a plant */\n.plant {\n  position: relative;\n  width: 100%;\n  max-width: 200px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 8px;\n  animation: none;\n  --sway: 1;\n}\n@keyframes plant-in {\n  from { opacity: 0; transform: translateY(40px) scaleY(0.4); transform-origin: bottom; }\n  to   { opacity: 1; transform: none; }\n}\n.plant-svg {\n  width: 100%;\n  height: clamp(140px, 18vh, 240px);\n  display: block;\n}\n.plant-svg .stem    { stroke: var(--stem); stroke-width: 3; fill: none; stroke-linecap: round; }\n.plant-svg .leaf    { fill: var(--leaf-1); transform-origin: var(--leaf-orig); animation: leaf-sway 4s ease-in-out infinite; }\n.plant-svg .leaf-2  { fill: var(--leaf-2); }\n.plant-svg .stem-group { transform-origin: 50% 100%; animation: stem-sway 6s ease-in-out infinite; }\n\n@keyframes stem-sway {\n  0%,100% { transform: rotate(-0.8deg); }\n  50%     { transform: rotate( 1.2deg); }\n}\n@keyframes leaf-sway {\n  0%,100% { transform: rotate(-3deg); }\n  50%     { transform: rotate( 3deg); }\n}\n\n/* crown — varies by state */\n.crown-working .bud { fill: var(--c-working); animation: none; transform-origin: center; }\n.crown-working .bud-glow { fill: var(--c-working); opacity: 0.35; filter: blur(6px); animation: none; transform-origin: center; }\n@keyframes bud-breathe {\n  0%,100% { transform: scale(1);    opacity: 0.92; }\n  50%     { transform: scale(1.08); opacity: 1; }\n}\n\n.crown-thinking .think-particle {\n  fill: var(--c-thinking);\n  filter: drop-shadow(0 0 4px var(--c-thinking));\n  animation: think-float 3s ease-in-out infinite;\n}\n@keyframes think-float {\n  0%   { opacity: 0;   transform: translateY(0)     scale(0.4); }\n  20%  { opacity: 1;   transform: translateY(-10px) scale(1); }\n  80%  { opacity: 1;   transform: translateY(-30px) scale(1); }\n  100% { opacity: 0;   transform: translateY(-50px) scale(0.5); }\n}\n\n.crown-done .petal {\n  fill: var(--c-done);\n  transform-origin: 50% 100%;\n  animation: petal-open 0.9s cubic-bezier(.2,1.5,.4,1) backwards;\n}\n@keyframes petal-open {\n  from { transform: scale(0) rotate(0); }\n  to   { transform: scale(1); }\n}\n.crown-done .stamen { fill: #fff5a8; }\n\n.crown-idle .bud { fill: var(--c-idle); opacity: 0.5; }\n\n.crown-needConfirm .alarm {\n  fill: var(--c-confirm);\n  filter: drop-shadow(0 0 8px var(--c-confirm));\n  animation: none;\n  transform-origin: 50% 100%;\n}\n@keyframes alarm-shake {\n  0%,100% { transform: translateX(0) scale(1); }\n  25%     { transform: translateX(-1.5px) scale(1.02); }\n  75%     { transform: translateX( 1.5px) scale(1.02); }\n}\n\n/* plant ground glow halo */\n.plant-glow {\n  position: absolute;\n  bottom: 30px;\n  width: 80%;\n  height: 30px;\n  background: radial-gradient(ellipse at center, var(--crown-color, transparent) 0%, transparent 70%);\n  filter: blur(8px);\n  opacity: 0.6;\n  pointer-events: none;\n  transition: background 1s;\n}\n.plant.state-working     { --crown-color: oklch(0.78 0.16 80  / 0.55); }\n.plant.state-thinking    { --crown-color: oklch(0.80 0.15 220 / 0.50); }\n.plant.state-done        { --crown-color: oklch(0.78 0.12 340 / 0.50); }\n.plant.state-needConfirm { --crown-color: oklch(0.65 0.22 25  / 0.65); }\n.plant.state-idle        { --crown-color: transparent; }\n\n.plant-meta {\n  text-align: center;\n  width: 100%;\n  font-family: var(--font-serif);\n  z-index: 1;\n}\n.plant-name {\n  font-size: clamp(15px, 1.4vw, 19px);\n  font-style: italic;\n  color: var(--fg);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.plant-tool {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-3);\n  letter-spacing: 0.04em;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  margin-top: 2px;\n}\n.plant-id {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--fg-4);\n  letter-spacing: 0.06em;\n  margin-top: 1px;\n}\n\n.empty-garden {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(20px, 2vw, 30px);\n  color: var(--fg-3);\n  opacity: 0.6;\n  letter-spacing: -0.01em;\n  text-align: center;\n  align-self: center;\n  margin: auto;\n}\n\n/* ============================================================\n   River — token flow at bottom\n   ============================================================ */\n.river-wrap {\n  position: relative;\n  height: clamp(180px, 22vh, 260px);\n  flex-shrink: 0;\n}\n#river {\n  position: absolute;\n  inset: 0;\n  width: 100%; height: 100%;\n  display: block;\n}\n\n.river-labels {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  align-items: end;\n  padding: 0 clamp(24px, 3vw, 48px) clamp(16px, 1.5vw, 24px);\n  pointer-events: none;\n  gap: 16px;\n}\n.river-col {\n  display: flex; flex-direction: column;\n  align-items: center;\n  gap: 4px;\n  color: var(--fg);\n  font-family: var(--font-serif);\n}\n.river-scope {\n  font-style: italic;\n  font-size: clamp(13px, 1.2vw, 17px);\n  color: var(--fg-2);\n  letter-spacing: 0;\n}\n.river-amount {\n  font-size: clamp(28px, 3vw, 44px);\n  font-weight: 500;\n  color: var(--fg);\n  text-shadow: 0 2px 20px oklch(0.4 0.08 180 / 0.7);\n  letter-spacing: -0.02em;\n  white-space: nowrap;\n}\n.river-detail {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.1em;\n  color: var(--fg-3);\n  text-transform: uppercase;\n}\n.river-detail .out { color: var(--c-working); }\n.river-detail .hit { color: var(--c-done); margin-left: 8px; }\n\n/* ============================================================\n   needConfirm — sky turns red, big text overlay\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  opacity: 0;\n  pointer-events: none;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  transition: opacity 0.7s ease;\n  background:\n    radial-gradient(circle at 50% 40%,\n      oklch(0.40 0.18 25 / 0.7),\n      oklch(0.12 0.08 25 / 0.92) 70%);\n  padding: 40px;\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n\n.confirm-flowers {\n  position: absolute;\n  inset: 0;\n  z-index: 0;\n  pointer-events: none;\n  background:\n    radial-gradient(circle 200px at 15% 30%, oklch(0.55 0.20 25 / 0.3), transparent),\n    radial-gradient(circle 240px at 85% 60%, oklch(0.55 0.20 25 / 0.3), transparent),\n    radial-gradient(circle 180px at 30% 80%, oklch(0.55 0.20 25 / 0.25), transparent),\n    radial-gradient(circle 220px at 75% 20%, oklch(0.55 0.20 25 / 0.25), transparent);\n  filter: blur(20px);\n  animation: bloom 2s ease-in-out infinite alternate;\n}\n@keyframes bloom {\n  from { transform: scale(0.95); opacity: 0.8; }\n  to   { transform: scale(1.05); opacity: 1; }\n}\n\n.confirm-inner {\n  position: relative;\n  z-index: 1;\n  text-align: center;\n}\n.confirm-eyebrow {\n  display: inline-flex; align-items: center; gap: 12px;\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1.1vw, 14px);\n  letter-spacing: 0.4em;\n  color: oklch(0.95 0.06 25);\n  padding: 8px 20px;\n  border-radius: 999px;\n  background: oklch(0.25 0.10 25 / 0.6);\n  border: 1px solid oklch(0.70 0.20 25 / 0.4);\n  text-transform: uppercase;\n  margin-bottom: clamp(20px, 3vw, 36px);\n}\n.confirm-text {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(80px, 14vw, 240px);\n  color: oklch(0.97 0.04 25);\n  letter-spacing: -0.04em;\n  line-height: 1;\n  text-shadow: 0 8px 80px oklch(0.7 0.22 25 / 0.7);\n  margin-bottom: clamp(20px, 3vw, 36px);\n}\n.confirm-list {\n  display: flex; flex-direction: column; gap: 12px; align-items: center;\n}\n.confirm-row {\n  display: inline-flex; align-items: baseline; gap: 16px;\n  padding: 10px 24px;\n  border: 1px solid oklch(0.70 0.20 25 / 0.45);\n  border-radius: 999px;\n  background: oklch(0.22 0.08 25 / 0.5);\n  backdrop-filter: blur(12px);\n  font-family: var(--font-serif);\n  animation: none;\n}\n@keyframes row-in {\n  from { opacity: 0; transform: translateY(8px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-size: clamp(22px, 2.4vw, 32px);\n  font-style: italic;\n  color: oklch(0.97 0.04 25);\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: oklch(0.85 0.10 25);\n  letter-spacing: 0.05em;\n}\n.confirm-clock {\n  position: absolute;\n  top: clamp(20px, 2.6vw, 32px);\n  right: clamp(24px, 2.8vw, 40px);\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(20px, 2vw, 28px);\n  color: oklch(0.92 0.08 25);\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: oklch(0.06 0.02 180 / 0.94);\n  backdrop-filter: blur(20px);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 14px;\n  z-index: 80;\n}\n.err-title {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(28px, 3vw, 40px);\n  color: var(--c-confirm);\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\n\u003c/style>\n\u003c/head>\n<body data-state=\"idle\">\n\n<div id=\"sky\">\u003c/div>\n<canvas id=\"stars\">\u003c/canvas>\n\n<div id=\"stage\">\n  <header class=\"top\">\n    <div class=\"status-card\">\n      <span id=\"g-dot\" class=\"dot dot-idle\">\u003c/span>\n      <span class=\"status-label\" id=\"g-label\">IDLE\u003c/span>\n      <span style=\"opacity:0.4\">·\u003c/span>\n      <span class=\"status-sum\" id=\"g-summary\">花园中无活动\u003c/span>\n    \u003c/div>\n    <div class=\"clock-area\">\n      <div class=\"clock\" id=\"clock\"><span>00\u003c/span><span class=\"colon\">:\u003c/span><span>00\u003c/span>\u003c/div>\n      <div class=\"date\" id=\"date\">— —\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  <main class=\"garden\">\n    <div class=\"garden-strip\" id=\"garden\">\n      <div class=\"empty-garden\">花园在静默中等待…\u003c/div>\n    \u003c/div>\n  \u003c/main>\n\n  <footer class=\"river-wrap\">\n    <canvas id=\"river\">\u003c/canvas>\n    <div class=\"river-labels\">\n      <div class=\"river-col\">\n        <span class=\"river-scope\">今日 · today\u003c/span>\n        <span class=\"river-amount\" id=\"t-today-in\">—\u003c/span>\n        <span class=\"river-detail\">输入 · <span class=\"out\" id=\"t-today-out\">—\u003c/span> 输出<span class=\"hit\" id=\"hit-today\">缓存 —\u003c/span>\u003c/span>\n      \u003c/div>\n      <div class=\"river-col\">\n        <span class=\"river-scope\">本月 · month\u003c/span>\n        <span class=\"river-amount\" id=\"t-month-in\">—\u003c/span>\n        <span class=\"river-detail\">输入 · <span class=\"out\" id=\"t-month-out\">—\u003c/span> 输出<span class=\"hit\" id=\"hit-month\">缓存 —\u003c/span>\u003c/span>\n      \u003c/div>\n      <div class=\"river-col\">\n        <span class=\"river-scope\">累计 · all time\u003c/span>\n        <span class=\"river-amount\" id=\"t-total-in\">—\u003c/span>\n        <span class=\"river-detail\">输入 · <span class=\"out\" id=\"t-total-out\">—\u003c/span> 输出<span class=\"hit\" id=\"hit-total\">缓存命中 —\u003c/span>\u003c/span>\n      \u003c/div>\n    \u003c/div>\n  \u003c/footer>\n\u003c/div>\n\n<div id=\"confirm\" aria-hidden=\"true\">\n  <div class=\"confirm-flowers\">\u003c/div>\n  <div class=\"confirm-inner\">\n    <div class=\"confirm-eyebrow\"><span class=\"dot dot-needConfirm\">\u003c/span><span>NEED CONFIRMATION\u003c/span>\u003c/div>\n    <div class=\"confirm-text\">等你拍板\u003c/div>\n    <div class=\"confirm-list\" id=\"confirm-list\">\u003c/div>\n  \u003c/div>\n  <div class=\"confirm-clock\" id=\"confirm-clock\">--:--\u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">— 花园失联 —\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI · SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_state, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n/* ===== STARS CANVAS ===== */\n(function stars() {\n  const canvas = document.getElementById('stars');\n  const ctx = canvas.getContext('2d');\n  let stars = [];\n\n  function resize() {\n    canvas.width  = window.innerWidth  * devicePixelRatio;\n    canvas.height = window.innerHeight * devicePixelRatio;\n    canvas.style.width  = window.innerWidth + 'px';\n    canvas.style.height = window.innerHeight + 'px';\n    stars = Array.from({length: 90}, () => ({\n      x: Math.random() * canvas.width,\n      y: Math.random() * canvas.height * 0.65,\n      r: (Math.random() * 1.2 + 0.4) * devicePixelRatio,\n      a: Math.random() * Math.PI * 2,\n      sp: 0.6 + Math.random() * 1.4\n    }));\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  function frame(t) {\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n    stars.forEach(s => {\n      const tw = (Math.sin(t / 800 * s.sp + s.a) + 1) / 2;\n      ctx.globalAlpha = 0.25 + tw * 0.55;\n      ctx.fillStyle = '#e8f0f5';\n      ctx.beginPath();\n      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);\n      ctx.fill();\n    });\n    ctx.globalAlpha = 1;\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n})();\n\n/* ===== RIVER CANVAS ===== */\nconst riverState = { flow: 0.3 }; // 0..1 represents intensity\n(function river() {\n  const canvas = document.getElementById('river');\n  const ctx = canvas.getContext('2d');\n  let particles = [];\n\n  function resize() {\n    canvas.width  = canvas.offsetWidth  * devicePixelRatio;\n    canvas.height = canvas.offsetHeight * devicePixelRatio;\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  function spawnParticle() {\n    if (particles.length > 70) return;\n    particles.push({\n      x: -10,\n      y: canvas.height * (0.4 + Math.random() * 0.55),\n      vx: 0.5 + Math.random() * 2,\n      r: (1 + Math.random() * 2.5) * devicePixelRatio,\n      gold: Math.random() < 0.18,\n      life: 1\n    });\n  }\n\n  function frame(t) {\n    resize();\n    const w = canvas.width, h = canvas.height;\n    ctx.clearRect(0, 0, w, h);\n\n    // base river — sine waves\n    ctx.lineWidth = 1.5 * devicePixelRatio;\n    for (let layer = 0; layer < 4; layer++) {\n      const yMid = h * (0.45 + layer * 0.12);\n      const amp = h * (0.025 + layer * 0.015);\n      const freq = 0.004 + layer * 0.001;\n      const phase = t * (0.0008 + layer * 0.0003);\n      ctx.beginPath();\n      for (let x = 0; x <= w; x += 4 * devicePixelRatio) {\n        const y = yMid + Math.sin(x * freq + phase) * amp;\n        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n      }\n      const alpha = 0.10 + layer * 0.06;\n      ctx.strokeStyle = `oklch(0.55 0.10 200 / ${alpha})`;\n      ctx.stroke();\n    }\n\n    // particles\n    if (Math.random() < 0.25 + riverState.flow * 0.55) spawnParticle();\n    particles.forEach(p => {\n      p.x += p.vx * devicePixelRatio;\n      p.y += Math.sin((p.x * 0.01) + (t * 0.001)) * 0.3;\n    });\n    particles = particles.filter(p => p.x < w + 10);\n\n    particles.forEach(p => {\n      ctx.beginPath();\n      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n      ctx.fillStyle = p.gold ? 'oklch(0.85 0.18 80 / 0.85)' : 'oklch(0.85 0.10 200 / 0.8)';\n      ctx.shadowColor = p.gold ? 'oklch(0.85 0.18 80)' : 'oklch(0.85 0.10 200)';\n      ctx.shadowBlur = 10 * devicePixelRatio;\n      ctx.fill();\n    });\n    ctx.shadowBlur = 0;\n\n    requestAnimationFrame(frame);\n  }\n  requestAnimationFrame(frame);\n})();\n\n/* ===== CLOCK ===== */\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours()), mm = C.pad2(now.getMinutes());\n  document.getElementById('clock').innerHTML = `<span>${hh}\u003c/span><span class=\"colon\">:\u003c/span><span>${mm}\u003c/span>`;\n  document.getElementById('date').textContent = C.fmtDate(now);\n  document.getElementById('confirm-clock').textContent = hh + ':' + mm;\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n/* ===== PLANT GENERATOR ===== */\nfunction hashId(id) {\n  let h = 0;\n  for (let i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);\n  return Math.abs(h);\n}\n\nfunction makePlantSVG(id, state) {\n  const h = hashId(id);\n  const variant = h % 4;\n  const leafSide = h % 2 === 0 ? 1 : -1;\n  const stemHeight = 88 + (h % 20);\n  const w = 100;\n  const baseY = 200;\n\n  // build stem path — gentle curve\n  const stemPath = `M ${w/2} ${baseY} C ${w/2 + 6*leafSide} ${baseY-30}, ${w/2 - 8*leafSide} ${baseY-60}, ${w/2 + 4*leafSide} ${baseY-stemHeight}`;\n\n  // leaves\n  const leaves = [];\n  const leafCount = 2 + (h % 3);\n  for (let i = 0; i < leafCount; i++) {\n    const t = 0.35 + i * 0.18;\n    const lx = w/2 + (i % 2 === 0 ? -1 : 1) * (10 + (h % 6));\n    const ly = baseY - stemHeight * t;\n    const rot = (i % 2 === 0 ? -40 : 40) + ((h + i) % 12);\n    leaves.push(`<ellipse class=\"leaf ${i%2 ? 'leaf-2' : ''}\" cx=\"${lx}\" cy=\"${ly}\" rx=\"13\" ry=\"6\" transform=\"rotate(${rot} ${lx} ${ly})\" style=\"--leaf-orig: ${lx}px ${ly}px; animation-delay:${i*-0.4}s\" />`);\n  }\n\n  // crown — varies by state\n  const topX = w/2 + 4*leafSide;\n  const topY = baseY - stemHeight;\n  let crown = '';\n  if (state === 'working') {\n    crown = `\n      <g class=\"crown-working\">\n        <circle class=\"bud-glow\" cx=\"${topX}\" cy=\"${topY}\" r=\"14\" />\n        <circle class=\"bud\" cx=\"${topX}\" cy=\"${topY}\" r=\"6\" />\n      \u003c/g>`;\n  } else if (state === 'thinking') {\n    crown = `\n      <g class=\"crown-thinking\">\n        <circle class=\"think-particle\" cx=\"${topX}\" cy=\"${topY-2}\" r=\"2.5\" style=\"animation-delay:0s\" />\n        <circle class=\"think-particle\" cx=\"${topX-5}\" cy=\"${topY-2}\" r=\"2\" style=\"animation-delay:-1.2s\" />\n        <circle class=\"think-particle\" cx=\"${topX+5}\" cy=\"${topY-2}\" r=\"2\" style=\"animation-delay:-2.2s\" />\n      \u003c/g>`;\n  } else if (state === 'done') {\n    // bloom — 6 petals\n    const petals = [];\n    for (let i = 0; i < 6; i++) {\n      const a = (i / 6) * Math.PI * 2 - Math.PI/2;\n      const px = topX + Math.cos(a) * 6;\n      const py = topY + Math.sin(a) * 6;\n      petals.push(`<ellipse class=\"petal\" cx=\"${px}\" cy=\"${py}\" rx=\"5\" ry=\"9\" transform=\"rotate(${(i/6)*360} ${topX} ${topY})\" style=\"animation-delay:${i*60}ms\" />`);\n    }\n    crown = `<g class=\"crown-done\">${petals.join('')}<circle class=\"stamen\" cx=\"${topX}\" cy=\"${topY}\" r=\"3.5\" />\u003c/g>`;\n  } else if (state === 'needConfirm') {\n    crown = `\n      <g class=\"crown-needConfirm\">\n        <polygon class=\"alarm\" points=\"${topX},${topY-14} ${topX-7},${topY+2} ${topX+7},${topY+2}\" />\n        <rect class=\"alarm\" x=\"${topX-1.5}\" y=\"${topY-8}\" width=\"3\" height=\"5\" fill=\"#fff\" />\n        <circle class=\"alarm\" cx=\"${topX}\" cy=\"${topY-1}\" r=\"1.4\" fill=\"#fff\" />\n      \u003c/g>`;\n  } else { // idle\n    crown = `<g class=\"crown-idle\"><circle class=\"bud\" cx=\"${topX}\" cy=\"${topY}\" r=\"3.5\" />\u003c/g>`;\n  }\n\n  return `\n    <svg class=\"plant-svg\" viewBox=\"0 0 ${w} 220\" preserveAspectRatio=\"xMidYEnd meet\">\n      <g class=\"stem-group\" style=\"animat
