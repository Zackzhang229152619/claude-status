 border: 1px solid oklch(0.60 0.20 320 / 0.4);\n  backdrop-filter: blur(10px);\n  box-shadow: 0 0 24px oklch(0.50 0.25 320 / 0.25);\n}\n.clock {\n  font-family: var(--font-display);\n  font-size: clamp(22px, 2.6vw, 34px);\n  font-weight: 800;\n  line-height: 1;\n  letter-spacing: -0.01em;\n  background: linear-gradient(180deg, var(--neon-3), var(--neon-1));\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  filter: drop-shadow(0 0 12px rgba(255,62,192,0.5));\n}\n.clock .colon { animation: blink 1s ease-in-out infinite; }\n@keyframes blink { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }\n.clock-meta {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--fg-3);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\n\n/* ============================================================\n   Equalizer banner — token usage\n   ============================================================ */\n.eq-banner {\n  position: relative;\n  padding: clamp(12px, 1.2vw, 18px);\n  background: linear-gradient(180deg, oklch(0.18 0.10 290 / 0.5), oklch(0.12 0.08 280 / 0.4));\n  border: 1px solid oklch(0.50 0.20 320 / 0.30);\n  border-radius: 14px;\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: clamp(12px, 1.4vw, 24px);\n  box-shadow: 0 8px 28px oklch(0.30 0.25 320 / 0.18);\n}\n.eq-banner::before {\n  content: 'TOKEN MIXER · LIVE';\n  position: absolute;\n  top: -10px; left: 16px;\n  background: var(--bg-0);\n  padding: 0 8px;\n  font-family: var(--font-display);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.3em;\n  color: var(--neon-3);\n  text-shadow: 0 0 8px var(--neon-3);\n}\n\n.eq-track {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  align-items: center;\n  gap: 12px;\n}\n.eq-bars {\n  display: flex;\n  align-items: flex-end;\n  justify-content: stretch;\n  gap: 3px;\n  height: clamp(36px, 5vw, 56px);\n}\n.eq-bar {\n  flex: 1;\n  background: linear-gradient(180deg, var(--neon-1), var(--neon-2));\n  border-radius: 2px;\n  min-height: 10%;\n  animation: eq-jump var(--d, 0.4s) ease-in-out infinite alternate;\n  box-shadow: 0 0 6px var(--neon-1);\n}\n@keyframes eq-jump {\n  from { height: 15%; }\n  to   { height: 85%; }\n}\n.eq-track[data-scope=\"today\"]  .eq-bar { background: linear-gradient(180deg, var(--neon-3), var(--neon-2)); box-shadow: 0 0 6px var(--neon-3); }\n.eq-track[data-scope=\"month\"]  .eq-bar { background: linear-gradient(180deg, var(--neon-1), var(--neon-2)); box-shadow: 0 0 6px var(--neon-1); }\n.eq-track[data-scope=\"total\"]  .eq-bar { background: linear-gradient(180deg, var(--neon-4), var(--neon-5)); box-shadow: 0 0 6px var(--neon-4); }\n\n.eq-info {\n  min-width: 0;\n  text-align: right;\n}\n.eq-scope {\n  font-family: var(--font-display);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.2em;\n  color: var(--neon-3);\n  text-transform: uppercase;\n}\n.eq-num {\n  font-family: var(--font-bebas);\n  font-size: clamp(22px, 2.4vw, 32px);\n  line-height: 1;\n  color: var(--fg);\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n}\n.eq-num.out { color: var(--neon-4); }\n.eq-row {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-3);\n  letter-spacing: 0.08em;\n}\n.eq-out-cap { color: var(--neon-4); }\n.eq-hit { color: #5cf78a; }\n\n/* ============================================================\n   Stage / Setlist body\n   ============================================================ */\n.body {\n  display: grid;\n  grid-template-columns: minmax(0, 1.7fr) minmax(260px, 1fr);\n  gap: clamp(14px, 1.5vw, 24px);\n  min-height: 0;\n}\nbody[data-orient=\"portrait\"] .body,\nbody[data-size=\"phone\"] .body {\n  grid-template-columns: 1fr;\n  grid-template-rows: minmax(0, 1.5fr) auto;\n}\n\n/* Set list pane */\n.setlist {\n  position: relative;\n  padding: clamp(14px, 1.4vw, 20px);\n  background:\n    linear-gradient(180deg, rgba(20,8,40,0.5), rgba(15,4,28,0.4));\n  border: 1px solid oklch(0.40 0.20 320 / 0.30);\n  border-radius: 14px;\n  display: flex; flex-direction: column;\n  min-height: 0;\n  overflow: hidden;\n}\n.setlist-head {\n  display: flex; align-items: baseline; justify-content: space-between;\n  padding-bottom: 10px;\n  margin-bottom: 10px;\n  border-bottom: 1px dashed oklch(0.50 0.15 320 / 0.30);\n}\n.setlist-title {\n  font-family: var(--font-bebas);\n  font-size: clamp(22px, 2.4vw, 32px);\n  letter-spacing: 0.06em;\n  background: linear-gradient(90deg, var(--neon-1), var(--neon-3));\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  text-transform: uppercase;\n}\n.setlist-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-3);\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n}\n.setlist-meta b { color: var(--neon-3); font-weight: 700; }\n\n.setlist-tracks {\n  flex: 1;\n  display: flex; flex-direction: column;\n  gap: 8px;\n  overflow-y: auto;\n  scrollbar-width: none;\n  padding-right: 4px;\n  min-height: 0;\n}\n.setlist-tracks::-webkit-scrollbar { display: none; }\n\n/* Track row — a session */\n.track {\n  position: relative;\n  display: grid;\n  grid-template-columns: auto auto 1fr auto;\n  gap: 14px;\n  padding: 10px 14px;\n  background: rgba(255,255,255,0.03);\n  border: 1px solid rgba(255,255,255,0.06);\n  border-left: 3px solid var(--state-c, var(--c-idle));\n  border-radius: 10px;\n  align-items: center;\n  animation: none;\n  transition: background 0.3s, border-color 0.3s;\n}\n@keyframes track-in {\n  from { opacity: 0; transform: translateY(10px); }\n  to   { opacity: 1; transform: none; }\n}\n.track.state-working     { --state-c: var(--c-working); }\n.track.state-thinking    { --state-c: var(--c-thinking); }\n.track.state-done        { --state-c: var(--c-done); }\n.track.state-idle        { --state-c: var(--c-idle); opacity: 0.6; }\n.track.state-needConfirm {\n  --state-c: var(--c-confirm);\n  background: oklch(0.30 0.20 320 / 0.20);\n  animation: none;\n}\n@keyframes track-flash {\n  0%,100% { box-shadow: 0 0 0 0 var(--c-confirm); }\n  50%     { box-shadow: 0 0 28px oklch(0.65 0.25 340 / 0.45); }\n}\n\n.track-no {\n  font-family: var(--font-bebas);\n  font-size: clamp(20px, 2vw, 28px);\n  color: var(--state-c);\n  width: 28px;\n  text-align: center;\n  letter-spacing: 0;\n  filter: drop-shadow(0 0 6px var(--state-c));\n}\n\n/* mini eq waveform */\n.track-wave {\n  display: flex;\n  align-items: flex-end;\n  gap: 2px;\n  height: 22px;\n  width: 30px;\n}\n.track-wave .b {\n  flex: 1;\n  background: var(--state-c);\n  border-radius: 1px;\n  min-height: 10%;\n  animation: none;\n  height: 50%;\n  box-shadow: 0 0 4px var(--state-c);\n}\n@keyframes eq-soft {\n  from { height: 45%; }\n  to   { height: 55%; }\n}\n.track.state-idle .track-wave .b { animation: none; height: 20%; opacity: 0.5; }\n.track.state-done .track-wave .b { animation: none; height: 60%; }\n\n.track-info {\n  min-width: 0;\n  display: flex; flex-direction: column; gap: 2px;\n}\n.track-name {\n  font-family: var(--font-display);\n  font-size: clamp(14px, 1.4vw, 18px);\n  font-weight: 700;\n  color: var(--fg);\n  letter-spacing: -0.005em;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.track-sub {\n  font-family: var(--font-mono);\n  font-size: clamp(10px, 0.95vw, 12px);\n  color: var(--fg-2);\n  letter-spacing: 0.02em;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  display: flex; align-items: baseline; gap: 8px;\n}\n.track-tool {\n  color: var(--state-c);\n  font-weight: 500;\n  flex-shrink: 0;\n}\n.track-tool::before { content: '♪ '; opacity: 0.7; }\n.track-target { color: var(--fg-3); overflow: hidden; text-overflow: ellipsis; min-width: 0; }\n.track-prompt {\n  font-style: italic;\n  color: var(--fg-3);\n  font-size: 11px;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.track-prompt::before { content: '“'; color: var(--fg-4); }\n.track-prompt::after  { content: '”'; color: var(--fg-4); }\n\n.track-meta {\n  text-align: right;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--fg-3);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  flex-shrink: 0;\n}\n.track-meta .tag {\n  display: block;\n  font-family: var(--font-display);\n  font-size: 10px;\n  font-weight: 700;\n  color: var(--state-c);\n  letter-spacing: 0.15em;\n  margin-bottom: 2px;\n}\n\n.empty-set {\n  flex: 1;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-bebas);\n  font-size: clamp(20px, 2vw, 28px);\n  color: var(--fg-3);\n  letter-spacing: 0.2em;\n  text-align: center;\n  opacity: 0.7;\n}\n.empty-set::after { content: ' ♪'; color: var(--neon-1); animation: pulse-d 1s ease-in-out infinite; }\n\n/* ============================================================\n   VU meter pane — current state breakdown\n   ============================================================ */\n.vu-pane {\n  position: relative;\n  padding: clamp(14px, 1.4vw, 20px);\n  background: linear-gradient(180deg, rgba(20,8,40,0.5), rgba(15,4,28,0.4));\n  border: 1px solid oklch(0.40 0.20 320 / 0.30);\n  border-radius: 14px;\n  display: flex; flex-direction: column;\n  gap: clamp(10px, 1vw, 16px);\n  min-height: 0;\n  overflow: hidden;\n}\n.vu-head {\n  display: flex; align-items: baseline; justify-content: space-between;\n  padding-bottom: 6px;\n  border-bottom: 1px dashed oklch(0.50 0.15 320 / 0.30);\n}\n.vu-title {\n  font-family: var(--font-bebas);\n  font-size: clamp(20px, 2vw, 26px);\n  letter-spacing: 0.06em;\n  background: linear-gradient(90deg, var(--neon-3), var(--neon-1));\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  text-transform: uppercase;\n}\n.vu-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-3);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n}\n\n/* Status mixer — channel rows */\n.mixer {\n  display: flex; flex-direction: column;\n  gap: 10px;\n  flex: 1;\n  min-height: 0;\n  overflow-y: auto;\n  scrollbar-width: none;\n}\n.mixer::-webkit-scrollbar { display: none; }\n\n.ch {\n  display: grid;\n  grid-template-columns: 80px 1fr auto;\n  align-items: center;\n  gap: 10px;\n}\n.ch-name {\n  font-family: var(--font-display);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ch-c, var(--fg-2));\n  display: flex; align-items: center; gap: 6px;\n}\n.ch-dot {\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: var(--ch-c, var(--fg-3));\n  box-shadow: 0 0 6px var(--ch-c, var(--fg-3));\n}\n.ch-fader {\n  height: 18px;\n  background: rgba(255,255,255,0.05);\n  border-radius: 3px;\n  overflow: hidden;\n  position: relative;\n  border: 1px solid rgba(255,255,255,0.05);\n}\n.ch-level {\n  position: absolute;\n  inset: 0;\n  width: var(--lvl, 10%);\n  background: linear-gradient(90deg,\n    #5cf78a 0%, var(--neon-4) 60%, var(--neon-1) 85%, var(--neon-5) 100%);\n  transition: width 0.6s cubic-bezier(.4,.0,.2,1);\n}\n.ch-level::after {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: repeating-linear-gradient(90deg, transparent 0 8px, rgba(0,0,0,0.4) 8px 9px);\n  pointer-events: none;\n}\n.ch-val {\n  font-family: var(--font-bebas);\n  font-size: 18px;\n  color: var(--fg);\n  letter-spacing: 0;\n  min-width: 32px;\n  text-align: right;\n}\n\n/* Disco ball indicator */\n.disco {\n  position: relative;\n  width: clamp(90px, 9vw, 130px);\n  height: clamp(90px, 9vw, 130px);\n  margin: auto;\n  align-self: center;\n  flex-shrink: 0;\n}\n.disco-ball {\n  width: 100%; height: 100%;\n  border-radius: 50%;\n  background:\n    radial-gradient(circle at 30% 30%, #fff 0%, transparent 30%),\n    repeating-conic-gradient(from 0deg,\n      #c5dfff 0deg 8deg, #6a99c8 8deg 16deg, #c5dfff 16deg 24deg, #8babc7 24deg 32deg);\n  box-shadow:\n    inset -6px -10px 16px rgba(0,0,0,0.4),\n    0 0 30px rgba(255,255,255,0.3),\n    0 0 60px rgba(110,180,255,0.3);\n  animation: spin 8s linear infinite;\n}\n.disco-sparkle {\n  position: absolute;\n  inset: -30%;\n  pointer-events: none;\n  z-index: -1;\n  background:\n    radial-gradient(circle 6px at 20% 10%, white, transparent),\n    radial-gradient(circle 4px at 80% 30%, white, transparent),\n    radial-gradient(circle 5px at 10% 80%, white, transparent),\n    radial-gradient(circle 4px at 90% 90%, white, transparent),\n    radial-gradient(circle 3px at 50% 5%, white, transparent),\n    radial-gradient(circle 4px at 60% 95%, white, transparent);\n  filter: blur(1px);\n  animation: sparkle 2s ease-in-out infinite alternate;\n  opacity: 0.5;\n}\n@keyframes sparkle {\n  0%   { opacity: 0.2; transform: scale(0.9); }\n  100% { opacity: 0.8; transform: scale(1.1); }\n}\n\n/* ============================================================\n   needConfirm — encore mode (curtain pulls back, big text)\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  display: flex; align-items: center; justify-content: center;\n  opacity: 0;\n  pointer-events: none;\n  background:\n    radial-gradient(circle at 50% 30%, oklch(0.45 0.28 340 / 0.7), transparent 65%),\n    radial-gradient(circle at 50% 80%, oklch(0.40 0.28 320 / 0.6), transparent 60%),\n    oklch(0.10 0.18 320);\n  transition: opacity 0.5s;\n  overflow: hidden;\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n\n/* curtain side flaps */\n.curtain {\n  position: absolute;\n  top: 0; bottom: 0;\n  width: 12%;\n  background:\n    repeating-linear-gradient(90deg,\n      oklch(0.30 0.22 340) 0 8px,\n      oklch(0.20 0.18 340) 8px 16px,\n      oklch(0.35 0.22 340) 16px 24px);\n  box-shadow: inset 0 0 60px rgba(0,0,0,0.5);\n  transform: translateX(var(--tx, 0));\n  transition: transform 0.6s cubic-bezier(.4,.0,.2,1);\n}\n.curtain.left  { left: 0;   --tx: 0; }\n.curtain.right { right: 0;  --tx: 0; }\n#confirm.visible .curtain.left  { --tx: -2%; }\n#confirm.visible .curtain.right { --tx: 2%; }\n\n/* confetti */\n.confetti {\n  position: absolute; inset: 0;\n  pointer-events: none;\n  overflow: hidden;\n}\n.confetti-piece {\n  position: absolute;\n  width: 8px; height: 12px;\n  background: var(--cc, var(--neon-1));\n  top: -20px;\n  animation: confetti-fall var(--d, 4s) linear infinite;\n  animation-delay: var(--dl, 0s);\n  transform-origin: 50% 50%;\n}\n@keyframes confetti-fall {\n  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }\n  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.6; }\n}\n\n.confirm-inner {\n  position: relative;\n  z-index: 2;\n  text-align: center;\n  padding: clamp(30px, 4vw, 60px);\n  max-width: 92vw;\n}\n.encore-tag {\n  display: inline-block;\n  padding: 8px 22px;\n  background: linear-gradient(90deg, var(--neon-3), var(--neon-1));\n  color: #000;\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: clamp(11px, 1.2vw, 15px);\n  letter-spacing: 0.4em;\n  border-radius: 999px;\n  margin-bottom: clamp(20px, 3vw, 36px);\n  box-shadow:\n    0 0 30px rgba(255,62,192,0.5),\n    0 6px 24px rgba(0,0,0,0.4);\n  animation: encore-bob 1.5s ease-in-out infinite;\n}\n@keyframes encore-bob {\n  0%,100% { transform: translateY(0); }\n  50%     { transform: translateY(-6px); }\n}\n.confirm-text {\n  font-family: var(--font-bebas);\n  font-size: clamp(90px, 16vw, 260px);\n  line-height: 0.95;\n  letter-spacing: 0.02em;\n  background: linear-gradient(180deg, #fff 20%, var(--neon-1) 60%, var(--neon-2) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  text-shadow: 0 8px 40px rgba(255,62,192,0.4);\n  margin-bottom: clamp(20px, 3vw, 32px);\n  filter: drop-shadow(0 4px 30px rgba(255,62,192,0.6));\n  animation: confirm-pulse 1.6s ease-in-out infinite;\n}\n@keyframes confirm-pulse {\n  0%,100% { transform: scale(1); filter: drop-shadow(0 4px 30px rgba(255,62,192,0.6)); }\n  50%     { transform: scale(1.02); filter: drop-shadow(0 8px 60px rgba(255,62,192,0.9)); }\n}\n\n.confirm-list {\n  display: flex; flex-direction: column; gap: 10px; align-items: center;\n}\n.confirm-row {\n  display: inline-flex; align-items: baseline; gap: 16px;\n  padding: 10px 24px;\n  border: 1px solid oklch(0.65 0.28 340 / 0.5);\n  background: oklch(0.25 0.18 320 / 0.5);\n  border-radius: 999px;\n  backdrop-filter: blur(12px);\n  animation: none;\n  box-shadow: 0 0 24px oklch(0.50 0.25 340 / 0.4);\n}\n@keyframes row-in {\n  from { opacity: 0; transform: translateY(10px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-family: var(--font-display);\n  font-size: clamp(20px, 2.2vw, 28px);\n  font-weight: 700;\n  color: var(--fg);\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--neon-3);\n  letter-spacing: 0.05em;\n}\n\n.confirm-clock {\n  position: absolute;\n  top: 30px; right: 36px;\n  z-index: 3;\n  font-family: var(--font-bebas);\n  font-size: clamp(22px, 2.4vw, 32px);\n  letter-spacing: 0.05em;\n  color: var(--neon-3);\n  text-shadow: 0 0 12px var(--neon-3);\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: oklch(0.10 0.10 320 / 0.92);\n  backdrop-filter: blur(20px);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 14px;\n  z-index: 80;\n}\n.err-title {\n  font-family: var(--font-bebas);\n  font-size: clamp(30px, 3vw, 44px);\n  color: var(--neon-1);\n  letter-spacing: 0.15em;\n  text-shadow: 0 0 18px var(--neon-1);\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\n\nbody[data-size=\"phone\"] .eq-banner { grid-template-columns: 1fr; gap: 10px; }\nbody[data-size=\"phone\"] .vinyl { width: 42px; height: 42px; }\n\u003c/style>\n\u003c/head>\n<body>\n\n<div class=\"backdrop\">\u003c/div>\n<div class=\"fog\">\u003c/div>\n\n<div class=\"lasers\">\n  <div class=\"laser l1\">\u003c/div>\n  <div class=\"laser l2\">\u003c/div>\n  <div class=\"laser l3\">\u003c/div>\n\u003c/div>\n\n<div class=\"spots\">\n  <div class=\"spot s1\">\u003c/div>\n  <div class=\"spot s2\">\u003c/div>\n  <div class=\"spot s3\">\u003c/div>\n\u003c/div>\n\n<div class=\"dust\" id=\"dust\">\u003c/div>\n\n<div id=\"stage\">\n\n  <header class=\"top-row\">\n    <div class=\"vinyl\">\n      <div class=\"vinyl-disc\">\u003c/div>\n    \u003c/div>\n    <div class=\"marquee-block\">\n      <div class=\"now-playing\"><span class=\"np-dot\">\u003c/span>NOW PLAYING · LIVE FROM CLAUDE\u003c/div>\n      <div class=\"marquee\">\n        <div class=\"marquee-inner\" id=\"marquee\">\n          <span id=\"marquee-text\">CLAUDE · LIVE FROM SHANGHAI · MULTI-SESSION SET · GENERATIVE DESIGN ENCORE · \u003c/span>\n          <span id=\"marquee-text-2\">CLAUDE · LIVE FROM SHANGHAI · MULTI-SESSION SET · GENERATIVE DESIGN ENCORE · \u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/div>\n    <div class=\"clock-pane\">\n      <div class=\"clock\" id=\"clock\"><span>00\u003c/span><span class=\"colon\">:\u003c/span><span>00\u003c/span>\u003c/div>\n      <div class=\"clock-meta\" id=\"date\">— —\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  <section class=\"eq-banner\">\n    <div class=\"eq-track\" data-scope=\"today\">\n      <div class=\"eq-bars\" data-scope=\"today\">\u003c/div>\n      <div class=\"eq-info\">\n        <div class=\"eq-scope\">今日 TODAY\u003c/div>\n        <div class=\"eq-num\" id=\"t-today-in\">—\u003c/div>\n        <div class=\"eq-row\">↑<span class=\"eq-out-cap\"> <span id=\"t-today-out\">—\u003c/span> out\u003c/span> · <span class=\"eq-hit\" id=\"hit-today\">缓存 —\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    <div class=\"eq-track\" data-scope=\"month\">\n      <div class=\"eq-bars\" data-scope=\"month\">\u003c/div>\n      <div class=\"eq-info\">\n        <div class=\"eq-scope\">本月 MONTH\u003c/div>\n        <div class=\"eq-num\" id=\"t-month-in\">—\u003c/div>\n        <div class=\"eq-row\">↑<span class=\"eq-out-cap\"> <span id=\"t-month-out\">—\u003c/span> out\u003c/span> · <span class=\"eq-hit\" id=\"hit-month\">缓存 —\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n    <div class=\"eq-track\" data-scope=\"total\">\n      <div class=\"eq-bars\" data-scope=\"total\">\u003c/div>\n      <div class=\"eq-info\">\n        <div class=\"eq-scope\">累计 TOTAL\u003c/div>\n        <div class=\"eq-num\" id=\"t-total-in\">—\u003c/div>\n        <div class=\"eq-row\">↑<span class=\"eq-out-cap\"> <span id=\"t-total-out\">—\u003c/span> out\u003c/span> · <span class=\"eq-hit\" id=\"hit-total\">命中 —\u003c/span>\u003c/div>\n      \u003c/div>\n    \u003c/div>\n  \u003c/section>\n\n  <main class=\"body\">\n\n    <section class=\"setlist\">\n      <div class=\"setlist-head\">\n        <div class=\"setlist-title\">Tonight's Set ☆ 今晚歌单\u003c/div>\n        <div class=\"setlist-meta\"><b id=\"sess-count\">0\u003c/b> TRACKS · <span id=\"g-summary\">SOUND CHECK\u003c/span>\u003c/div>\n      \u003c/div>\n      <div class=\"setlist-tracks\" id=\"sessions\">\n        <div class=\"empty-set\">SOUND CHECK\u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    <aside class=\"vu-pane\">\n      <div class=\"vu-head\">\n        <div class=\"vu-title\">Mixer\u003c/div>\n        <div class=\"vu-meta\" id=\"g-label-2\">— —\u003c/div>\n      \u003c/div>\n      <div class=\"disco\">\n        <div class=\"disco-sparkle\">\u003c/div>\n        <div class=\"disco-ball\">\u003c/div>\n      \u003c/div>\n      <div class=\"mixer\" id=\"mixer\">\n        <!-- Channels injected via JS -->\n      \u003c/div>\n    \u003c/aside>\n\n  \u003c/main>\n\u003c/div>\n\n<div id=\"confirm\" aria-hidden=\"true\">\n  <div class=\"curtain left\">\u003c/div>\n  <div class=\"curtain right\">\u003c/div>\n  <div class=\"confetti\" id=\"confetti\">\u003c/div>\n  <div class=\"confirm-clock\" id=\"confirm-clock\">--:--\u003c/div>\n  <div class=\"confirm-inner\">\n    <div class=\"encore-tag\">ENCORE · 等你拍板\u003c/div>\n    <div class=\"confirm-text\">等你拍板\u003c/div>\n    <div class=\"confirm-list\" id=\"confirm-list\">\u003c/div>\n  \u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">— SOUND SYSTEM DOWN —\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI · SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_state, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n/* ============ Dust particles ============ */\n(function dust() {\n  const wrap = document.getElementById('dust');\n  for (let i = 0; i < 30; i++) {\n    const m = document.createElement('div');\n    m.className = 'dust-mote';\n    m.style.left = (Math.random() * 100) + '%';\n    m.style.animationDuration = (14 + Math.random() * 18) + 's';\n    m.style.animationDelay = -(Math.random() * 30) + 's';\n    m.style.opacity = (0.2 + Math.random() * 0.5);\n    m.style.transform = `scale(${0.5 + Math.random()})`;\n    wrap.appendChild(m);\n  }\n})();\n\n/* ============ Confetti for confirm ============ */\n(function confetti() {\n  const wrap = document.getElementById('confetti');\n  const colors = ['#ff3ec0', '#6c33ff', '#00e0ff', '#ffeb3b', '#ff5a3a'];\n  for (let i = 0; i < 70; i++) {\n    const p = document.createElement('div');\n    p.className = 'confetti-piece';\n    p.style.left = (Math.random() * 100) + '%';\n    p.style.setProperty('--cc', colors[Math.floor(Math.random() * colors.length)]);\n    p.style.setProperty('--d', (3 + Math.random() * 4) + 's');\n    p.style.setProperty('--dl', -(Math.random() * 7) + 's');\n    p.style.width = (4 + Math.random() * 6) + 'px';\n    p.style.height = (8 + Math.random() * 8) + 'px';\n    wrap.appendChild(p);\n  }\n})();\n\n/* ============ EQ bars for each scope ============ */\nfunction buildEqBars(scope, count) {\n  const wrap = document.querySelector(`.eq-bars[data-scope=\"${scope}\"]`);\n  if (!wrap) return;\n  wrap.innerHTML = '';\n  for (let i = 0; i < count; i++) {\n    const b = document.createElement('div');\n    b.className = 'eq-bar';\n    b.style.setProperty('--d', (0.35 + Math.random() * 0.35) + 's');\n    b.style.animationDelay = -(Math.random() * 0.6) + 's';\n    wrap.appendChild(b);\n  }\n}\nbuildEqBars('today', 14);\nbuildEqBars('month', 14);\nbuildEqBars('total', 14);\n\n/* ============ Clock ============ */\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours()), mm = C.pad2(now.getMinutes()), ss = C.pad2(now.getSeconds());\n  document.getElementById('clock').innerHTML = `<span>${hh}\u003c/span><span class=\"colon\">:\u003c/span><span>${mm}\u003c/span>`;\n  document.getElementById('date').textContent = C.fmtDate(now).toUpperCase();\n  document.getElementById('confirm-clock').textContent = hh + ':' + mm + ':' + ss;\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n/* ============ Sessions / Setlist ============ */\nfunction renderSessions(sessions, detail) {\n  const panel = document.getElementById('sessions');\n  document.getElementById('sess-count').textContent = sessions.length;\n\n  if (!sessions.length) {\n    panel.innerHTML = '<div class=\"empty-set\">SOUND CHECK\u003c/div>';\n    return;\n  }\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n  const sorted = C.sortSessions(sessions);\n  const VIS = 6;\n  const visible = sorted.slice(0, VIS);\n  const extra = sorted.length - visible.length;\n\n  const tagFor = { working: 'LIVE', thinking: 'CUE', done: 'DONE', idle: 'OFF', needConfirm: 'CALL' };\n\n  panel.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知曲目';\n    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;\n    const age = C.timeAgo(s.updated_at);\n\n    const subBits = [];\n    if (tool)    subBits.push(`<span class=\"track-tool\">${C.esc(tool)}\u003c/span>`);\n    if (target)  subBits.push(`<span class=\"track-target\">${C.esc(target)}\u003c/span>`);\n    const subLine = subBits.length ? `<div class=\"track-sub\">${subBits.join('')}\u003c/div>` : '';\n    const promptLine = prompt ? `<div class=\"track-prompt\">${C.esc(prompt)}\u003c/div>` : '';\n\n    return `\n      <div class=\"track state-${state}\" style=\"animation-delay:${i*70}ms\">\n        <div class=\"track-no\">${String(i+1).padStart(2,'0')}\u003c/div>\n        <div class=\"track-wave\"><div class=\"b\">\u003c/div><div class=\"b\">\u003c/div><div class=\"b\">\u003c/div><div class=\"b\">\u003c/div>\u003c/div>\n        <div class=\"track-info\">\n          <div class=\"track-name\">${C.esc(project)}\u003c/div>\n          ${subLine}${promptLine}\n        \u003c/div>\n        <div class=\"track-meta\">\n          <span class=\"tag\">${tagFor[state] || state}\u003c/span>\n          <span>T+${age}\u003c/span>\n        \u003c/div>\n      \u003c/div>`;\n  }).join('') + (extra > 0 ? `<div class=\"empty-set\" style=\"font-size:14px; opacity:0.6; padding:8px\">+ ${extra} TRACKS IN QUEUE\u003c/div>` : '');\n}\n\nfunction renderTop(gs, sessions) {\n  const labelMap = {\n    working: 'LIVE NOW', thinking: 'CUING UP', done: 'WRAPPED',\n    idle: 'SOUND CHECK', needConfirm: 'STANDBY · ENCORE'\n  };\n  document.getElementById('g-label-2').textContent = labelMap[gs] || 'SOUND CHECK';\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k.toUpperCase()}`);\n  const summary = total === 0 ? 'WAITING FOR LIGHTS'\n    : (labelMap[gs] || 'LIVE NOW') + (parts.length ? ' · ' + parts.join(' · ') : '');\n  document.getElementById('g-summary').textContent = summary;\n\n  // mixer channels reflect state breakdown\n  renderMixer(sessions);\n}\n\nfunction renderMixer(sessions) {\n  const m = document.getElementById('mixer');\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length || 1;\n  const channels = [\n    { id: 'working',     name: 'WORKING',  color: 'var(--c-working)' },\n    { id: 'thinking',    name: 'THINKING', color: 'var(--c-thinking)' },\n    { id: 'done',        name: 'DONE',     color: 'var(--c-done)' },\n    { id: 'idle',        name: 'IDLE',     color: 'var(--c-idle)' },\n    { id: 'needConfirm', name: 'CONFIRM',  color: 'var(--c-confirm)' }\n  ];\n  m.innerHTML = channels.map(ch => {\n    const n = counts[ch.id] || 0;\n    const pct = total ? Math.max(8, Math.min(100, (n / total) * 100)) : 8;\n    return `\n      <div class=\"ch\" style=\"--ch-c: ${ch.color}\">\n        <div class=\"ch-name\"><span class=\"ch-dot\">\u003c/span>${ch.name}\u003c/div>\n        <div class=\"ch-fader\"><div class=\"ch-level\" style=\"--lvl: ${n ? pct : 5}%; opacity: ${n ? 1 : 0.3}\">\u003c/div>\u003c/div>\n        <div class=\"ch-val\">${n}\u003c/div>\n      \u003c/div>`;\n  }).join('');\n}\n\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*120}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知曲目')}\u003c/span>\n      <span class=\"confirm-id\">№ ${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\n/* ============ Tokens ============ */\nfunction setNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  el.style.transition = 'opacity .25s, transform .25s';\n  el.style.opacity = '0';\n  el.style.transform = 'translateY(-3px)';\n  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 230);\n}\n\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setNum('t-today-in',  t.input);  setNum('t-today-out', t.output);\n  setNum('t-month-in',  m.input);  setNum('t-month-out', m.output);\n  setNum('t-total-in',  a.input);  setNum('t-total-out', a.output);\n  const th=C.hitRate(t),mh=C.hitRate(m),ah=C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?`缓存 ${th}%`:'缓存 —';\n  document.getElementById('hit-month').textContent = mh!==null?`缓存 ${mh}%`:'缓存 —';\n  document.getElementById('hit-total').textContent = ah!==null?`命中 ${ah}%`:'命中 —';\n}\n\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n    document.getElementById('stage').classList.toggle('hidden', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n    renderTop(gs, sessions);\n    renderSessions(sessions, detail);\n    renderConfirm(sessions);\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "aurora": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · Aurora\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --bg-deep:    #07091a;\n  --fg:         #ecf0ff;\n  --fg-2:       #b9c0e0;\n  --fg-3:       #7a82a8;\n  --fg-4:       #565d80;\n\n  --c-working:  oklch(0.78 0.16 70);\n  --c-thinking: oklch(0.80 0.14 220);\n  --c-done:     oklch(0.80 0.16 150);\n  --c-idle:     oklch(0.65 0.06 285);\n  --c-confirm:  oklch(0.70 0.22 25);\n\n  --font-serif: \"Instrument Serif\", \"Times New Roman\", serif;\n  --font-mono:  \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n  --font-sans:\n    -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Helvetica Neue\", sans-serif;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: var(--bg-deep);\n  color: var(--fg);\n  font-family: var(--font-sans);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ============================================================\n   AURORA BG — three giant soft gradient blobs that drift\n   ============================================================ */\n.aurora {\n  position: fixed; inset: -20%;\n  z-index: 0;\n  pointer-events: none;\n  filter: blur(80px) saturate(140%);\n  opacity: 0.85;\n  transition: filter 1.6s ease;\n}\n.aurora-blob {\n  position: absolute;\n  border-radius: 50%;\n  mix-blend-mode: screen;\n  will-change: transform;\n}\n.blob-a { width: 60vmax; height: 60vmax; left: -10%;  top: -20%;\n          background: radial-gradient(circle, oklch(0.55 0.20 270) 0%, transparent 60%);\n          animation: drift-a 38s ease-in-out infinite; }\n.blob-b { width: 70vmax; height: 70vmax; right: -15%; top: 10%;\n          background: radial-gradient(circle, oklch(0.60 0.18 200) 0%, transparent 60%);\n          animation: drift-b 52s ease-in-out infinite; }\n.blob-c { width: 55vmax; height: 55vmax; left: 20%; bottom: -25%;\n          background: radial-gradient(circle, oklch(0.50 0.22 320) 0%, transparent 60%);\n          animation: drift-c 44s ease-in-out infinite; }\n.blob-d { width: 40vmax; height: 40vmax; right: 30%; top: 40%;\n          background: radial-gradient(circle, oklch(0.65 0.20 160) 0%, transparent 60%);\n          animation: drift-d 60s ease-in-out infinite; opacity: 0.6; }\n\n@keyframes drift-a {\n  0%,100% { transform: translate(0,0) scale(1); }\n  33%     { transform: translate(15vmin, 10vmin) scale(1.1); }\n  66%     { transform: translate(-10vmin, 20vmin) scale(0.95); }\n}\n@keyframes drift-b {\n  0%,100% { transform: translate(0,0) scale(1); }\n  50%     { transform: translate(-20vmin, 15vmin) scale(1.15); }\n}\n@keyframes drift-c {\n  0%,100% { transform: translate(0,0) scale(0.95); }\n  40%     { transform: translate(20vmin, -15vmin) scale(1.1); }\n  80%     { transform: translate(-12vmin, -25vmin) scale(1); }\n}\n@keyframes drift-d {\n  0%,100% { transform: translate(0,0) scale(1); }\n  50%     { transform: translate(-25vmin, -20vmin) scale(1.2); }\n}\n\n/* state-tinted overlay over aurora */\n.aurora-state {\n  position: fixed; inset: 0;\n  pointer-events: none;\n  z-index: 1;\n  opacity: 0;\n  transition: opacity 1.4s ease, background 1.4s ease;\n  mix-blend-mode: soft-light;\n}\nbody[data-state=\"working\"]     .aurora-state { background: radial-gradient(circle at 30% 70%, oklch(0.75 0.20 70 / 0.5), transparent 60%); opacity: 1; }\nbody[data-state=\"thinking\"]    .aurora-state { background: radial-gradient(circle at 70% 30%, oklch(0.75 0.18 220 / 0.5), transparent 60%); opacity: 1; }\nbody[data-state=\"done\"]        .aurora-state { background: radial-gradient(circle at 50% 50%, oklch(0.75 0.18 150 / 0.4), transparent 60%); opacity: 1; }\nbody[data-state=\"needConfirm\"] .aurora-state { background: radial-gradient(circle at 50% 50%, oklch(0.70 0.30 25  / 0.85), transparent 70%); opacity: 1; }\n\n/* film grain */\nbody::after {\n  content: '';\n  position: fixed; inset: 0;\n  z-index: 2;\n  pointer-events: none;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/>\u003c/filter><rect width='200' height='200' filter='url(%23n)' opacity='0.55'/>\u003c/svg>\");\n  opacity: 0.07;\n  mix-blend-mode: overlay;\n}\n\n/* ============================================================\n   Layout\n   ============================================================ */\n#stage {\n  position: relative; z-index: 5;\n  width: 100%; height: 100%;\n  padding: clamp(22px, 2.6vw, 40px);\n  display: grid;\n  grid-template-rows: auto 1fr;\n  gap: clamp(20px, 2vw, 32px);\n  transition: opacity 0.5s;\n}\n#stage.hidden { opacity: 0; pointer-events: none; }\n\n/* TOP — clock + status eyebrow */\nheader.top {\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-start;\n  gap: var(--gap);\n}\n\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 8px 16px;\n  border-radius: 999px;\n  background: oklch(0.18 0.04 270 / 0.5);\n  border: 1px solid oklch(0.80 0.04 270 / 0.18);\n  backdrop-filter: blur(20px) saturate(150%);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.15em;\n  color: var(--fg-2);\n  text-transform: uppercase;\n}\n.dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--c-idle);\n}\n.dot-working     { background: var(--c-working);  box-shadow: 0 0 0 4px oklch(0.78 0.16 70 / 0.22), 0 0 18px oklch(0.78 0.16 70 / 0.6); animation: none; }\n.dot-thinking    { background: var(--c-thinking); box-shadow: 0 0 0 4px oklch(0.80 0.14 220 / 0.22), 0 0 18px oklch(0.80 0.14 220 / 0.6); animation: none; }\n.dot-done        { background: var(--c-done);     box-shadow: 0 0 0 4px oklch(0.80 0.16 150 / 0.20), 0 0 14px oklch(0.80 0.16 150 / 0.5); }\n.dot-idle        { background: var(--c-idle);     box-shadow: none; opacity: 0.6; }\n.dot-needConfirm { background: var(--c-confirm);  box-shadow: 0 0 0 4px oklch(0.70 0.22 25 / 0.35), 0 0 24px oklch(0.70 0.22 25 / 0.8); animation: none; }\n\n@keyframes breathe {\n  0%,100% { transform: scale(1);    filter: brightness(1); }\n  50%     { transform: scale(1.25); filter: brightness(1.3); }\n}\n\n.clock-cluster {\n  text-align: right;\n  font-family: var(--font-serif);\n  line-height: 1;\n}\n.clock {\n  font-size: clamp(48px, 7vw, 96px);\n  font-weight: 400;\n  letter-spacing: -0.02em;\n  color: var(--fg);\n  text-shadow: 0 4px 40px oklch(0.6 0.15 270 / 0.5);\n}\n.clock .colon { opacity: 0.5; animation: blink 2s ease-in-out infinite; }\n@keyframes blink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }\n.date {\n  margin-top: 8px;\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1vw, 14px);\n  letter-spacing: 0.12em;\n  color: var(--fg-3);\n  text-transform: uppercase;\n}\n\n/* BODY — sessions left / token right */\nmain.body {\n  display: grid;\n  grid-template-columns: minmax(0, 1.7fr) minmax(280px, 1fr);\n  gap: clamp(20px, 2vw, 32px);\n  min-height: 0;\n}\n\n@media (orientation: portrait), (max-width: 820px) {\n  main.body { grid-template-columns: 1fr; grid-template-rows: auto auto; }\n  .sessions-col, .tokens-col { min-height: 0; }\n  .sessions { flex: 0 0 auto; overflow: visible; }\n  .card { flex-shrink: 0; }\n}\n\n/* Section heading */\n.section-h {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  margin-bottom: clamp(12px, 1.2vw, 18px);\n}\n.section-title {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(22px, 2.4vw, 32px);\n  color: var(--fg);\n  letter-spacing: -0.01em;\n}\n.section-meta {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.1em;\n}\n\n/* sessions column */\n.sessions-col { display: flex; flex-direction: column; min-height: 0; }\n.sessions {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  gap: clamp(10px, 1vw, 16px);\n  overflow-y: auto;\n  scrollbar-width: none;\n  padding-right: 6px;\n  min-height: 0;\n}\n.sessions::-webkit-scrollbar { display: none; }\n\n/* ───── glass session card ───── */\n.card {\n  position: relative;\n  padding: clamp(14px, 1.4vw, 20px) clamp(16px, 1.6vw, 22px);\n  border-radius: 20px;\n  background: oklch(0.20 0.04 270 / 0.42);\n  backdrop-filter: blur(28px) saturate(160%);\n  -webkit-backdrop-filter: blur(28px) saturate(160%);\n  border: 1px solid oklch(0.85 0.03 270 / 0.10);\n  overflow: hidden;\n  animation: none;\n  transition: transform 0.4s, border-color 0.6s;\n}\n.card::before { /* inner glow / top highlight */\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  pointer-events: none;\n  background:\n    linear-gradient(135deg, oklch(1 0 0 / 0.10) 0%, transparent 35%),\n    radial-gradient(120% 80% at 0% 0%, oklch(1 0 0 / 0.08), transparent 50%);\n}\n.card::after { /* state hue veil */\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity 1s;\n}\n.card.state-working::after     { opacity: 1; background: linear-gradient(135deg, oklch(0.78 0.16 70 / 0.15), transparent 70%); }\n.card.state-thinking::after    { opacity: 1; background: linear-gradient(135deg, oklch(0.80 0.14 220 / 0.15), transparent 70%); }\n.card.state-done::after        { opacity: 1; background: linear-gradient(135deg, oklch(0.80 0.16 150 / 0.10), transparent 70%); }\n.card.state-needConfirm::after { opacity: 1; background: linear-gradient(135deg, oklch(0.70 0.22 25 / 0.22), transparent 70%); animation: confirm-veil 1.4s ease-in-out infinite; }\n@keyframes confirm-veil { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }\n\n.card.state-working     { border-color: oklch(0.78 0.16 70 / 0.30); }\n.card.state-thinking    { border-color: oklch(0.80 0.14 220 / 0.30); }\n.card.state-done        { border-color: oklch(0.80 0.16 150 / 0.25); }\n.card.state-needConfirm { border-color: oklch(0.70 0.22 25 / 0.50); }\n.card.state-idle        { opacity: 0.62; }\n\n@keyframes card-in {\n  from { opacity: 0; transform: translateY(8px) scale(0.985); }\n  to   { opacity: 1; transform: none; }\n}\n\n.card-row1 {\n  display: flex; align-items: center; gap: 10px;\n  margin-bottom: 6px;\n}\n.card-badge {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  padding: 3px 9px;\n  border-radius: 999px;\n  border: 1px solid;\n  flex-shrink: 0;\n}\n.badge-working     { color: var(--c-working);  border-color: oklch(0.78 0.16 70 / 0.45);  background: oklch(0.78 0.16 70 / 0.10); }\n.badge-thinking    { color: var(--c-thinking); border-color: oklch(0.80 0.14 220 / 0.45); background: oklch(0.80 0.14 220 / 0.10); }\n.badge-done        { color: var(--c-done);     border-color: oklch(0.80 0.16 150 / 0.45); background: oklch(0.80 0.16 150 / 0.10); }\n.badge-needConfirm { color: oklch(0.92 0.10 25); border-color: oklch(0.70 0.22 25 / 0.60); background: oklch(0.70 0.22 25 / 0.18); }\n.badge-idle        { color: var(--fg-3);       border-color: oklch(0.40 0.02 270 / 0.5);  background: transparent; }\n\n.card-project {\n  font-family: var(--font-serif);\n  font-size: clamp(18px, 1.7vw, 26px);\n  color: var(--fg);\n  letter-spacing: -0.01em;\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  flex: 1;\n  min-width: 0;\n}\n.card-id {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-4);\n  letter-spacing: 0.05em;\n}\n.card-age {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-4);\n}\n\n.card-tool {\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1vw, 14px);\n  color: var(--fg-2);\n  display: flex; align-items: baseline; gap: 8px;\n  margin-top: 2px;\n  margin-bottom: 6px;\n}\n.card-tool-name {\n  color: oklch(0.85 0.10 220);\n  font-weight: 500;\n}\n.card-tool-name::before { content: '→ '; color: var(--fg-4); margin-right: 2px; }\n.card-tool-target {\n  color: var(--fg-2);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  min-width: 0;\n}\n\n.card-prompt {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(13px, 1.2vw, 17px);\n  color: var(--fg-2);\n  line-height: 1.45;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  opacity: 0.85;\n}\n.card-prompt::before { content: '“'; color: var(--fg-4); }\n.card-prompt::after  { content: '”'; color: var(--fg-4); }\n\n.placeholder {\n  flex: 1;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(18px, 1.8vw, 24px);\n  color: var(--fg-3);\n  opacity: 0.7;\n  border-radius: 20px;\n  background: oklch(0.15 0.04 270 / 0.25);\n  backdrop-filter: blur(16px);\n  border: 1px dashed oklch(0.85 0.03 270 / 0.10);\n  min-height: 100px;\n}\n\n.more {\n  text-align: center;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-4);\n  letter-spacing: 0.1em;\n  padding-top: 6px;\n}\n\n/* ───── token panel ───── */\n.token-col {\n  display: flex; flex-direction: column; min-height: 0;\n}\n.token-stack {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  gap: clamp(10px, 1vw, 14px);\n  min-height: 0;\n}\n.tok {\n  position: relative;\n  flex: 1;\n  padding: clamp(14px, 1.4vw, 20px);\n  border-radius: 18px;\n  background: oklch(0.20 0.04 270 / 0.42);\n  backdrop-filter: blur(24px) saturate(160%);\n  border: 1px solid oklch(0.85 0.03 270 / 0.10);\n  overflow: hidden;\n  display: flex; flex-direction: column; gap: 8px;\n}\n.tok::before {\n  content: '';\n  position: absolute; inset: 0;\n  background: linear-gradient(135deg, oklch(1 0 0 / 0.08), transparent 40%);\n  pointer-events: none; border-radius: inherit;\n}\n.tok-h {\n  display: flex; align-items: baseline; justify-content: space-between;\n}\n.tok-scope {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(15px, 1.4vw, 19px);\n  color: var(--fg);\n}\n.tok-hit {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--c-done);\n  letter-spacing: 0.08em;\n}\n.tok-stats {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: clamp(10px, 1vw, 16px);\n  align-items: end;\n}\n.tok-stat {\n  display: flex; flex-direction: column; gap: 4px;\n}\n.tok-num {\n  font-family: var(--font-serif);\n  font-size: clamp(28px, 3vw, 46px);\n  font-weight: 400;\n  line-height: 0.95;\n  letter-spacing: -0.02em;\n  white-space: nowrap;\n}\n.tok-in  { color: var(--fg); }\n.tok-out { color: oklch(0.86 0.14 70); }\n.tok-cap {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-4);\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n}\n\n/* digit roll animation */\n.tok-num .digit {\n  display: inline-block;\n  transition: transform 0.5s cubic-bezier(.2,.8,.2,1);\n}\n\n/* ============================================================\n   needConfirm — radial wash takeover\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  opacity: 0;\n  pointer-events: none;\n  display: flex; align-items: center; justify-content: center;\n  transition: opacity 0.6s;\n  background:\n    radial-gradient(circle at 50% 45%,\n      oklch(0.30 0.16 25 / 0.65),\n      oklch(0.10 0.10 25 / 0.95) 70%);\n  backdrop-filter: blur(30px);\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n\n.confirm-shake {\n  position: absolute; inset: 0;\n  pointer-events: none;\n  box-shadow: inset 0 0 0 2px oklch(0.70 0.22 25 / 0.4);\n  animation: ring-pulse 2.2s ease-in-out infinite;\n}\n@keyframes ring-pulse {\n  0%,100% { box-shadow: inset 0 0 0 2px oklch(0.70 0.22 25 / 0.30), inset 0 0 80px  oklch(0.70 0.22 25 / 0.18); }\n  50%     { box-shadow: inset 0 0 0 3px oklch(0.70 0.22 25 / 0.55), inset 0 0 180px oklch(0.70 0.22 25 / 0.38); }\n}\n\n.confirm-inner {\n  text-align: center;\n  padding: 40px;\n  max-width: 90vw;\n}\n.confirm-eyebrow {\n  display: inline-flex; align-items: center; gap: 10px;\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1.1vw, 14px);\n  letter-spacing: 0.4em;\n  color: oklch(0.92 0.08 25);\n  padding: 8px 18px;\n  border-radius: 999px;\n  background: oklch(0.22 0.10 25 / 0.5);\n  border: 1px solid oklch(0.70 0.22 25 / 0.4);\n  margin-bottom: clamp(20px, 3vw, 36px);\n}\n.confirm-text {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(70px, 12vw, 200px);\n  font-weight: 400;\n  color: oklch(0.97 0.04 25);\n  letter-spacing: -0.04em;\n  line-height: 1.0;\n  text-shadow: 0 8px 80px oklch(0.70 0.22 25 / 0.7);\n  margin-bottom: clamp(20px, 3vw, 36px);\n  animation: text-glow 2.2s ease-in-out infinite;\n}\n@keyframes text-glow {\n  0%,100% { text-shadow: 0 8px 60px oklch(0.70 0.22 25 / 0.5); }\n  50%     { text-shadow: 0 8px 140px oklch(0.70 0.22 25 / 0.9); }\n}\n.confirm-sessions {\n  display: flex; flex-direction: column; gap: 10px; align-items: center;\n}\n.confirm-row {\n  display: inline-flex; align-items: baseline; gap: 16px;\n  padding: 10px 22px;\n  border-radius: 999px;\n  background: oklch(0.22 0.06 25 / 0.5);\n  border: 1px solid oklch(0.70 0.22 25 / 0.4);\n  backdrop-filter: blur(20px);\n  animation: none;\n}\n@keyframes row-in {\n  from { opacity: 0; transform: translateY(8px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(22px, 2.4vw, 32px);\n  color: oklch(0.97 0.04 25);\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1vw, 13px);\n  color: oklch(0.85 0.08 25);\n  letter-spacing: 0.05em;\n}\n\n.confirm-clock {\n  position: absolute;\n  top: 28px; right: 32px;\n  font-family: var(--font-serif);\n  font-size: 22px;\n  color: oklch(0.92 0.08 25);\n  letter-spacing: 0.02em;\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: oklch(0.10 0.04 270 / 0.92);\n  backdrop-filter: blur(20px);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 12px;\n  z-index: 80;\n}\n.err-title {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(24px, 3vw, 40px);\n  color: oklch(0.85 0.20 25);\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--fg-3);\n  letter-spacing: 0.1em;\n}\n\u003c/style>\n\u003c/head>\n<body data-state=\"idle\">\n\n<div class=\"aurora\">\n  <div class=\"aurora-blob blob-a\">\u003c/div>\n  <div class=\"aurora-blob blob-b\">\u003c/div>\n  <div class=\"aurora-blob blob-c\">\u003c/div>\n  <div class=\"aurora-blob blob-d\">\u003c/div>\n\u003c/div>\n<div class=\"aurora-state\">\u003c/div>\n\n<div id=\"stage\">\n  <header class=\"top\">\n    <div class=\"eyebrow\">\n      <span id=\"g-dot\" class=\"dot dot-idle\">\u003c/span>\n      <span id=\"g-label\">IDLE\u003c/span>\n      <span style=\"opacity:.4\">·\u003c/span>\n      <span id=\"g-summary\">无活动 session\u003c/span>\n    \u003c/div>\n    <div class=\"clock-cluster\">\n      <div class=\"clock\" id=\"clock\"><span>00\u003c/span><span class=\"colon\">:\u003c/span><span>00\u003c/span>\u003c/div>\n      <div class=\"date\" id=\"date\">— —\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  <main class=\"body\">\n    <section class=\"sessions-col\">\n      <div class=\"section-h\">\n        <span class=\"section-title\">Sessions\u003c/span>\n        <span class=\"section-meta\"><span id=\"sess-count\">0\u003c/span> ACTIVE\u003c/span>\n      \u003c/div>\n      <div class=\"sessions\" id=\"sessions\">\n        <div class=\"placeholder\">awaiting signal…\u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    <aside class=\"token-col\">\n      <div class=\"section-h\">\n        <span class=\"section-title\">Token Flow\u003c/span>\n        <span class=\"section-meta\" id=\"tok-updated\">— —\u003c/span>\n      \u003c/div>\n      <div class=\"token-stack\">\n        <div class=\"tok\">\n          <div class=\"tok-h\"><span class=\"tok-scope\">今日\u003c/span><span class=\"tok-hit\" id=\"hit-today\">缓存 —\u003c/span>\u003c/div>\n          <div class=\"tok-stats\">\n            <div class=\"tok-stat\"><span class=\"tok-num tok-in\"  id=\"t-today-in\">—\u003c/span><span class=\"tok-cap\">输入\u003c/span>\u003c/div>\n            <div class=\"tok-stat\"><span class=\"tok-num tok-out\" id=\"t-today-out\">—\u003c/span><span class=\"tok-cap\">输出\u003c/span>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        <div class=\"tok\">\n          <div class=\"tok-h\"><span class=\"tok-scope\">本月\u003c/span><span class=\"tok-hit\" id=\"hit-month\">缓存 —\u003c/span>\u003c/div>\n          <div class=\"tok-stats\">\n            <div class=\"tok-stat\"><span class=\"tok-num tok-in\"  id=\"t-month-in\">—\u003c/span><span class=\"tok-cap\">输入\u003c/span>\u003c/div>\n            <div class=\"tok-stat\"><span class=\"tok-num tok-out\" id=\"t-month-out\">—\u003c/span><span class=\"tok-cap\">输出\u003c/span>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        <div class=\"tok\">\n          <div class=\"tok-h\"><span class=\"tok-scope\">累计\u003c/span><span class=\"tok-hit\" id=\"hit-total\">缓存命中 —\u003c/span>\u003c/div>\n          <div class=\"tok-stats\">\n            <div class=\"tok-stat\"><span class=\"tok-num tok-in\"  id=\"t-total-in\">—\u003c/span><span class=\"tok-cap\">输入\u003c/span>\u003c/div>\n            <div class=\"tok-stat\"><span class=\"tok-num tok-out\" id=\"t-total-out\">—\u003c/span><span class=\"tok-cap\">输出\u003c/span>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/aside>\n  \u003c/main>\n\u003c/div>\n\n<div id=\"confirm\" aria-hidden=\"true\">\n  <div class=\"confirm-shake\">\u003c/div>\n  <div class=\"confirm-inner\">\n    <div class=\"confirm-eyebrow\"><span class=\"dot dot-needConfirm\">\u003c/span><span>NEED CONFIRMATION\u003c/span>\u003c/div>\n    <div class=\"confirm-text\">等你拍板\u003c/div>\n    <div class=\"confirm-sessions\" id=\"confirm-list\">\u003c/div>\n  \u003c/div>\n  <div class=\"confirm-clock\" id=\"confirm-clock\">--:--\u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">连接 Mac 失败\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI / SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_s
