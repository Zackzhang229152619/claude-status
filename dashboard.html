<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- no-cache injection -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-touch-fullscreen" content="yes">
<title>Claude Status</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #050609;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #theme-frame {
    width: 100%; height: 100%;
    border: 0;
    display: block;
    background: #050609;
  }

  /* Theme picker — gear button + sheet */
  #picker-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0) + 14px);
    right: calc(env(safe-area-inset-right, 0) + 14px);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(20,20,28,0.78);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 9000;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    transition: transform 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    font-size: 0;
  }
  #picker-btn:hover { transform: scale(1.05); background: rgba(35,35,48,0.85); }
  #picker-btn:active { transform: scale(0.95); }
  #picker-btn svg { width: 22px; height: 22px; }

  /* Fullscreen toggle — sibling of picker-btn */
  #fs-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0) + 14px);
    right: calc(env(safe-area-inset-right, 0) + 68px);  /* 14 + 44 + 10 gap */
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(20,20,28,0.78);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 9000;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    transition: transform 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    font-size: 0;
  }
  #fs-btn:hover { transform: scale(1.05); background: rgba(35,35,48,0.85); }
  #fs-btn:active { transform: scale(0.95); }
  #fs-btn svg { width: 20px; height: 20px; }
  #fs-btn .fs-exit { display: none; }
  :fullscreen #fs-btn .fs-enter { display: none; }
  :fullscreen #fs-btn .fs-exit { display: block; }

  #picker-sheet {
    position: fixed; inset: 0;
    z-index: 9001;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  #picker-sheet.visible { display: flex; animation: pk-fade 0.2s ease; }
  @keyframes pk-fade { from { opacity: 0; } to { opacity: 1; } }

  .pk-card-wrap {
    max-width: min(560px, 92vw);
    max-height: 86vh;
    overflow: auto;
    background: rgba(22,24,32,0.96);
    backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: clamp(18px, 2vw, 28px);
    color: #fff;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: pk-pop 0.25s cubic-bezier(0.2, 1.5, 0.4, 1);
  }
  @keyframes pk-pop {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: none; }
  }
  .pk-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .pk-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .pk-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .pk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .pk-card {
    position: relative;
    padding: 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
    color: #fff;
    font: inherit;
  }
  .pk-card:hover {
    background: rgba(255,255,255,0.10);
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.18);
  }
  .pk-card.active {
    border-color: #6cf;
    background: rgba(80,180,255,0.10);
  }
  .pk-card.active::after {
    content: '✓';
    position: absolute;
    top: 8px; right: 10px;
    color: #6cf;
    font-size: 13px;
    font-weight: 700;
  }
  .pk-swatch {
    width: 100%; aspect-ratio: 16 / 9;
    border-radius: 8px;
    margin-bottom: 8px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .pk-name { font-size: 13px; font-weight: 600; }
  .pk-desc {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  .pk-close {
    margin-top: 14px;
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: rgba(255,255,255,0.8);
    font: inherit; font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .pk-close:hover { background: rgba(255,255,255,0.10); color: #fff; }

  #boot-splash {
    position: fixed; inset: 0;
    background: #050609;
    color: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    z-index: 100;
    transition: opacity 0.4s;
  }
  #boot-splash.hidden { opacity: 0; pointer-events: none; }
  .boot-dot { animation: boot 1.4s steps(4) infinite; }
  @keyframes boot {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }
  .boot-dot::after { content: ''; animation: boot 1.4s steps(4) infinite; }
</style>
</head>
<body>

<iframe id="theme-frame" title="Status"></iframe>

<button id="fs-btn" title="全屏 / 退出全屏" aria-label="Toggle fullscreen" onclick="(function(){if(document.fullscreenElement){document.exitFullscreen();}else{document.documentElement.requestFullscreen().catch(function(){});}})()">
  <svg class="fs-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/>
  </svg>
  <svg class="fs-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 4v4a1 1 0 0 1-1 1H4M15 4v4a1 1 0 0 0 1 1h4M9 20v-4a1 1 0 0 0-1-1H4M15 20v-4a1 1 0 0 1 1-1h4"/>
  </svg>
</button>

<button id="picker-btn" title="切换主题" aria-label="Switch theme">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.2"/>
    <circle cx="12" cy="12" r="9"/>
    <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>
  </svg>
</button>

<div id="picker-sheet" aria-hidden="true"></div>

<div id="boot-splash">LOADING<span class="boot-dot"></span></div>

<script id="themes-data" type="application/json">[{"id":"jarvis","name":"Iron Man","desc":"JARVIS HUD","swatch":"radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)"},{"id":"stage","name":"Live Stage","desc":"演出现场","swatch":"radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)"},{"id":"aurora","name":"Aurora","desc":"极光环境屏","swatch":"radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)"},{"id":"press","name":"Press","desc":"编辑部大屏","swatch":"linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)"},{"id":"glass","name":"Glass","desc":"玻璃浮层","swatch":"linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)"},{"id":"garden","name":"Garden","desc":"信息花园","swatch":"linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)"},{"id":"lab","name":"Lab","desc":"实验台","swatch":"linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)"}]</script>
<script id="themes-templates" type="application/json">{"jarvis": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · J.A.R.V.I.S\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --bg-0:    #050609;\n  --bg-1:    #0c1018;\n  --hud:     #29d6ff;   /* arc reactor cyan */\n  --hud-2:   #5be7ff;\n  --gold:    #e8a338;\n  --red:     #ff2538;\n  --red-2:   #ff5868;\n  --grid:    rgba(41, 214, 255, 0.10);\n\n  --fg:      #e9f7ff;\n  --fg-2:    #9fc7d8;\n  --fg-3:    #5e8094;\n  --fg-4:    #36556a;\n\n  --font-display: \"Orbitron\", \"Helvetica Neue\", sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n  --font-sans:    -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: var(--bg-0);\n  color: var(--fg);\n  font-family: var(--font-sans);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ============================================================\n   Layer 0 — grid + radial vignette\n   ============================================================ */\n.bg-grid {\n  position: fixed; inset: 0;\n  background-image:\n    linear-gradient(var(--grid) 1px, transparent 1px),\n    linear-gradient(90deg, var(--grid) 1px, transparent 1px);\n  background-size: 48px 48px;\n  background-position: 0 0, 0 0;\n  mask-image: radial-gradient(ellipse at 50% 50%, #000 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse at 50% 50%, #000 30%, transparent 80%);\n  animation: grid-pan 60s linear infinite;\n  z-index: 0;\n}\n@keyframes grid-pan {\n  from { background-position: 0 0, 0 0; }\n  to   { background-position: 48px 48px, 48px 48px; }\n}\n\n.bg-radial {\n  position: fixed; inset: 0;\n  background: radial-gradient(ellipse at 50% 50%, rgba(41,214,255,0.07) 0%, transparent 55%),\n              radial-gradient(ellipse at 50% 100%, rgba(255,37,56,0.08) 0%, transparent 60%);\n  z-index: 0;\n}\n\n/* ============================================================\n   Layer 1 — animated HUD elements\n   ============================================================ */\n.hud-rings {\n  position: fixed;\n  top: 50%; left: 50%;\n  width: 120vmin; height: 120vmin;\n  transform: translate(-50%, -50%);\n  pointer-events: none;\n  z-index: 1;\n  opacity: 0.30;\n  mix-blend-mode: screen;\n}\n.hud-rings svg { width: 100%; height: 100%; }\n.hud-ring {\n  fill: none;\n  stroke: var(--hud);\n  stroke-width: 1;\n  transform-origin: center;\n  transform-box: fill-box;\n}\n.spin-cw  { animation: spin 60s linear infinite; }\n.spin-ccw { animation: spin 90s linear infinite reverse; }\n.spin-fast { animation: spin 22s linear infinite; }\n@keyframes spin { to { transform: rotate(360deg); } }\n\n/* scanline */\n.scanline {\n  position: fixed;\n  left: 0; right: 0;\n  height: 80px;\n  background: linear-gradient(180deg, transparent 0%, rgba(41,214,255,0.05) 50%, transparent 100%);\n  pointer-events: none;\n  z-index: 2;\n  animation: scanline 6s linear infinite;\n  mix-blend-mode: screen;\n}\n@keyframes scanline {\n  from { top: -10%; }\n  to   { top: 110%; }\n}\n\n/* data rain — falling characters */\n.data-rain {\n  position: fixed; inset: 0;\n  pointer-events: none;\n  z-index: 1;\n  overflow: hidden;\n  opacity: 0.18;\n  mix-blend-mode: screen;\n}\n.rain-col {\n  position: absolute;\n  top: -20%;\n  width: 14px;\n  text-align: center;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--hud);\n  line-height: 16px;\n  letter-spacing: 0;\n  white-space: pre;\n  animation: rain-fall linear infinite;\n  text-shadow: 0 0 8px var(--hud);\n}\n@keyframes rain-fall {\n  from { transform: translateY(-100%); }\n  to   { transform: translateY(120vh); }\n}\n\n/* ============================================================\n   Stage\n   ============================================================ */\n#stage {\n  position: relative;\n  z-index: 5;\n  width: 100%; height: 100%;\n  padding: clamp(18px, 2vw, 32px) clamp(20px, 2.4vw, 40px);\n  display: grid;\n  grid-template-rows: auto 1fr;\n  gap: clamp(14px, 1.5vw, 24px);\n  transition: opacity 0.5s, filter 0.5s;\n}\n#stage.hidden { opacity: 0.15; filter: blur(3px); pointer-events: none; }\n\n/* ============================================================\n   Top — JARVIS bar + arc reactor + clock\n   ============================================================ */\n.top {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: clamp(14px, 1.4vw, 22px);\n  align-items: center;\n}\n\n.arc-reactor {\n  position: relative;\n  width: clamp(56px, 6vw, 84px);\n  height: clamp(56px, 6vw, 84px);\n  flex-shrink: 0;\n}\n.arc-reactor svg { width: 100%; height: 100%; overflow: visible; }\n.arc-core {\n  fill: var(--hud);\n  filter: drop-shadow(0 0 12px var(--hud)) drop-shadow(0 0 24px var(--hud));\n  animation: arc-pulse 2.6s ease-in-out infinite;\n}\n@keyframes arc-pulse {\n  0%,100% { opacity: 0.85; }\n  50%     { opacity: 1; filter: drop-shadow(0 0 18px var(--hud)) drop-shadow(0 0 36px var(--hud)); }\n}\n.arc-spoke {\n  fill: var(--hud);\n  opacity: 0.6;\n  transform-origin: center;\n  transform-box: fill-box;\n}\n.arc-spoke-group { transform-origin: center; transform-box: fill-box; animation: spin 14s linear infinite; }\n.arc-outer-group { transform-origin: center; transform-box: fill-box; animation: spin 28s linear infinite reverse; }\n\n/* JARVIS status bar */\n.jarvis-bar {\n  display: flex;\n  flex-direction: column;\n  gap: 4px;\n  min-width: 0;\n}\n.jarvis-title {\n  display: flex;\n  align-items: baseline;\n  gap: 10px;\n  font-family: var(--font-display);\n  font-size: clamp(13px, 1.2vw, 17px);\n  font-weight: 700;\n  letter-spacing: 0.3em;\n  color: var(--hud);\n  text-transform: uppercase;\n  text-shadow: 0 0 14px rgba(41,214,255,0.6);\n}\n.jarvis-title .dot-sep { color: var(--fg-4); }\n.jarvis-title .subt { font-weight: 400; color: var(--fg-2); letter-spacing: 0.15em; font-size: 0.78em; }\n\n.jarvis-status {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1vw, 13px);\n  color: var(--fg-2);\n  letter-spacing: 0.06em;\n  min-width: 0;\n  height: 26px;\n}\n.j-label {\n  text-transform: uppercase;\n  color: var(--hud);\n  font-weight: 600;\n  letter-spacing: 0.18em;\n}\n.j-summary {\n  color: var(--fg-2);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  min-width: 0; flex: 1;\n}\n.j-bar {\n  width: 80px; height: 4px;\n  background: rgba(41,214,255,0.12);\n  border: 1px solid rgba(41,214,255,0.30);\n  border-radius: 2px;\n  position: relative;\n  overflow: hidden;\n}\n.j-bar::after {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(90deg, transparent, var(--hud), transparent);\n  width: 30%;\n  animation: bar-sweep 2.4s linear infinite;\n}\n@keyframes bar-sweep {\n  from { transform: translateX(-100%); }\n  to   { transform: translateX(330%); }\n}\n\n/* dot */\n.dot {\n  width: 9px; height: 9px;\n  border-radius: 50%;\n  background: var(--fg-4);\n}\n.dot-working     { background: var(--gold); box-shadow: 0 0 12px var(--gold); animation: none; }\n.dot-thinking    { background: var(--hud); box-shadow: 0 0 12px var(--hud); animation: none; }\n.dot-done        { background: #5cf78a; box-shadow: 0 0 10px #5cf78a; }\n.dot-idle        { background: var(--fg-4); }\n.dot-needConfirm { background: var(--red); box-shadow: 0 0 18px var(--red); animation: none; }\n@keyframes soft-breathe {\n  0%,100% { transform: scale(1);    filter: brightness(1);   opacity: 1; }\n  50%     { transform: scale(1.08); filter: brightness(1.2); opacity: 0.92; }\n}\n@keyframes pulse-d {\n  0%,100% { transform: scale(1); opacity: 1; }\n  50%     { transform: scale(1.35); opacity: 0.7; }\n}\n\n/* Clock — HUD readout */\n.clock-block {\n  position: relative;\n  padding: 10px 16px;\n  border: 1px solid rgba(41,214,255,0.40);\n  border-radius: 4px;\n  background: rgba(8,18,28,0.5);\n  font-family: var(--font-mono);\n  text-align: right;\n  min-width: 130px;\n}\n.clock-block::before, .clock-block::after {\n  content: '';\n  position: absolute;\n  width: 10px; height: 10px;\n  border-color: var(--hud);\n}\n.clock-block::before { top: -1px; left: -1px;  border-top: 1.5px solid; border-left: 1.5px solid; }\n.clock-block::after  { bottom: -1px; right: -1px; border-bottom: 1.5px solid; border-right: 1.5px solid; }\n\n.clock {\n  font-family: var(--font-display);\n  font-size: clamp(22px, 2.6vw, 34px);\n  font-weight: 700;\n  color: var(--hud);\n  letter-spacing: 0.04em;\n  text-shadow: 0 0 12px rgba(41,214,255,0.5);\n  line-height: 1;\n}\n.clock .colon { animation: blink 1s ease-in-out infinite; opacity: 0.8; }\n@keyframes blink { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }\n.clock-meta {\n  margin-top: 3px;\n  font-size: 9px;\n  letter-spacing: 0.25em;\n  color: var(--fg-3);\n  text-transform: uppercase;\n}\n\n/* ============================================================\n   Body\n   ============================================================ */\n.body {\n  display: grid;\n  grid-template-columns: minmax(0, 1.7fr) minmax(280px, 1fr);\n  gap: clamp(14px, 1.5vw, 24px);\n  min-height: 0;\n}\nbody[data-orient=\"portrait\"] .body,\nbody[data-size=\"phone\"] .body {\n  grid-template-columns: 1fr;\n  grid-template-rows: minmax(0, 1.6fr) auto;\n}\n\n/* ============================================================\n   Panel chrome — HUD-style bracketed container\n   ============================================================ */\n.panel {\n  position: relative;\n  border: 1px solid rgba(41,214,255,0.30);\n  background:\n    linear-gradient(180deg, rgba(8,18,28,0.55), rgba(8,18,28,0.25)),\n    rgba(8,18,28,0.4);\n  padding: clamp(14px, 1.4vw, 22px);\n  display: flex;\n  flex-direction: column;\n  min-height: 0;\n  border-radius: 2px;\n}\n.panel::before, .panel::after {\n  content: '';\n  position: absolute;\n  width: 16px; height: 16px;\n  border-color: var(--hud);\n}\n.panel::before { top: -2px; left: -2px;  border-top: 2px solid; border-left: 2px solid; }\n.panel::after  { bottom: -2px; right: -2px; border-bottom: 2px solid; border-right: 2px solid; }\n\n.panel-tag {\n  position: absolute;\n  top: -8px; left: 16px;\n  background: var(--bg-0);\n  padding: 0 8px;\n  font-family: var(--font-display);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.3em;\n  color: var(--hud);\n  text-transform: uppercase;\n}\n.panel-tag::before {\n  content: '◆';\n  margin-right: 6px;\n  font-size: 8px;\n  vertical-align: middle;\n  color: var(--hud);\n  animation: none;\n}\n@keyframes tag-breathe { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }\n\n.panel-meta {\n  position: absolute;\n  top: -8px; right: 16px;\n  background: var(--bg-0);\n  padding: 0 8px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.15em;\n  color: var(--fg-3);\n  text-transform: uppercase;\n}\n\n/* ============================================================\n   Sessions\n   ============================================================ */\n.sessions-list {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  overflow-y: auto;\n  scrollbar-width: none;\n  padding: 8px 6px 4px;\n  margin-top: 8px;\n  min-height: 0;\n}\n.sessions-list::-webkit-scrollbar { display: none; }\n\n.target {\n  position: relative;\n  padding: clamp(10px, 1.1vw, 14px) clamp(14px, 1.4vw, 18px);\n  border: 1px solid rgba(41,214,255,0.18);\n  background: linear-gradient(135deg, rgba(41,214,255,0.04), transparent 70%);\n  animation: none;\n  font-family: var(--font-mono);\n  transition: border-color 0.3s;\n}\n@keyframes target-in {\n  from { opacity: 0; transform: translateX(-20px); clip-path: inset(0 100% 0 0); }\n  to   { opacity: 1; transform: none; clip-path: inset(0 0 0 0); }\n}\n.target::before, .target::after {\n  content: '';\n  position: absolute;\n  width: 8px; height: 8px;\n  border-color: var(--hud);\n  opacity: 0.7;\n}\n.target::before { top: -1px; left: -1px;  border-top: 1.5px solid; border-left: 1.5px solid; }\n.target::after  { bottom: -1px; right: -1px; border-bottom: 1.5px solid; border-right: 1.5px solid; }\n\n.target.state-working     { border-color: rgba(232,163,56,0.40); }\n.target.state-working::before, .target.state-working::after { border-color: var(--gold); }\n.target.state-thinking    { border-color: rgba(41,214,255,0.45); }\n.target.state-done        { border-color: rgba(92,247,138,0.40); }\n.target.state-done::before, .target.state-done::after { border-color: #5cf78a; }\n.target.state-idle        { opacity: 0.55; }\n.target.state-needConfirm {\n  border-color: var(--red);\n  background: linear-gradient(135deg, rgba(255,37,56,0.16), transparent 70%);\n  animation: none;\n}\n.target.state-needConfirm::before, .target.state-needConfirm::after { border-color: var(--red); }\n@keyframes target-alert {\n  0%,100% { box-shadow: 0 0 0 0 rgba(255,37,56,0); }\n  50%     { box-shadow: 0 0 24px rgba(255,37,56,0.3); }\n}\n\n.t-row1 {\n  display: flex; align-items: center; gap: 10px;\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n  margin-bottom: 4px;\n}\n.t-status {\n  font-weight: 700;\n  padding: 2px 8px;\n  border: 1px solid;\n  border-radius: 2px;\n}\n.t-status.s-working     { color: var(--gold); border-color: var(--gold); }\n.t-status.s-thinking    { color: var(--hud);  border-color: var(--hud); }\n.t-status.s-done        { color: #5cf78a;     border-color: #5cf78a; }\n.t-status.s-needConfirm { color: var(--red); border-color: var(--red); background: rgba(255,37,56,0.2); }\n.t-status.s-idle        { color: var(--fg-3); border-color: var(--fg-4); }\n\n.t-id { color: var(--hud); letter-spacing: 0.05em; }\n.t-age { margin-left: auto; color: var(--fg-3); }\n\n.t-name {\n  font-family: var(--font-display);\n  font-size: clamp(15px, 1.4vw, 19px);\n  font-weight: 600;\n  color: var(--fg);\n  letter-spacing: 0.02em;\n  margin-bottom: 4px;\n  text-shadow: 0 0 12px rgba(41,214,255,0.25);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n\n.t-tool {\n  display: flex; align-items: baseline; gap: 8px;\n  font-size: clamp(11px, 1vw, 13px);\n  color: var(--fg-2);\n  margin-bottom: 4px;\n  white-space: nowrap;\n}\n.t-tool-name {\n  color: var(--hud);\n  font-weight: 500;\n}\n.t-tool-name::before { content: '▸ '; opacity: 0.5; }\n.t-tool-target {\n  color: var(--fg-2);\n  overflow: hidden; text-overflow: ellipsis; min-width: 0;\n}\n.t-tool-target::before { content: ' :: '; color: var(--fg-4); }\n\n.t-prompt {\n  font-family: var(--font-sans);\n  font-size: clamp(12px, 1.05vw, 14px);\n  color: var(--fg-2);\n  font-style: italic;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  border-left: 2px solid rgba(41,214,255,0.40);\n  padding-left: 8px;\n}\n\n.placeholder {\n  flex: 1;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-display);\n  font-size: 12px;\n  letter-spacing: 0.4em;\n  color: var(--fg-3);\n  text-transform: uppercase;\n  position: relative;\n}\n.placeholder::after {\n  content: '_';\n  margin-left: 4px;\n  color: var(--hud);\n  animation: blink 1s steps(2) infinite;\n}\n\n/* ============================================================\n   Token gauges\n   ============================================================ */\n.token-stack {\n  flex: 1;\n  display: flex;\n  flex-direction: column;\n  gap: clamp(8px, 1vw, 14px);\n  margin-top: 8px;\n  min-height: 0;\n}\n\n.gauge {\n  position: relative;\n  flex: 1;\n  padding: clamp(12px, 1.2vw, 16px);\n  background: linear-gradient(135deg, rgba(41,214,255,0.04), transparent);\n  border: 1px solid rgba(41,214,255,0.20);\n  display: grid;\n  grid-template-columns: 64px 1fr;\n  gap: 14px;\n  align-items: center;\n}\n.gauge::before, .gauge::after {\n  content: '';\n  position: absolute;\n  width: 6px; height: 6px;\n  border-color: var(--hud);\n}\n.gauge::before { top: -1px; left: -1px;  border-top: 1.5px solid; border-left: 1.5px solid; }\n.gauge::after  { bottom: -1px; right: -1px; border-bottom: 1.5px solid; border-right: 1.5px solid; }\n\n.gauge-ring {\n  width: 64px; height: 64px;\n  position: relative;\n  flex-shrink: 0;\n}\n.gauge-ring svg {\n  width: 100%; height: 100%;\n  transform: rotate(-90deg);\n}\n.gauge-ring .ring-bg {\n  fill: none;\n  stroke: rgba(41,214,255,0.12);\n  stroke-width: 4;\n}\n.gauge-ring .ring-fg {\n  fill: none;\n  stroke: var(--hud);\n  stroke-width: 4;\n  stroke-linecap: round;\n  stroke-dasharray: 188;  /* 2*PI*30 ≈ 188.5 */\n  stroke-dashoffset: 188;\n  filter: drop-shadow(0 0 6px var(--hud));\n  transition: stroke-dashoffset 1.2s cubic-bezier(.2,.8,.2,1);\n}\n.gauge-ring .ring-tick {\n  fill: var(--hud); opacity: 0.5;\n}\n.gauge-ring-label {\n  position: absolute;\n  inset: 0;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-display);\n  font-size: 14px;\n  font-weight: 700;\n  color: var(--hud);\n}\n\n.gauge-body { min-width: 0; }\n.gauge-scope-row {\n  display: flex; align-items: baseline; justify-content: space-between;\n  margin-bottom: 4px;\n}\n.gauge-scope {\n  font-family: var(--font-display);\n  font-size: clamp(13px, 1.2vw, 16px);\n  font-weight: 700;\n  color: var(--fg);\n  letter-spacing: 0.05em;\n}\n.gauge-scope-en {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--fg-3);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  margin-left: 8px;\n}\n.gauge-hit {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: #5cf78a;\n  letter-spacing: 0.1em;\n}\n.gauge-stats {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 10px;\n}\n.gauge-stat .num {\n  font-family: var(--font-display);\n  font-size: clamp(18px, 1.9vw, 26px);\n  font-weight: 700;\n  line-height: 1;\n  white-space: nowrap;\n  display: block;\n  transition: opacity 0.3s, transform 0.3s;\n}\n.gauge-stat .num.in  { color: var(--hud); text-shadow: 0 0 10px rgba(41,214,255,0.4); }\n.gauge-stat .num.out { color: var(--gold); text-shadow: 0 0 10px rgba(232,163,56,0.4); }\n.gauge-stat .cap {\n  font-family: var(--font-mono);\n  font-size: 8px;\n  color: var(--fg-3);\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  margin-top: 2px;\n  display: block;\n}\n\n/* ============================================================\n   needConfirm — full alert mode\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  display: flex; align-items: center; justify-content: center;\n  opacity: 0;\n  pointer-events: none;\n  background: radial-gradient(circle at 50% 50%, rgba(50,5,5,0.78), rgba(8,0,2,0.95));\n  transition: opacity 0.4s;\n  overflow: hidden;\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n\n/* diagonal stripes warning border */\n.confirm-stripes {\n  position: absolute;\n  left: 0; right: 0;\n  height: 20px;\n  background: repeating-linear-gradient(\n    -45deg,\n    var(--red) 0 20px,\n    #18020a 20px 40px\n  );\n  animation: stripe-slide 1.2s linear infinite;\n}\n.confirm-stripes.top { top: 0; }\n.confirm-stripes.bot { bottom: 0; animation-direction: reverse; }\n@keyframes stripe-slide {\n  from { background-position: 0 0; }\n  to   { background-position: 56.6px 0; }\n}\n\n.confirm-flash {\n  position: absolute; inset: 0;\n  background: rgba(255,37,56,0.15);\n  pointer-events: none;\n  animation: red-flash 0.9s ease-in-out infinite;\n}\n@keyframes red-flash {\n  0%,100% { opacity: 0.05; }\n  50%     { opacity: 0.4; }\n}\n\n.confirm-cross {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n}\n.confirm-cross::before, .confirm-cross::after {\n  content: '';\n  position: absolute;\n  background: var(--red);\n  opacity: 0.25;\n}\n.confirm-cross::before {\n  left: 50%; top: 6%;\n  width: 1px;\n  height: 88%;\n  transform: translateX(-50%);\n}\n.confirm-cross::after {\n  top: 50%; left: 4%;\n  height: 1px;\n  width: 92%;\n  transform: translateY(-50%);\n}\n\n.confirm-corner-spin {\n  position: absolute;\n  width: 80px; height: 80px;\n  pointer-events: none;\n}\n.confirm-corner-spin svg { width: 100%; height: 100%; animation: spin 3s linear infinite; }\n.confirm-corner-spin .ring { fill: none; stroke: var(--red); stroke-width: 1; stroke-dasharray: 4 6; }\n.confirm-corner-spin.tl { top: 30px;  left: 30px; }\n.confirm-corner-spin.tr { top: 30px;  right: 30px;  }\n.confirm-corner-spin.bl { bottom: 30px; left: 30px; }\n.confirm-corner-spin.br { bottom: 30px; right: 30px; }\n\n.confirm-inner {\n  position: relative;\n  z-index: 2;\n  text-align: center;\n  padding: clamp(30px, 4vw, 60px);\n  max-width: 90vw;\n}\n\n.confirm-eyebrow {\n  display: inline-flex; align-items: center; gap: 12px;\n  font-family: var(--font-display);\n  font-size: clamp(11px, 1.2vw, 15px);\n  letter-spacing: 0.5em;\n  color: var(--red-2);\n  padding: 8px 18px;\n  border: 2px solid var(--red);\n  border-radius: 2px;\n  background: rgba(255,37,56,0.15);\n  text-transform: uppercase;\n  font-weight: 700;\n  margin-bottom: clamp(20px, 3vw, 36px);\n  text-shadow: 0 0 14px var(--red);\n  animation: bracket-pulse 1s ease-in-out infinite;\n}\n@keyframes bracket-pulse {\n  0%,100% { box-shadow: 0 0 0 0 var(--red); }\n  50%     { box-shadow: 0 0 40px rgba(255,37,56,0.6); }\n}\n.confirm-eyebrow .red-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--red); box-shadow: 0 0 12px var(--red); animation: pulse-d 0.5s ease-in-out infinite; }\n\n.confirm-text {\n  font-family: var(--font-display);\n  font-size: clamp(80px, 14vw, 220px);\n  font-weight: 800;\n  color: #fff;\n  letter-spacing: 0.04em;\n  line-height: 0.95;\n  text-shadow:\n    0 0 30px var(--red),\n    0 0 60px rgba(255,37,56,0.5),\n    0 0 100px rgba(255,37,56,0.3);\n  margin-bottom: clamp(20px, 3vw, 32px);\n  animation: text-glitch 4s steps(1) infinite;\n}\n@keyframes text-glitch {\n  0%, 92%, 100% { transform: translate(0); }\n  93% { transform: translate(-2px, 1px); }\n  94% { transform: translate(2px, -1px); }\n  95% { transform: translate(0); }\n}\n\n.confirm-list {\n  display: flex; flex-direction: column; gap: 10px; align-items: center;\n}\n.confirm-row {\n  display: inline-flex; align-items: baseline; gap: 16px;\n  padding: 8px 22px;\n  border: 1px solid var(--red);\n  background: rgba(255,37,56,0.1);\n  font-family: var(--font-display);\n  position: relative;\n  animation: none;\n}\n.confirm-row::before, .confirm-row::after {\n  content: ''; position: absolute;\n  width: 8px; height: 8px;\n  border-color: var(--red);\n}\n.confirm-row::before { top: -1px; left: -1px;  border-top: 1.5px solid; border-left: 1.5px solid; }\n.confirm-row::after  { bottom: -1px; right: -1px; border-bottom: 1.5px solid; border-right: 1.5px solid; }\n@keyframes row-in {\n  from { opacity: 0; transform: translateY(10px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-size: clamp(18px, 2vw, 26px);\n  font-weight: 600;\n  color: #fff;\n  letter-spacing: 0.05em;\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--red-2);\n  letter-spacing: 0.05em;\n}\n\n.confirm-clock {\n  position: absolute;\n  top: 50px; right: 50px;\n  z-index: 3;\n  font-family: var(--font-display);\n  font-size: clamp(16px, 1.6vw, 22px);\n  font-weight: 700;\n  color: var(--red-2);\n  letter-spacing: 0.05em;\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: rgba(5,6,9,0.95);\n  backdrop-filter: blur(20px);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 14px;\n  z-index: 80;\n}\n.err-title {\n  font-family: var(--font-display);\n  font-size: clamp(20px, 2.4vw, 32px);\n  font-weight: 700;\n  color: var(--red-2);\n  letter-spacing: 0.1em;\n  text-shadow: 0 0 16px var(--red);\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n}\n\n/* small screens */\nbody[data-size=\"phone\"] .arc-reactor { width: 46px; height: 46px; }\nbody[data-size=\"phone\"] .jarvis-title { font-size: 11px; letter-spacing: 0.2em; }\nbody[data-size=\"phone\"] .clock-block { padding: 8px 10px; min-width: 100px; }\n\u003c/style>\n\u003c/head>\n<body>\n\n<div class=\"bg-grid\">\u003c/div>\n<div class=\"bg-radial\">\u003c/div>\n<div class=\"data-rain\" id=\"data-rain\">\u003c/div>\n\n<div class=\"hud-rings\">\n  <svg viewBox=\"0 0 400 400\">\n    <!-- outer ticks -->\n    <g class=\"spin-cw\">\n      ${''}\n      <circle class=\"hud-ring\" cx=\"200\" cy=\"200\" r=\"190\"/>\n      <g>\n        <!-- generated via JS -->\n      \u003c/g>\n    \u003c/g>\n    <g class=\"spin-ccw\">\n      <circle class=\"hud-ring\" cx=\"200\" cy=\"200\" r=\"170\" stroke-dasharray=\"3 6\"/>\n    \u003c/g>\n    <g class=\"spin-fast\">\n      <circle class=\"hud-ring\" cx=\"200\" cy=\"200\" r=\"148\" stroke-dasharray=\"40 8 4 8\" stroke-width=\"0.6\"/>\n    \u003c/g>\n    <g class=\"spin-cw\">\n      <circle class=\"hud-ring\" cx=\"200\" cy=\"200\" r=\"130\" stroke-dasharray=\"2 14\"/>\n    \u003c/g>\n  \u003c/svg>\n\u003c/div>\n\n<div class=\"scanline\">\u003c/div>\n\n<div id=\"stage\">\n  <header class=\"top\">\n\n    <div class=\"arc-reactor\">\n      <svg viewBox=\"0 0 100 100\">\n        <g class=\"arc-outer-group\">\n          <circle class=\"hud-ring\" cx=\"50\" cy=\"50\" r=\"46\" stroke-dasharray=\"2 6\"/>\n          <circle class=\"hud-ring\" cx=\"50\" cy=\"50\" r=\"40\"/>\n        \u003c/g>\n        <g class=\"arc-spoke-group\">\n          <!-- 8 spokes -->\n          <g class=\"arc-spoke\" style=\"transform: rotate(0deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(45deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(90deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(135deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(180deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(225deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(270deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n          <g class=\"arc-spoke\" style=\"transform: rotate(315deg)\">\n            <rect x=\"49\" y=\"14\" width=\"2\" height=\"14\" rx=\"1\"/>\n          \u003c/g>\n        \u003c/g>\n        <circle class=\"hud-ring\" cx=\"50\" cy=\"50\" r=\"30\" stroke-width=\"1.5\"/>\n        <circle class=\"hud-ring\" cx=\"50\" cy=\"50\" r=\"22\" stroke-width=\"0.8\" stroke-dasharray=\"2 4\"/>\n        <circle class=\"arc-core\" cx=\"50\" cy=\"50\" r=\"10\"/>\n        <circle class=\"arc-core\" cx=\"50\" cy=\"50\" r=\"5\" style=\"fill: #fff;\"/>\n      \u003c/svg>\n    \u003c/div>\n\n    <div class=\"jarvis-bar\">\n      <div class=\"jarvis-title\">\n        <span>J.A.R.V.I.S.\u003c/span>\n        <span class=\"dot-sep\">/\u003c/span>\n        <span class=\"subt\">Operations Console\u003c/span>\n      \u003c/div>\n      <div class=\"jarvis-status\">\n        <span id=\"g-dot\" class=\"dot dot-idle\">\u003c/span>\n        <span class=\"j-label\" id=\"g-label\">STANDBY\u003c/span>\n        <span class=\"j-summary\" id=\"g-summary\">awaiting input\u003c/span>\n        <span class=\"j-bar\">\u003c/span>\n      \u003c/div>\n    \u003c/div>\n\n    <div class=\"clock-block\">\n      <div class=\"clock\" id=\"clock\"><span>00\u003c/span><span class=\"colon\">:\u003c/span><span>00\u003c/span>\u003c/div>\n      <div class=\"clock-meta\" id=\"date\">SYS · — —\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  <main class=\"body\">\n\n    <section class=\"panel\">\n      <div class=\"panel-tag\">Active Sessions\u003c/div>\n      <div class=\"panel-meta\"><span id=\"sess-count\">0\u003c/span> TARGETS\u003c/div>\n      <div class=\"sessions-list\" id=\"sessions\">\n        <div class=\"placeholder\">SCANNING\u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    <aside class=\"panel\">\n      <div class=\"panel-tag\">Token Telemetry\u003c/div>\n      <div class=\"panel-meta\" id=\"tok-updated\">— —\u003c/div>\n      <div class=\"token-stack\">\n\n        <div class=\"gauge\">\n          <div class=\"gauge-ring\">\n            <svg viewBox=\"0 0 64 64\">\n              <circle class=\"ring-bg\" cx=\"32\" cy=\"32\" r=\"28\"/>\n              <circle class=\"ring-fg\" id=\"ring-today\" cx=\"32\" cy=\"32\" r=\"28\"/>\n            \u003c/svg>\n            <div class=\"gauge-ring-label\" id=\"ring-today-lbl\">0%\u003c/div>\n          \u003c/div>\n          <div class=\"gauge-body\">\n            <div class=\"gauge-scope-row\">\n              <span><span class=\"gauge-scope\">今日\u003c/span><span class=\"gauge-scope-en\">TODAY\u003c/span>\u003c/span>\n              <span class=\"gauge-hit\" id=\"hit-today\">CACHE —\u003c/span>\n            \u003c/div>\n            <div class=\"gauge-stats\">\n              <div class=\"gauge-stat\"><span class=\"num in\"  id=\"t-today-in\">—\u003c/span><span class=\"cap\">INPUT\u003c/span>\u003c/div>\n              <div class=\"gauge-stat\"><span class=\"num out\" id=\"t-today-out\">—\u003c/span><span class=\"cap\">OUTPUT\u003c/span>\u003c/div>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        <div class=\"gauge\">\n          <div class=\"gauge-ring\">\n            <svg viewBox=\"0 0 64 64\">\n              <circle class=\"ring-bg\" cx=\"32\" cy=\"32\" r=\"28\"/>\n              <circle class=\"ring-fg\" id=\"ring-month\" cx=\"32\" cy=\"32\" r=\"28\"/>\n            \u003c/svg>\n            <div class=\"gauge-ring-label\" id=\"ring-month-lbl\">0%\u003c/div>\n          \u003c/div>\n          <div class=\"gauge-body\">\n            <div class=\"gauge-scope-row\">\n              <span><span class=\"gauge-scope\">本月\u003c/span><span class=\"gauge-scope-en\">MONTH\u003c/span>\u003c/span>\n              <span class=\"gauge-hit\" id=\"hit-month\">CACHE —\u003c/span>\n            \u003c/div>\n            <div class=\"gauge-stats\">\n              <div class=\"gauge-stat\"><span class=\"num in\"  id=\"t-month-in\">—\u003c/span><span class=\"cap\">INPUT\u003c/span>\u003c/div>\n              <div class=\"gauge-stat\"><span class=\"num out\" id=\"t-month-out\">—\u003c/span><span class=\"cap\">OUTPUT\u003c/span>\u003c/div>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n        <div class=\"gauge\">\n          <div class=\"gauge-ring\">\n            <svg viewBox=\"0 0 64 64\">\n              <circle class=\"ring-bg\" cx=\"32\" cy=\"32\" r=\"28\"/>\n              <circle class=\"ring-fg\" id=\"ring-total\" cx=\"32\" cy=\"32\" r=\"28\"/>\n            \u003c/svg>\n            <div class=\"gauge-ring-label\" id=\"ring-total-lbl\">0%\u003c/div>\n          \u003c/div>\n          <div class=\"gauge-body\">\n            <div class=\"gauge-scope-row\">\n              <span><span class=\"gauge-scope\">累计\u003c/span><span class=\"gauge-scope-en\">TOTAL\u003c/span>\u003c/span>\n              <span class=\"gauge-hit\" id=\"hit-total\">HIT —\u003c/span>\n            \u003c/div>\n            <div class=\"gauge-stats\">\n              <div class=\"gauge-stat\"><span class=\"num in\"  id=\"t-total-in\">—\u003c/span><span class=\"cap\">INPUT\u003c/span>\u003c/div>\n              <div class=\"gauge-stat\"><span class=\"num out\" id=\"t-total-out\">—\u003c/span><span class=\"cap\">OUTPUT\u003c/span>\u003c/div>\n            \u003c/div>\n          \u003c/div>\n        \u003c/div>\n\n      \u003c/div>\n    \u003c/aside>\n\n  \u003c/main>\n\u003c/div>\n\n<div id=\"confirm\" aria-hidden=\"true\">\n  <div class=\"confirm-stripes top\">\u003c/div>\n  <div class=\"confirm-stripes bot\">\u003c/div>\n  <div class=\"confirm-flash\">\u003c/div>\n  <div class=\"confirm-cross\">\u003c/div>\n  <div class=\"confirm-corner-spin tl\"><svg viewBox=\"0 0 100 100\"><circle class=\"ring\" cx=\"50\" cy=\"50\" r=\"40\"/>\u003c/svg>\u003c/div>\n  <div class=\"confirm-corner-spin tr\"><svg viewBox=\"0 0 100 100\"><circle class=\"ring\" cx=\"50\" cy=\"50\" r=\"40\"/>\u003c/svg>\u003c/div>\n  <div class=\"confirm-corner-spin bl\"><svg viewBox=\"0 0 100 100\"><circle class=\"ring\" cx=\"50\" cy=\"50\" r=\"40\"/>\u003c/svg>\u003c/div>\n  <div class=\"confirm-corner-spin br\"><svg viewBox=\"0 0 100 100\"><circle class=\"ring\" cx=\"50\" cy=\"50\" r=\"40\"/>\u003c/svg>\u003c/div>\n  <div class=\"confirm-clock\" id=\"confirm-clock\">--:--\u003c/div>\n  <div class=\"confirm-inner\">\n    <div class=\"confirm-eyebrow\"><span class=\"red-dot\">\u003c/span>ATTENTION REQUIRED · 等你拍板\u003c/div>\n    <div class=\"confirm-text\">等你拍板\u003c/div>\n    <div class=\"confirm-list\" id=\"confirm-list\">\u003c/div>\n  \u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">CONNECTION LOST\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI · SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_state, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n/* ============ Data rain ============ */\n(function dataRain() {\n  const wrap = document.getElementById('data-rain');\n  const chars = '01アイウエオカキクケコサシスセソタチツテト∆◇◆▼▲ABCDEF0123456789';\n  function makeCol(x) {\n    const col = document.createElement('div');\n    col.className = 'rain-col';\n    col.style.left = x + '%';\n    col.style.animationDuration = (6 + Math.random() * 10) + 's';\n    col.style.animationDelay = (-Math.random() * 12) + 's';\n    col.style.opacity = (0.5 + Math.random() * 0.5);\n    let s = '';\n    for (let i = 0; i < 22; i++) s += chars[Math.floor(Math.random()*chars.length)] + '\\n';\n    col.textContent = s;\n    wrap.appendChild(col);\n  }\n  const cols = Math.max(20, Math.floor(window.innerWidth / 50));\n  for (let i = 0; i < cols; i++) makeCol((i / cols) * 100);\n})();\n\n/* ============ HUD outer ticks (generate around outer ring) ============ */\n(function hudTicks() {\n  const svgs = document.querySelectorAll('.hud-rings svg');\n  if (!svgs.length) return;\n  const svg = svgs[0];\n  const ns = 'http://www.w3.org/2000/svg';\n  const g = svg.querySelector('.spin-cw g');\n  if (!g) return;\n  for (let i = 0; i < 60; i++) {\n    const a = (i / 60) * 360;\n    const long = i % 5 === 0;\n    const line = document.createElementNS(ns, 'line');\n    line.setAttribute('x1', 200);\n    line.setAttribute('y1', long ? 6 : 12);\n    line.setAttribute('x2', 200);\n    line.setAttribute('y2', 18);\n    line.setAttribute('stroke', '#29d6ff');\n    line.setAttribute('stroke-width', long ? '1.5' : '0.5');\n    line.setAttribute('opacity', long ? '0.7' : '0.35');\n    line.setAttribute('transform', `rotate(${a} 200 200)`);\n    g.appendChild(line);\n  }\n})();\n\n/* ============ Clock ============ */\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours()), mm = C.pad2(now.getMinutes()), ss = C.pad2(now.getSeconds());\n  document.getElementById('clock').innerHTML = `<span>${hh}\u003c/span><span class=\"colon\">:\u003c/span><span>${mm}\u003c/span>`;\n  document.getElementById('date').textContent = 'SYS · ' + C.fmtDate(now).toUpperCase();\n  document.getElementById('confirm-clock').textContent = hh + ':' + mm + ':' + ss;\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n/* ============ Render — sessions ============ */\nfunction renderSessions(sessions, detail) {\n  const panel = document.getElementById('sessions');\n  document.getElementById('sess-count').textContent = String(sessions.length).padStart(2, '0');\n\n  if (!sessions.length) {\n    panel.innerHTML = '<div class=\"placeholder\">NO TARGETS DETECTED\u003c/div>';\n    return;\n  }\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n  const sorted = C.sortSessions(sessions);\n  const VIS = 5;\n  const visible = sorted.slice(0, VIS);\n  const extra = sorted.length - visible.length;\n\n  panel.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知目标';\n    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;\n    const age = C.timeAgo(s.updated_at);\n    const toolHtml = tool\n      ? `<div class=\"t-tool\"><span class=\"t-tool-name\">${C.esc(tool)}\u003c/span>${target?`<span class=\"t-tool-target\">${C.esc(target)}\u003c/span>`:''}\u003c/div>` : '';\n    const promptHtml = prompt\n      ? `<div class=\"t-prompt\">${C.esc(prompt)}\u003c/div>` : '';\n    return `\n      <div class=\"target state-${state}\" style=\"animation-delay:${i*80}ms\">\n        <div class=\"t-row1\">\n          <span class=\"t-status s-${state}\">${(C.STATE_LABEL[state] || state).toUpperCase()}\u003c/span>\n          <span class=\"t-id\">№ ${C.esc((s.id||'').slice(0,8))}\u003c/span>\n          <span class=\"t-age\">T+${age}\u003c/span>\n        \u003c/div>\n        <div class=\"t-name\">${C.esc(project)}\u003c/div>\n        ${toolHtml}${promptHtml}\n      \u003c/div>`;\n  }).join('') + (extra > 0 ? `<div class=\"placeholder\" style=\"padding:8px\">+ ${extra} TARGETS QUEUED\u003c/div>` : '');\n}\n\nfunction renderTop(gs, sessions) {\n  document.getElementById('g-dot').className = 'dot dot-' + (gs || 'idle');\n  const labelMap = {\n    working: 'EXECUTING', thinking: 'PROCESSING', done: 'NOMINAL',\n    idle: 'STANDBY', needConfirm: 'ALERT'\n  };\n  document.getElementById('g-label').textContent = labelMap[gs] || 'STANDBY';\n\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k.toUpperCase()}`);\n  const summary = total === 0 ? 'AWAITING INPUT'\n    : `${total} TARGET${total!==1?'S':''}` + (parts.length ? ' :: ' + parts.join(' :: ') : '');\n  document.getElementById('g-summary').textContent = summary;\n}\n\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*120}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知')}\u003c/span>\n      <span class=\"confirm-id\">№ ${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\n/* ============ Tokens ============ */\nfunction setNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  el.style.opacity = '0';\n  el.style.transform = 'translateY(-3px)';\n  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 230);\n}\n\nfunction setRing(ringId, lblId, percent) {\n  const ring = document.getElementById(ringId);\n  const lbl  = document.getElementById(lblId);\n  if (!ring) return;\n  const p = Math.max(0, Math.min(100, percent || 0));\n  const c = 2 * Math.PI * 28;  // 175.93\n  ring.style.strokeDashoffset = c - (c * p / 100);\n  if (lbl) lbl.textContent = Math.round(p) + '%';\n}\n\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setNum('t-today-in', t.input); setNum('t-today-out', t.output);\n  setNum('t-month-in', m.input); setNum('t-month-out', m.output);\n  setNum('t-total-in', a.input); setNum('t-total-out', a.output);\n\n  const th = C.hitRate(t), mh = C.hitRate(m), ah = C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?`CACHE ${th}%`:'CACHE —';\n  document.getElementById('hit-month').textContent = mh!==null?`CACHE ${mh}%`:'CACHE —';\n  document.getElementById('hit-total').textContent = ah!==null?`HIT ${ah}%`:'HIT —';\n  setRing('ring-today', 'ring-today-lbl', th || 0);\n  setRing('ring-month', 'ring-month-lbl', mh || 0);\n  setRing('ring-total', 'ring-total-lbl', ah || 0);\n\n  if (data.last_updated) document.getElementById('tok-updated').textContent = 'SYNC ' + C.fmtTimeHM(new Date(data.last_updated));\n}\n\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n    document.getElementById('stage').classList.toggle('hidden', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n    renderTop(gs, sessions);\n    renderSessions(sessions, detail);\n    renderConfirm(sessions);\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "stage": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · Live Stage\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --bg-0:    #07041a;\n  --bg-1:    #110628;\n  --neon-1:  #ff3ec0;   /* hot pink */\n  --neon-2:  #6c33ff;   /* purple */\n  --neon-3:  #00e0ff;   /* cyan */\n  --neon-4:  #ffeb3b;   /* yellow */\n  --neon-5:  #ff5a3a;   /* orange red */\n\n  --fg:      #ffeefb;\n  --fg-2:    #d6c4e8;\n  --fg-3:    #9a87b3;\n  --fg-4:    #5a4b70;\n\n  --c-working:  var(--neon-4);\n  --c-thinking: var(--neon-3);\n  --c-done:     #5cf78a;\n  --c-idle:     #735a8c;\n  --c-confirm:  var(--neon-1);\n\n  --font-display: \"Unbounded\", \"Helvetica Neue\", sans-serif;\n  --font-bebas:   \"Bebas Neue\", \"Impact\", sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n  --font-sans:    -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: var(--bg-0);\n  color: var(--fg);\n  font-family: var(--font-sans);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ============================================================\n   Layer 0 — stage backdrop\n   ============================================================ */\n.backdrop {\n  position: fixed; inset: 0;\n  background:\n    radial-gradient(ellipse 90% 70% at 50% 100%, oklch(0.20 0.20 320) 0%, transparent 60%),\n    radial-gradient(ellipse 80% 60% at 30% 0%,   oklch(0.25 0.20 280) 0%, transparent 55%),\n    radial-gradient(ellipse 80% 60% at 80% 0%,   oklch(0.30 0.20 200) 0%, transparent 55%),\n    linear-gradient(180deg, #06031a 0%, #0d041d 50%, #170638 100%);\n  z-index: 0;\n}\n\n/* fog/haze layer */\n.fog {\n  position: fixed; inset: -10%;\n  background:\n    radial-gradient(circle at 30% 40%, oklch(0.40 0.15 320 / 0.35), transparent 30%),\n    radial-gradient(circle at 70% 60%, oklch(0.45 0.15 280 / 0.35), transparent 30%),\n    radial-gradient(circle at 50% 80%, oklch(0.40 0.15 200 / 0.30), transparent 35%);\n  filter: blur(60px);\n  z-index: 0;\n  animation: fog-drift 18s ease-in-out infinite alternate;\n}\n@keyframes fog-drift {\n  from { transform: translate(0,0) scale(1); }\n  to   { transform: translate(-4%, 2%) scale(1.05); }\n}\n\n/* moving spotlights */\n.spots {\n  position: fixed; inset: 0;\n  z-index: 1;\n  pointer-events: none;\n  overflow: hidden;\n}\n.spot {\n  position: absolute;\n  top: -10vh;\n  width: 0;\n  height: 0;\n  border-left: 50vw solid transparent;\n  border-right: 50vw solid transparent;\n  border-top: 130vh solid var(--c, white);\n  filter: blur(40px);\n  opacity: 0.25;\n  transform-origin: 50% 0%;\n  mix-blend-mode: screen;\n  animation: spot-sweep var(--d, 14s) ease-in-out infinite alternate;\n}\n@keyframes spot-sweep {\n  0%   { transform: translateX(-30vw) rotate(-25deg); }\n  100% { transform: translateX( 30vw) rotate( 25deg); }\n}\n.spot.s1 { --c: oklch(0.65 0.27 340); --d: 12s; left: 10%; }\n.spot.s2 { --c: oklch(0.70 0.25 240); --d: 16s; left: 50%; animation-direction: alternate-reverse; animation-delay: -3s; }\n.spot.s3 { --c: oklch(0.72 0.24 190); --d: 19s; left: 80%; animation-delay: -8s; }\n\n/* laser beams */\n.lasers {\n  position: fixed; inset: 0;\n  z-index: 1; pointer-events: none;\n  overflow: hidden;\n}\n.laser {\n  position: absolute;\n  top: 50%; left: 50%;\n  width: 200vmax;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--c, var(--neon-1)) 30%, var(--c, var(--neon-1)) 70%, transparent);\n  transform-origin: 50% 50%;\n  opacity: 0.5;\n  box-shadow: 0 0 8px var(--c, var(--neon-1));\n  animation: laser-sweep var(--d, 8s) ease-in-out infinite;\n}\n@keyframes laser-sweep {\n  0%, 100% { transform: translate(-50%, -50%) rotate(-15deg); opacity: 0.2; }\n  50%      { transform: translate(-50%, -50%) rotate( 15deg); opacity: 0.7; }\n}\n.laser.l1 { --c: var(--neon-1); --d: 7s; }\n.laser.l2 { --c: var(--neon-3); --d: 9s; animation-delay: -2s; }\n.laser.l3 { --c: var(--neon-4); --d: 11s; animation-delay: -4s; }\n\n/* dust particles */\n.dust {\n  position: fixed; inset: 0;\n  z-index: 2; pointer-events: none;\n}\n.dust-mote {\n  position: absolute;\n  width: 2px; height: 2px;\n  background: white;\n  border-radius: 50%;\n  opacity: 0.5;\n  box-shadow: 0 0 6px white;\n  animation: dust-float linear infinite;\n}\n@keyframes dust-float {\n  from { transform: translateY(110vh) translateX(0); }\n  to   { transform: translateY(-15vh) translateX(50px); }\n}\n\n/* ============================================================\n   Stage\n   ============================================================ */\n#stage {\n  position: relative; z-index: 5;\n  width: 100%; height: 100%;\n  padding: clamp(20px, 2.4vw, 36px);\n  display: grid;\n  grid-template-rows: auto auto 1fr;\n  gap: clamp(14px, 1.6vw, 24px);\n  transition: opacity 0.5s, filter 0.5s;\n}\n#stage.hidden { opacity: 0.18; filter: blur(3px); pointer-events: none; }\n\n/* ============================================================\n   Top — marquee + clock\n   ============================================================ */\n.top-row {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: clamp(14px, 1.5vw, 24px);\n  align-items: center;\n}\n\n/* Vinyl disc */\n.vinyl {\n  position: relative;\n  width: clamp(50px, 6vw, 80px);\n  height: clamp(50px, 6vw, 80px);\n  flex-shrink: 0;\n  animation: spin 4s linear infinite;\n}\n.vinyl-disc {\n  width: 100%; height: 100%;\n  border-radius: 50%;\n  background:\n    repeating-radial-gradient(circle at center,\n      #1a0a2a 0px, #1a0a2a 2px,\n      #2a1538 2px, #2a1538 4px);\n  position: relative;\n  box-shadow: inset 0 0 8px rgba(255,255,255,0.06), 0 4px 20px rgba(0,0,0,0.6);\n}\n.vinyl-disc::before {\n  content: '';\n  position: absolute;\n  inset: 38%;\n  border-radius: 50%;\n  background: var(--neon-1);\n  box-shadow: 0 0 12px var(--neon-1);\n}\n.vinyl-disc::after {\n  content: '';\n  position: absolute;\n  inset: 47%;\n  border-radius: 50%;\n  background: #15041e;\n}\n@keyframes spin { to { transform: rotate(360deg); } }\n\n/* marquee */\n.marquee-block {\n  display: flex;\n  flex-direction: column;\n  gap: 4px;\n  min-width: 0;\n}\n.now-playing {\n  font-family: var(--font-display);\n  font-size: clamp(11px, 1vw, 13px);\n  font-weight: 700;\n  letter-spacing: 0.3em;\n  color: var(--neon-1);\n  text-transform: uppercase;\n  text-shadow: 0 0 12px var(--neon-1);\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.np-dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--neon-1);\n  box-shadow: 0 0 8px var(--neon-1);\n  animation: pulse-d 0.8s ease-in-out infinite;\n}\n@keyframes pulse-d {\n  0%,100% { transform: scale(1); }\n  50%     { transform: scale(1.4); }\n}\n\n.marquee {\n  font-family: var(--font-bebas);\n  font-size: clamp(22px, 2.6vw, 36px);\n  line-height: 1;\n  color: var(--fg);\n  letter-spacing: 0.05em;\n  overflow: hidden;\n  text-shadow: 0 0 24px rgba(255,62,192,0.4);\n  white-space: nowrap;\n  min-width: 0;\n}\n.marquee-inner {\n  display: inline-block;\n  white-space: nowrap;\n  animation: marquee-scroll 28s linear infinite;\n  padding-right: 60px;\n}\n.marquee-inner span { color: var(--neon-3); padding: 0 8px; }\n@keyframes marquee-scroll {\n  from { transform: translateX(0); }\n  to   { transform: translateX(-50%); }\n}\n\n.clock-pane {\n  position: relative;\n  display: flex; flex-direction: column;\n  align-items: flex-end;\n  gap: 4px;\n  padding: 8px 18px;\n  background: linear-gradient(135deg, oklch(0.25 0.20 320 / 0.4), oklch(0.20 0.15 280 / 0.3));\n  border-radius: 12px;\n
