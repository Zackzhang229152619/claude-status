ion-delay:${(h%10) * -0.3}s; animation-duration:${5 + (h%5)}s\">\n        <path class=\"stem\" d=\"${stemPath}\" stroke-dasharray=\"1000\" stroke-dashoffset=\"0\" />\n        ${leaves.join('')}\n        ${crown}\n      \u003c/g>\n    \u003c/svg>`;\n}\n\n/* ===== RENDER ===== */\nfunction renderGarden(sessions, detail) {\n  const wrap = document.getElementById('garden');\n\n  if (!sessions.length) {\n    wrap.innerHTML = '<div class=\"empty-garden\">花园在静默中等待…\u003c/div>';\n    return;\n  }\n\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n\n  const sorted = C.sortSessions(sessions);\n  const VIS = 7;\n  const visible = sorted.slice(0, VIS);\n\n  wrap.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知项目';\n    const tool = d.current_tool;\n    const target = d.current_target;\n    const toolLine = tool\n      ? (target ? `${tool} · ${target}` : tool)\n      : '';\n    return `\n      <div class=\"plant state-${state}\" style=\"animation-delay:${i*120}ms\">\n        ${makePlantSVG(s.id || ('p'+i), state)}\n        <div class=\"plant-glow\">\u003c/div>\n        <div class=\"plant-meta\">\n          <div class=\"plant-name\">${C.esc(project)}\u003c/div>\n          ${toolLine ? `<div class=\"plant-tool\">${C.esc(toolLine)}\u003c/div>` : ''}\n          <div class=\"plant-id\">№ ${C.esc((s.id||'').slice(0,8))} · ${C.timeAgo(s.updated_at)}\u003c/div>\n        \u003c/div>\n      \u003c/div>`;\n  }).join('');\n}\n\nfunction renderTop(gs, sessions) {\n  document.getElementById('g-dot').className = 'dot dot-' + (gs || 'idle');\n  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);\n  const summary = total === 0 ? '花园中无活动'\n    : `${total} 株植物` + (parts.length ? ` · ${parts.join(' · ')}` : '');\n  document.getElementById('g-summary').textContent = summary;\n  document.body.dataset.state = gs || 'idle';\n}\n\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s,i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*120}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知项目')}\u003c/span>\n      <span class=\"confirm-id\">${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\nfunction setNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  el.style.transition = 'opacity .3s, transform .3s';\n  el.style.opacity = '0'; el.style.transform = 'translateY(-4px)';\n  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 250);\n}\n\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setNum('t-today-in', t.input); setNum('t-today-out', t.output);\n  setNum('t-month-in', m.input); setNum('t-month-out', m.output);\n  setNum('t-total-in', a.input); setNum('t-total-out', a.output);\n  const th=C.hitRate(t),mh=C.hitRate(m),ah=C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?` · 缓存 ${th}%`:'';\n  document.getElementById('hit-month').textContent = mh!==null?` · 缓存 ${mh}%`:'';\n  document.getElementById('hit-total').textContent = ah!==null?` · 命中 ${ah}%`:'';\n\n  // adjust river flow based on today's input volume (log scale)\n  const log = Math.log10(Math.max(1, t.input || 0));\n  riverState.flow = Math.min(1, log / 7);\n}\n\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n    document.getElementById('stage').classList.toggle('recede', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n    renderTop(gs, sessions);\n    renderGarden(sessions, detail);\n    renderConfirm(sessions);\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "lab": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · Lab\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --paper:    #e8e6e0;\n  --paper-2:  #d8d5cc;\n  --paper-3:  #c2bfb4;\n  --ink:      #15171a;\n  --ink-2:    #3a3d44;\n  --ink-3:    #6a6e78;\n  --ink-4:    #9a9da6;\n  --rule:     #15171a;\n\n  --c-working:  #ef8537;\n  --c-thinking: #2c8eb3;\n  --c-done:     #4aa463;\n  --c-idle:     #888;\n  --c-confirm:  #d52d3a;\n\n  --tube-glass: rgba(50,55,65,0.12);\n  --tube-liquid-in:  #2c8eb3;\n  --tube-liquid-out: #ef8537;\n  --tube-liquid-tot: #4aa463;\n\n  --font-sans:  \"Space Grotesk\", -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n  --font-mono:  \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-sans);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* paper texture + grid */\nbody::before {\n  content: '';\n  position: fixed; inset: 0;\n  background-image:\n    linear-gradient(0deg, rgba(0,0,0,0.04) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);\n  background-size: 32px 32px;\n  pointer-events: none;\n  z-index: 1;\n}\nbody::after { /* paper grain */\n  content: '';\n  position: fixed; inset: 0;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/>\u003c/filter><rect width='400' height='400' filter='url(%23n)' opacity='0.4'/>\u003c/svg>\");\n  opacity: 0.06;\n  mix-blend-mode: multiply;\n  pointer-events: none;\n  z-index: 2;\n}\n\n/* ============================================================\n   Stage\n   ============================================================ */\n#stage {\n  position: relative;\n  z-index: 3;\n  width: 100%; height: 100%;\n  padding: clamp(20px, 2.4vw, 36px);\n  display: grid;\n  grid-template-rows: auto 1fr;\n  gap: clamp(16px, 1.6vw, 24px);\n  transition: opacity 0.6s;\n}\n#stage.hidden { opacity: 0; pointer-events: none; }\n\n/* ============================================================\n   Top — lab header\n   ============================================================ */\n.top {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: clamp(14px, 1.6vw, 24px);\n  align-items: center;\n  padding-bottom: clamp(12px, 1.2vw, 18px);\n  border-bottom: 1.5px solid var(--rule);\n}\n.lab-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n}\n.lab-id .big {\n  display: block;\n  font-family: var(--font-sans);\n  font-size: clamp(18px, 1.8vw, 26px);\n  font-weight: 700;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  text-transform: none;\n}\n\n.status-pill {\n  justify-self: center;\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  padding: 8px 16px;\n  border: 1.5px solid var(--rule);\n  border-radius: 999px;\n  background: var(--paper-2);\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--ink);\n  position: relative;\n  overflow: hidden;\n}\n.dot {\n  width: 10px; height: 10px;\n  border-radius: 50%;\n  background: var(--c-idle);\n  display: inline-block;\n  flex-shrink: 0;\n  border: 1.5px solid var(--rule);\n}\n.dot-working     { background: var(--c-working);  animation: none; }\n.dot-thinking    { background: var(--c-thinking); animation: none; }\n.dot-done        { background: var(--c-done); }\n.dot-needConfirm { background: var(--c-confirm);  animation: none; }\n@keyframes soft-breathe {\n  0%,100% { transform: scale(1);    filter: brightness(1); }\n  50%     { transform: scale(1.08); filter: brightness(1.2); }\n}\n@keyframes pulse-d {\n  0%,100% { box-shadow: 0 0 0 0 currentColor; }\n  50%     { box-shadow: 0 0 0 6px color-mix(in srgb, currentColor 0%, transparent); transform: scale(1.15); }\n}\n\n.clock-area {\n  text-align: right;\n  font-family: var(--font-mono);\n}\n.clock {\n  font-size: clamp(28px, 3.4vw, 44px);\n  font-weight: 700;\n  line-height: 1;\n  color: var(--ink);\n  letter-spacing: -0.02em;\n}\n.clock .colon { animation: blink 2s ease-in-out infinite; }\n@keyframes blink { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }\n.date {\n  margin-top: 4px;\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n}\n\n/* ============================================================\n   Body — tank (left) + tubes (right)\n   ============================================================ */\n.body {\n  display: grid;\n  grid-template-columns: minmax(0, 1.6fr) auto;\n  gap: clamp(16px, 1.8vw, 28px);\n  min-height: 0;\n}\n\n@media (orientation: portrait), (max-width: 820px) {\n  .body { grid-template-columns: 1fr; grid-template-rows: minmax(0,1.6fr) auto; }\n}\n\n/* Tank */\n.tank {\n  position: relative;\n  border: 2px solid var(--rule);\n  border-radius: 4px;\n  background: var(--paper-2);\n  overflow: hidden;\n  min-height: 0;\n}\n.tank-label {\n  position: absolute;\n  top: 14px; left: 16px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  z-index: 10;\n}\n.tank-count {\n  position: absolute;\n  top: 14px; right: 16px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.15em;\n  color: var(--ink-3);\n  z-index: 10;\n}\n\n/* corner brackets */\n.tank::before, .tank::after {\n  content: '';\n  position: absolute;\n  width: 16px; height: 16px;\n  border-color: var(--rule);\n}\n.tank::before {\n  top: 6px; right: 6px;\n  border-top: 2px solid; border-right: 2px solid;\n}\n.tank::after {\n  bottom: 6px; left: 6px;\n  border-bottom: 2px solid; border-left: 2px solid;\n}\n\n/* specimens float area */\n.specimens {\n  position: absolute;\n  inset: 40px 16px 16px 16px;\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  grid-auto-rows: min-content;\n  gap: clamp(10px, 1.2vw, 18px);\n  align-content: start;\n  overflow: hidden;\n}\n\n.specimen {\n  position: relative;\n  padding: 12px 14px;\n  background: var(--paper);\n  border: 1.5px solid var(--rule);\n  border-radius: 12px;\n  animation: none;\n  transform-origin: center;\n  --float-x: 0;\n}\n@keyframes spec-in {\n  from { opacity: 0; transform: translateY(20px) scale(0.85); }\n  to   { opacity: 1; }\n}\n@keyframes float {\n  0%,100% { transform: translate(calc(var(--float-x) * -1px), -2px) rotate(calc(var(--rot, 0.3) * -1deg)); }\n  50%     { transform: translate(calc(var(--float-x) * 1px),  3px) rotate(calc(var(--rot, 0.3) * 1deg)); }\n}\n\n/* tag label on specimen */\n.spec-tag {\n  position: absolute;\n  top: -10px; left: 12px;\n  display: inline-flex; align-items: center; gap: 6px;\n  background: var(--paper);\n  padding: 2px 8px;\n  border: 1.5px solid var(--rule);\n  border-radius: 999px;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  letter-spacing: 0.18em;\n  font-weight: 700;\n  text-transform: uppercase;\n}\n.spec-tag .swatch {\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: var(--c-idle);\n}\n.spec-tag.tag-working     { color: var(--c-working);  } .spec-tag.tag-working .swatch     { background: var(--c-working);  }\n.spec-tag.tag-thinking    { color: var(--c-thinking); } .spec-tag.tag-thinking .swatch    { background: var(--c-thinking); }\n.spec-tag.tag-done        { color: var(--c-done);     } .spec-tag.tag-done .swatch        { background: var(--c-done);     }\n.spec-tag.tag-needConfirm { color: var(--c-confirm);  background: var(--c-confirm); border-color: var(--c-confirm); }\n.spec-tag.tag-needConfirm { color: #fff; } .spec-tag.tag-needConfirm .swatch { background: #fff; border: 1.5px solid #fff; }\n.spec-tag.tag-idle        { color: var(--ink-4); }     .spec-tag.tag-idle .swatch        { background: var(--ink-4); }\n\n.spec-name {\n  font-size: clamp(15px, 1.4vw, 19px);\n  font-weight: 600;\n  color: var(--ink);\n  letter-spacing: -0.01em;\n  margin-top: 4px;\n  margin-bottom: 4px;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.spec-tool {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-2);\n  letter-spacing: 0.02em;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  margin-bottom: 4px;\n}\n.spec-tool-name { font-weight: 700; color: var(--c-thinking); }\n.spec-tool-name::before { content: '◇ '; opacity: 0.6; }\n.spec-tool-target { color: var(--ink-2); }\n.spec-tool-target::before { content: ' · '; color: var(--ink-4); }\n.spec-meta {\n  display: flex; align-items: baseline; gap: 12px;\n  font-family: var(--font-mono);\n  font-size: 9px;\n  letter-spacing: 0.12em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n  border-top: 1px dashed var(--ink-4);\n  padding-top: 5px;\n  margin-top: 4px;\n}\n.spec-prompt {\n  font-size: 11px;\n  color: var(--ink-2);\n  margin-top: 2px;\n  margin-bottom: 4px;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  font-style: italic;\n}\n.spec-prompt::before { content: '“'; color: var(--ink-4); }\n.spec-prompt::after  { content: '”'; color: var(--ink-4); }\n\n/* state-specific specimen styling */\n.specimen.state-working     { background: color-mix(in srgb, var(--c-working) 8%, var(--paper)); }\n.specimen.state-thinking    { background: color-mix(in srgb, var(--c-thinking) 8%, var(--paper)); }\n.specimen.state-done        { background: color-mix(in srgb, var(--c-done) 6%, var(--paper)); }\n.specimen.state-idle        { opacity: 0.6; --rot: 0.1; --float-x: 0.5; }\n.specimen.state-needConfirm {\n  background: color-mix(in srgb, var(--c-confirm) 12%, var(--paper));\n  animation: none;\n}\n@keyframes alarm-shake {\n  0%,100% { transform: translate(0,0); }\n  25%     { transform: translate(-1px, 0); }\n  75%     { transform: translate( 1px, 0); }\n}\n\n.empty-tank {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.2em;\n  color: var(--ink-4);\n  text-transform: uppercase;\n  text-align: center;\n  margin: auto;\n  padding: 40px;\n}\n\n/* ============================================================\n   Tubes (right) — 3 test tubes\n   ============================================================ */\n.tubes-rack {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(80px, 110px));\n  gap: clamp(8px, 1vw, 14px);\n  align-items: stretch;\n  padding-top: 0;\n}\n.tube-col {\n  display: flex;\n  flex-direction: column;\n  align-items: stretch;\n  gap: 8px;\n  min-height: 0;\n}\n.tube-scope {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  text-align: center;\n}\n.tube-scope b {\n  display: block;\n  font-family: var(--font-sans);\n  font-size: clamp(14px, 1.3vw, 18px);\n  font-weight: 700;\n  color: var(--ink);\n  letter-spacing: -0.01em;\n  text-transform: none;\n}\n\n.tube-shell {\n  position: relative;\n  flex: 1;\n  min-height: 200px;\n  background: var(--paper-2);\n  border: 1.5px solid var(--rule);\n  border-radius: 50px / 12px;\n  border-bottom-left-radius: 50px;\n  border-bottom-right-radius: 50px;\n  overflow: hidden;\n}\n.tube-shell::before { /* glass highlight */\n  content: '';\n  position: absolute;\n  left: 10%; top: 8px;\n  width: 4px;\n  height: 80%;\n  background: oklch(1 0 0 / 0.5);\n  border-radius: 2px;\n  z-index: 4;\n}\n.tube-canvas {\n  position: absolute;\n  inset: 0;\n  width: 100%; height: 100%;\n}\n.tube-readout {\n  position: absolute;\n  bottom: 8px; left: 0; right: 0;\n  text-align: center;\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: clamp(13px, 1.2vw, 17px);\n  color: var(--ink);\n  z-index: 5;\n  letter-spacing: -0.01em;\n  text-shadow: 0 0 6px rgba(255,255,255,0.8);\n}\n\n.tube-stats {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--ink-3);\n  letter-spacing: 0.1em;\n  text-align: center;\n  text-transform: uppercase;\n}\n.tube-stats .out { color: var(--c-working); font-weight: 700; }\n.tube-stats .hit { color: var(--c-done);   font-weight: 700; display: block; margin-top: 2px; }\n\n/* ============================================================\n   needConfirm — emergency klaxon\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  opacity: 0;\n  pointer-events: none;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  background:\n    repeating-linear-gradient(45deg,\n      var(--c-confirm) 0px, var(--c-confirm) 40px,\n      #1c0508 40px, #1c0508 80px);\n  animation: alarm-bg 1.4s linear infinite;\n  transition: opacity 0.4s;\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n@keyframes alarm-bg {\n  from { background-position: 0 0; }\n  to   { background-position: 80px 0; }\n}\n\n.confirm-inner {\n  position: relative;\n  background: var(--paper);\n  border: 4px solid var(--ink);\n  border-radius: 8px;\n  padding: clamp(30px, 4vw, 60px) clamp(40px, 6vw, 100px);\n  text-align: center;\n  box-shadow: 8px 8px 0 var(--ink);\n  animation: confirm-pop 0.5s cubic-bezier(.2,1.5,.4,1) backwards;\n}\n@keyframes confirm-pop {\n  from { transform: translateY(40px) scale(0.85); opacity: 0; }\n  to   { transform: none; opacity: 1; }\n}\n\n.confirm-eyebrow {\n  display: inline-flex; align-items: center; gap: 12px;\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1.1vw, 14px);\n  letter-spacing: 0.3em;\n  color: var(--c-confirm);\n  padding: 6px 16px;\n  border: 2px solid var(--c-confirm);\n  border-radius: 4px;\n  background: var(--paper);\n  margin-bottom: clamp(18px, 2vw, 28px);\n  text-transform: uppercase;\n  font-weight: 700;\n}\n.confirm-text {\n  font-family: var(--font-sans);\n  font-size: clamp(80px, 13vw, 220px);\n  font-weight: 700;\n  color: var(--ink);\n  letter-spacing: -0.04em;\n  line-height: 0.95;\n  margin-bottom: clamp(20px, 3vw, 32px);\n}\n.confirm-list {\n  display: flex; flex-direction: column; gap: 10px; align-items: center;\n}\n.confirm-row {\n  display: inline-flex; align-items: baseline; gap: 14px;\n  padding: 8px 20px;\n  border: 1.5px solid var(--ink);\n  background: var(--paper-2);\n  border-radius: 6px;\n  animation: none;\n}\n@keyframes row-in {\n  from { opacity: 0; transform: translateX(-10px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-size: clamp(18px, 2vw, 26px);\n  font-weight: 600;\n  color: var(--ink);\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-3);\n  letter-spacing: 0.05em;\n}\n.confirm-clock {\n  position: absolute;\n  top: clamp(20px, 2.4vw, 30px);\n  right: clamp(24px, 2.6vw, 36px);\n  font-family: var(--font-mono);\n  font-size: clamp(20px, 2vw, 28px);\n  font-weight: 700;\n  color: var(--paper);\n  background: var(--ink);\n  padding: 6px 14px;\n  border-radius: 4px;\n  letter-spacing: -0.02em;\n  z-index: 60;\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: var(--paper);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 14px;\n  z-index: 60;\n}\n.err-title {\n  font-size: clamp(22px, 2.4vw, 32px);\n  font-weight: 700;\n  color: var(--c-confirm);\n  letter-spacing: -0.01em;\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n}\n\u003c/style>\n\u003c/head>\n<body>\n\n<div id=\"stage\">\n  <header class=\"top\">\n    <div class=\"lab-id\">\n      <span class=\"big\">CLAUDE LAB · 实验台\u003c/span>\n      EXPERIMENT №<span id=\"exp-no\">0001\u003c/span> · LIVE FEED\n    \u003c/div>\n    <div class=\"status-pill\">\n      <span id=\"g-dot\" class=\"dot dot-idle\">\u003c/span>\n      <span id=\"g-label\">IDLE\u003c/span>\n      <span style=\"opacity:0.4\">·\u003c/span>\n      <span id=\"g-summary\">无样本\u003c/span>\n    \u003c/div>\n    <div class=\"clock-area\">\n      <div class=\"clock\" id=\"clock\"><span>00\u003c/span><span class=\"colon\">:\u003c/span><span>00\u003c/span>\u003c/div>\n      <div class=\"date\" id=\"date\">— —\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  <main class=\"body\">\n    <section class=\"tank\">\n      <div class=\"tank-label\">SPECIMENS · 培养皿 A-01\u003c/div>\n      <div class=\"tank-count\"><span id=\"sess-count\">0\u003c/span> SAMPLES\u003c/div>\n      <div class=\"specimens\" id=\"specimens\">\n        <div class=\"empty-tank\">— specimen tray empty —\u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    <aside class=\"tubes-rack\">\n      <div class=\"tube-col\">\n        <div class=\"tube-scope\">TODAY<b>今日\u003c/b>\u003c/div>\n        <div class=\"tube-shell\">\n          <canvas class=\"tube-canvas\" data-scope=\"today\">\u003c/canvas>\n          <div class=\"tube-readout\" id=\"t-today-in\">—\u003c/div>\n        \u003c/div>\n        <div class=\"tube-stats\">\n          IN · <span class=\"out\" id=\"t-today-out\">—\u003c/span> OUT<span class=\"hit\" id=\"hit-today\">缓存 —\u003c/span>\n        \u003c/div>\n      \u003c/div>\n\n      <div class=\"tube-col\">\n        <div class=\"tube-scope\">MONTH<b>本月\u003c/b>\u003c/div>\n        <div class=\"tube-shell\">\n          <canvas class=\"tube-canvas\" data-scope=\"month\">\u003c/canvas>\n          <div class=\"tube-readout\" id=\"t-month-in\">—\u003c/div>\n        \u003c/div>\n        <div class=\"tube-stats\">\n          IN · <span class=\"out\" id=\"t-month-out\">—\u003c/span> OUT<span class=\"hit\" id=\"hit-month\">缓存 —\u003c/span>\n        \u003c/div>\n      \u003c/div>\n\n      <div class=\"tube-col\">\n        <div class=\"tube-scope\">TOTAL<b>累计\u003c/b>\u003c/div>\n        <div class=\"tube-shell\">\n          <canvas class=\"tube-canvas\" data-scope=\"total\">\u003c/canvas>\n          <div class=\"tube-readout\" id=\"t-total-in\">—\u003c/div>\n        \u003c/div>\n        <div class=\"tube-stats\">\n          IN · <span class=\"out\" id=\"t-total-out\">—\u003c/span> OUT<span class=\"hit\" id=\"hit-total\">命中 —\u003c/span>\n        \u003c/div>\n      \u003c/div>\n    \u003c/aside>\n  \u003c/main>\n\u003c/div>\n\n<div id=\"confirm\" aria-hidden=\"true\">\n  <div class=\"confirm-clock\" id=\"confirm-clock\">--:--\u003c/div>\n  <div class=\"confirm-inner\">\n    <div class=\"confirm-eyebrow\">⚠ ATTENTION REQUIRED · 等你拍板\u003c/div>\n    <div class=\"confirm-text\">等你拍板\u003c/div>\n    <div class=\"confirm-list\" id=\"confirm-list\">\u003c/div>\n  \u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">— 通讯链路中断 —\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI · SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_state, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n// ───── Random experiment number on load ─────\ndocument.getElementById('exp-no').textContent =\n  String(Math.floor(Date.now() / 1000) % 10000).padStart(4, '0');\n\n// ───── Clock ─────\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours()), mm = C.pad2(now.getMinutes());\n  document.getElementById('clock').innerHTML =\n    `<span>${hh}\u003c/span><span class=\"colon\">:\u003c/span><span>${mm}\u003c/span>`;\n  document.getElementById('date').textContent = C.fmtDate(now);\n  document.getElementById('confirm-clock').textContent = hh + ':' + mm;\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n// ───── Specimens ─────\nfunction hashId(id) {\n  let h = 0; for (let i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);\n  return Math.abs(h);\n}\n\nfunction renderSpecimens(sessions, detail) {\n  const wrap = document.getElementById('specimens');\n  document.getElementById('sess-count').textContent = String(sessions.length).padStart(2,'0');\n\n  if (!sessions.length) {\n    wrap.innerHTML = '<div class=\"empty-tank\">— specimen tray empty —\u003c/div>';\n    return;\n  }\n\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n  const sorted = C.sortSessions(sessions);\n  const VIS = 6;\n  const visible = sorted.slice(0, VIS);\n\n  wrap.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知样本';\n    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;\n    const age = C.timeAgo(s.updated_at);\n    const h = hashId(s.id || ('s'+i));\n\n    const dur = (5.5 + (h % 30) / 10).toFixed(1) + 's';\n    const fx  = ((h % 6) + 2);\n    const rot = (0.2 + (h % 7) / 10).toFixed(2);\n    const delay = (-(h % 50) / 10).toFixed(1) + 's';\n\n    const toolHtml = tool\n      ? `<div class=\"spec-tool\"><span class=\"spec-tool-name\">${C.esc(tool)}\u003c/span>${target?`<span class=\"spec-tool-target\">${C.esc(target)}\u003c/span>`:''}\u003c/div>` : '';\n    const promptHtml = prompt\n      ? `<div class=\"spec-prompt\">${C.esc(prompt)}\u003c/div>` : '';\n\n    return `\n      <div class=\"specimen state-${state}\" style=\"--float-dur:${dur}; --float-x:${fx}; --rot:${rot}; animation-delay: ${i*70}ms, ${delay};\">\n        <span class=\"spec-tag tag-${state}\"><span class=\"swatch\">\u003c/span>${C.STATE_LABEL[state] || state}\u003c/span>\n        <div class=\"spec-name\">${C.esc(project)}\u003c/div>\n        ${toolHtml}${promptHtml}\n        <div class=\"spec-meta\">\n          <span>SAMPLE №${C.esc((s.id||'').slice(0,8))}\u003c/span>\n          <span style=\"margin-left:auto\">T+${age}\u003c/span>\n        \u003c/div>\n      \u003c/div>`;\n  }).join('');\n}\n\n// ───── Top status ─────\nfunction renderTop(gs, sessions) {\n  document.getElementById('g-dot').className = 'dot dot-' + (gs || 'idle');\n  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);\n  const summary = total === 0 ? '无样本'\n    : `${total} 样本` + (parts.length ? ` · ${parts.join(' · ')}` : '');\n  document.getElementById('g-summary').textContent = summary;\n}\n\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*120}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知样本')}\u003c/span>\n      <span class=\"confirm-id\">№ ${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\n// ───── Tubes ─────\nconst tubeFills = { today: 0, month: 0, total: 0 };\nconst tubeTargets = { today: 0, month: 0, total: 0 };\nconst tubeColors = {\n  today: { fill: '#7cb6cc', deep: '#2c8eb3' },\n  month: { fill: '#f3b574', deep: '#ef8537' },\n  total: { fill: '#8dcc9b', deep: '#4aa463' }\n};\nconst tubeBubbles = { today: [], month: [], total: [] };\n\nfunction initTubes() {\n  document.querySelectorAll('.tube-canvas').forEach(c => {\n    const scope = c.dataset.scope;\n    function resize() {\n      c.width  = c.offsetWidth  * devicePixelRatio;\n      c.height = c.offsetHeight * devicePixelRatio;\n    }\n    resize();\n    new ResizeObserver(resize).observe(c);\n\n    const ctx = c.getContext('2d');\n    const col = tubeColors[scope];\n\n    function frame(t) {\n      const w = c.width, h = c.height;\n      ctx.clearRect(0, 0, w, h);\n\n      // ease current fill toward target\n      tubeFills[scope] += (tubeTargets[scope] - tubeFills[scope]) * 0.03;\n      const fillRatio = Math.max(0.05, Math.min(0.95, tubeFills[scope]));\n      const surfaceY = h * (1 - fillRatio);\n      const amp = 4 * devicePixelRatio;\n\n      // liquid body\n      ctx.fillStyle = col.fill;\n      ctx.beginPath();\n      ctx.moveTo(0, h);\n      ctx.lineTo(0, surfaceY);\n      for (let x = 0; x <= w; x += 4) {\n        const y = surfaceY + Math.sin(x * 0.03 + t * 0.003) * amp;\n        ctx.lineTo(x, y);\n      }\n      ctx.lineTo(w, h);\n      ctx.closePath();\n      ctx.fill();\n\n      // surface highlight\n      ctx.strokeStyle = col.deep;\n      ctx.lineWidth = 1.5 * devicePixelRatio;\n      ctx.beginPath();\n      for (let x = 0; x <= w; x += 4) {\n        const y = surfaceY + Math.sin(x * 0.03 + t * 0.003) * amp;\n        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);\n      }\n      ctx.stroke();\n\n      // bubbles\n      if (Math.random() < 0.025 + fillRatio * 0.06) {\n        tubeBubbles[scope].push({\n          x: Math.random() * w,\n          y: h - 6 * devicePixelRatio,\n          r: (1 + Math.random() * 2) * devicePixelRatio,\n          v: 0.3 + Math.random() * 0.7\n        });\n      }\n      tubeBubbles[scope] = tubeBubbles[scope].filter(b => b.y > surfaceY);\n      tubeBubbles[scope].forEach(b => {\n        b.y -= b.v * devicePixelRatio;\n        ctx.beginPath();\n        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);\n        ctx.fillStyle = 'rgba(255,255,255,0.5)';\n        ctx.fill();\n      });\n\n      requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  });\n}\ninitTubes();\n\n// log-scale token amount → 0..1 fill\nfunction toFill(n) {\n  if (!n) return 0.05;\n  const log = Math.log10(n);\n  // map log [3..11] → [0.15..0.92]\n  return Math.max(0.08, Math.min(0.92, (log - 3) / 8 * 0.77 + 0.15));\n}\n\nfunction setNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  el.style.transition = 'opacity .25s, transform .25s';\n  el.style.opacity = '0'; el.style.transform = 'translateY(-2px)';\n  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 220);\n}\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setNum('t-today-in', t.input); setNum('t-today-out', t.output);\n  setNum('t-month-in', m.input); setNum('t-month-out', m.output);\n  setNum('t-total-in', a.input); setNum('t-total-out', a.output);\n  const th=C.hitRate(t),mh=C.hitRate(m),ah=C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?`缓存 ${th}%`:'缓存 —';\n  document.getElementById('hit-month').textContent = mh!==null?`缓存 ${mh}%`:'缓存 —';\n  document.getElementById('hit-total').textContent = ah!==null?`命中 ${ah}%`:'命中 —';\n  tubeTargets.today = toFill(t.input);\n  tubeTargets.month = toFill(m.input);\n  tubeTargets.total = toFill(a.input);\n}\n\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n    document.getElementById('stage').classList.toggle('hidden', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n    renderTop(gs, sessions);\n    renderSpecimens(sessions, detail);\n    renderConfirm(sessions);\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"}</script>

<script>
(function() {
  const THEMES    = JSON.parse(document.getElementById('themes-data').textContent);
  const TEMPLATES = JSON.parse(document.getElementById('themes-templates').textContent);

  const DEFAULT_THEME = 'aurora';
  const STORAGE_KEY = 'claude-status-theme';

  function currentTheme() {
    try {
      const t = localStorage.getItem(STORAGE_KEY);
      if (t && TEMPLATES[t]) return t;
    } catch (e) {}
    return DEFAULT_THEME;
  }

  function loadTheme(id) {
    if (!TEMPLATES[id]) id = DEFAULT_THEME;
    try { localStorage.setItem(STORAGE_KEY, id); } catch (e) {}
    const frame = document.getElementById('theme-frame');
    frame.srcdoc = TEMPLATES[id];
    renderPickerCards();
    hidePicker();
    setTimeout(() => {
      const splash = document.getElementById('boot-splash');
      if (splash) splash.classList.add('hidden');
    }, 400);
  }

  // Wake lock — keep iPad screen on
  (async () => {
    if ('wakeLock' in navigator) {
      try { await navigator.wakeLock.request('screen'); } catch (e) {}
    }
  })();
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && 'wakeLock' in navigator) {
      try { await navigator.wakeLock.request('screen'); } catch (e) {}
    }
  });

  // Picker UI
  function renderPickerCards() {
    const cur = currentTheme();
    const sheet = document.getElementById('picker-sheet');
    sheet.innerHTML = `
      <div class="pk-card-wrap">
        <div class="pk-head">
          <div class="pk-title">切换主题</div>
          <div class="pk-sub">${THEMES.length} themes · ⌘K</div>
        </div>
        <div class="pk-grid">
          ${THEMES.map(t => `
            <button class="pk-card ${t.id === cur ? 'active' : ''}" data-theme="${t.id}">
              <div class="pk-swatch" style="background: ${t.swatch}"></div>
              <div class="pk-name">${t.name}</div>
              <div class="pk-desc">${t.desc}</div>
            </button>
          `).join('')}
        </div>
        <button class="pk-close">关闭</button>
      </div>
    `;
  }

  function showPicker() {
    renderPickerCards();
    document.getElementById('picker-sheet').classList.add('visible');
  }
  function hidePicker() {
    document.getElementById('picker-sheet').classList.remove('visible');
  }
  function togglePicker() {
    const sheet = document.getElementById('picker-sheet');
    if (sheet.classList.contains('visible')) hidePicker(); else showPicker();
  }

  document.getElementById('picker-btn').addEventListener('click', togglePicker);
  document.getElementById('picker-sheet').addEventListener('click', (e) => {
    if (e.target.id === 'picker-sheet') hidePicker();
    const card = e.target.closest('.pk-card');
    if (card) loadTheme(card.dataset.theme);
    if (e.target.classList.contains('pk-close')) hidePicker();
  });

  // Keyboard: ⌘K / Ctrl+K opens picker, Esc closes
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); togglePicker();
    } else if (e.key === 'Escape') {
      hidePicker();
    }
  });

  // Boot the saved theme
  loadTheme(currentTheme());
})();
</script>
</body>
