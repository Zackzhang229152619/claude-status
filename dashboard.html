tate, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n// ───── Clock ─────\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours());\n  const mm = C.pad2(now.getMinutes());\n  document.getElementById('clock').innerHTML =\n    `<span>${hh}\u003c/span><span class=\"colon\">:\u003c/span><span>${mm}\u003c/span>`;\n  document.getElementById('date').textContent = C.fmtDate(now);\n  document.getElementById('confirm-clock').textContent = `${hh}:${mm}`;\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n// ───── Render sessions ─────\nfunction renderSessions(sessions, detail) {\n  const panel = document.getElementById('sessions');\n  document.getElementById('sess-count').textContent = sessions.length;\n\n  if (!sessions.length) {\n    panel.innerHTML = '<div class=\"placeholder\">awaiting signal…\u003c/div>';\n    return;\n  }\n\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n\n  const sorted = C.sortSessions(sessions);\n  const VIS = 5;\n  const visible = sorted.slice(0, VIS);\n  const extra = sorted.length - visible.length;\n\n  panel.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知项目';\n    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;\n    const age = C.timeAgo(s.updated_at);\n\n    const toolHtml = tool\n      ? `<div class=\"card-tool\"><span class=\"card-tool-name\">${C.esc(tool)}\u003c/span>${target ? `<span class=\"card-tool-target\">${C.esc(target)}\u003c/span>` : ''}\u003c/div>` : '';\n    const promptHtml = prompt\n      ? `<div class=\"card-prompt\">${C.esc(prompt)}\u003c/div>` : '';\n\n    return `\n      <div class=\"card state-${state}\" style=\"animation-delay: ${i*60}ms\">\n        <div class=\"card-row1\">\n          <span class=\"card-badge badge-${state}\">${C.STATE_LABEL[state] || state}\u003c/span>\n          <span class=\"card-project\">${C.esc(project)}\u003c/span>\n          <span class=\"card-id\">${C.esc((s.id||'').slice(0,8))}\u003c/span>\n          <span class=\"card-age\">${age}\u003c/span>\n        \u003c/div>\n        ${toolHtml}${promptHtml}\n      \u003c/div>\n    `;\n  }).join('') + (extra > 0 ? `<div class=\"more\">+ ${extra} 更多 session\u003c/div>` : '');\n}\n\n// ───── Render top bar ─────\nfunction renderTop(gs, sessions) {\n  const dot = document.getElementById('g-dot');\n  dot.className = 'dot dot-' + (gs || 'idle');\n  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();\n\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);\n  const summary = total === 0 ? '无活动 session'\n    : `${total} session${total!==1?'s':''}` + (parts.length ? ` · ${parts.join(' · ')}` : '');\n  document.getElementById('g-summary').textContent = summary;\n\n  document.body.dataset.state = gs || 'idle';\n}\n\n// ───── Render confirm ─────\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*100}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知项目')}\u003c/span>\n      <span class=\"confirm-id\">${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\n// ───── Render tokens (smooth update) ─────\nconst prevTokens = {};\nfunction setTokenNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  // fade-out, swap, fade-in\n  el.style.transition = 'opacity .25s, transform .25s';\n  el.style.opacity = '0'; el.style.transform = 'translateY(-4px)';\n  setTimeout(() => {\n    el.textContent = formatted;\n    el.style.opacity = '1'; el.style.transform = 'none';\n  }, 220);\n}\n\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setTokenNum('t-today-in',  t.input);\n  setTokenNum('t-today-out', t.output);\n  setTokenNum('t-month-in',  m.input);\n  setTokenNum('t-month-out', m.output);\n  setTokenNum('t-total-in',  a.input);\n  setTokenNum('t-total-out', a.output);\n\n  const th = C.hitRate(t), mh = C.hitRate(m), ah = C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?`缓存 ${th}%`:'缓存 —';\n  document.getElementById('hit-month').textContent = mh!==null?`缓存 ${mh}%`:'缓存 —';\n  document.getElementById('hit-total').textContent = ah!==null?`缓存命中 ${ah}%`:'缓存命中 —';\n  if (data.last_updated) {\n    document.getElementById('tok-updated').textContent = C.fmtTimeHM(new Date(data.last_updated)) + ' UPDATED';\n  }\n}\n\n// ───── Wire common ─────\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n\n    document.getElementById('stage').classList.toggle('hidden', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n\n    renderTop(gs, sessions);\n    renderSessions(sessions, detail);\n    renderConfirm(sessions);\n\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "press": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · Press\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;700&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --paper:       #f3eee4;\n  --paper-2:     #ebe4d4;\n  --paper-edge:  #d8cfba;\n  --ink:         #15110b;\n  --ink-2:       #443a2a;\n  --ink-3:       #6a5e48;\n  --ink-4:       #978a72;\n  --rule:        #2b2418;\n\n  --c-working:  #c47808;\n  --c-thinking: #16557a;\n  --c-done:     #2f6b3a;\n  --c-idle:     #6a5e48;\n  --c-confirm:  #b21515;\n\n  --font-serif: \"DM Serif Display\", \"Times New Roman\", serif;\n  --font-body:  \"Newsreader\", \"Times New Roman\", serif;\n  --font-mono:  \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: var(--paper);\n  color: var(--ink);\n  font-family: var(--font-body);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* paper grain & subtle vignette */\nbody::before {\n  content: '';\n  position: fixed; inset: 0;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/>\u003c/filter><rect width='400' height='400' filter='url(%23n)' opacity='0.55'/>\u003c/svg>\");\n  opacity: 0.10;\n  mix-blend-mode: multiply;\n  pointer-events: none;\n  z-index: 2;\n}\nbody::after {\n  content: '';\n  position: fixed; inset: 0;\n  background: radial-gradient(ellipse at center, transparent 55%, rgba(20,15,5,0.10) 100%);\n  pointer-events: none;\n  z-index: 2;\n}\n\n/* ============================================================\n   Stage\n   ============================================================ */\n#stage {\n  position: relative; z-index: 1;\n  width: 100%; height: 100%;\n  padding: clamp(18px, 2vw, 32px) clamp(22px, 2.6vw, 40px);\n  display: grid;\n  grid-template-rows: auto auto 1fr;\n  gap: clamp(14px, 1.4vw, 22px);\n  transition: opacity 0.4s;\n}\n#stage.hidden { opacity: 0; pointer-events: none; }\n\n/* ============================================================\n   Masthead\n   ============================================================ */\n.masthead {\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: end;\n  gap: 24px;\n  border-bottom: 2px solid var(--rule);\n  padding-bottom: 12px;\n}\n.masthead-left {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  line-height: 1.6;\n}\n.masthead-left strong { color: var(--ink); }\n\n.masthead-title {\n  text-align: center;\n  font-family: var(--font-serif);\n  font-size: clamp(40px, 6vw, 80px);\n  line-height: 1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n.masthead-title .amp {\n  font-style: italic;\n  color: var(--ink-3);\n  font-weight: 400;\n}\n\n.masthead-right {\n  text-align: right;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  line-height: 1.6;\n}\n.masthead-right strong { color: var(--ink); }\n.masthead-right .price {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: 14px;\n  color: var(--ink-2);\n  text-transform: none;\n  letter-spacing: 0;\n  margin-top: 2px;\n}\n\n/* ============================================================\n   Status strip — under masthead\n   ============================================================ */\n.status-strip {\n  display: flex;\n  align-items: center;\n  gap: clamp(12px, 1.5vw, 24px);\n  padding: 8px 12px;\n  border-top: 1px solid var(--ink-2);\n  border-bottom: 1px solid var(--ink-2);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n  position: relative;\n}\n.status-strip > * { flex-shrink: 0; }\n.status-strip .grow { flex: 1; min-width: 0; }\n.dot {\n  width: 9px; height: 9px;\n  border-radius: 50%;\n  background: var(--c-idle);\n  display: inline-block;\n  margin-right: 8px;\n}\n.dot-working     { background: var(--c-working); animation: none; }\n.dot-thinking    { background: var(--c-thinking); animation: none; }\n.dot-done        { background: var(--c-done); }\n.dot-needConfirm { background: var(--c-confirm); animation: none; }\n@keyframes soft-breathe {\n  0%,100% { transform: scale(1);    filter: brightness(1);   opacity: 1; }\n  50%     { transform: scale(1.08); filter: brightness(1.2); opacity: 0.92; }\n}\n@keyframes pulse-d {\n  0%,100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }\n  50%     { box-shadow: 0 0 0 5px transparent; opacity: 0.55; }\n}\n\n.bigclock {\n  display: inline-flex;\n  align-items: baseline;\n  gap: 2px;\n  font-family: var(--font-serif);\n  font-size: clamp(20px, 2.4vw, 30px);\n  line-height: 1;\n  color: var(--ink);\n  margin-left: auto;\n}\n.bigclock .colon { color: var(--ink-3); animation: blink 2s ease-in-out infinite; padding: 0 2px; }\n@keyframes blink { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }\n.flip {\n  display: inline-block;\n  perspective: 200px;\n  position: relative;\n  width: 1.05em;\n  text-align: center;\n}\n.flip span { display: inline-block; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(.4,.0,.2,1); }\n.flip.flipping span { animation: flip-card 0.7s cubic-bezier(.4,.0,.2,1); }\n@keyframes flip-card {\n  0%   { transform: rotateX(0deg); }\n  50%  { transform: rotateX(-90deg); }\n  100% { transform: rotateX(0deg); }\n}\n\n/* ============================================================\n   Body\n   ============================================================ */\n.body {\n  display: grid;\n  grid-template-columns: minmax(0, 1.7fr) 1px minmax(280px, 1fr);\n  gap: clamp(16px, 1.8vw, 28px);\n  min-height: 0;\n}\n.divider {\n  background: var(--ink-2);\n  width: 1px;\n  align-self: stretch;\n}\n\n@media (orientation: portrait), (max-width: 820px) {\n  .body { grid-template-columns: 1fr; grid-template-rows: minmax(0, 1.7fr) auto auto; }\n  .divider { width: auto; height: 1px; }\n}\n\n/* Section header — newspaper style */\n.s-head {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  border-bottom: 1px solid var(--ink-2);\n  padding-bottom: 6px;\n  margin-bottom: clamp(10px, 1vw, 16px);\n}\n.s-title {\n  font-family: var(--font-serif);\n  font-size: clamp(22px, 2.4vw, 32px);\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  line-height: 1;\n}\n.s-title .ital { font-style: italic; color: var(--ink-3); font-size: 0.7em; margin-left: 8px; }\n.s-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.2em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n}\n\n/* sessions */\n.sessions-col { display: flex; flex-direction: column; min-height: 0; }\n.sessions {\n  flex: 1;\n  display: flex; flex-direction: column;\n  gap: clamp(10px, 1.2vw, 18px);\n  overflow-y: auto;\n  scrollbar-width: thin;\n  scrollbar-color: var(--paper-edge) transparent;\n  min-height: 0;\n  padding-right: 4px;\n}\n.sessions::-webkit-scrollbar { width: 5px; }\n.sessions::-webkit-scrollbar-thumb { background: var(--paper-edge); border-radius: 3px; }\n\n/* Bulletin (session card) */\n.bulletin {\n  border-top: 1px solid var(--ink-2);\n  padding-top: clamp(8px, 1vw, 14px);\n  animation: none;\n}\n.bulletin:first-child { border-top: none; padding-top: 0; }\n@keyframes bulletin-in {\n  from { opacity: 0; transform: translateY(6px); }\n  to   { opacity: 1; transform: none; }\n}\n\n.b-row1 {\n  display: flex;\n  align-items: baseline;\n  gap: 10px;\n  margin-bottom: 4px;\n}\n.b-badge {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  padding: 3px 9px;\n  border: 1.5px solid;\n  border-radius: 2px;\n  flex-shrink: 0;\n  background: var(--paper-2);\n  transform-origin: left center;\n  animation: none;\n}\n@keyframes stamp {\n  from { transform: scale(1.3) rotate(-2.5deg); opacity: 0; }\n  to   { transform: scale(1)   rotate(-0.8deg); opacity: 1; }\n}\n.badge-working     { color: var(--c-working);  border-color: var(--c-working); }\n.badge-thinking    { color: var(--c-thinking); border-color: var(--c-thinking); }\n.badge-done        { color: var(--c-done);     border-color: var(--c-done); }\n.badge-needConfirm { color: #fff; border-color: var(--c-confirm); background: var(--c-confirm); }\n.badge-idle        { color: var(--ink-4);      border-color: var(--ink-4); background: transparent; }\n\n.b-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--ink-3);\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  margin-left: auto;\n}\n.b-id {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--ink-4);\n  letter-spacing: 0.04em;\n}\n\n.b-headline {\n  font-family: var(--font-serif);\n  font-size: clamp(22px, 2.6vw, 36px);\n  line-height: 1.05;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  margin-bottom: 4px;\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n\n.b-tool {\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1vw, 13px);\n  color: var(--ink-2);\n  letter-spacing: 0.04em;\n  margin-bottom: 6px;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.b-tool-label { color: var(--ink-3); letter-spacing: 0.18em; text-transform: uppercase; font-size: 9px; margin-right: 6px; }\n.b-tool-target { color: var(--ink-2); margin-left: 6px; }\n.b-tool-target::before { content: ' · '; color: var(--ink-4); }\n\n.b-pull {\n  font-family: var(--font-body);\n  font-style: italic;\n  font-size: clamp(14px, 1.4vw, 18px);\n  line-height: 1.4;\n  color: var(--ink-2);\n  border-left: 3px solid var(--ink);\n  padding-left: 12px;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n\n.placeholder-news {\n  flex: 1;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(20px, 2vw, 28px);\n  color: var(--ink-3);\n  text-align: center;\n  border: 1px dashed var(--ink-4);\n  border-radius: 2px;\n  min-height: 100px;\n}\n\n.more {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--ink-3);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  text-align: center;\n  padding-top: 8px;\n  border-top: 1px solid var(--ink-2);\n}\n\n/* TOKEN — print-style stats */\n.token-col { display: flex; flex-direction: column; min-height: 0; }\n.token-list {\n  flex: 1;\n  display: flex; flex-direction: column;\n  gap: clamp(14px, 1.4vw, 22px);\n  min-height: 0;\n}\n.tok-row {\n  display: grid;\n  grid-template-rows: auto auto auto;\n  gap: 4px;\n  padding-bottom: clamp(12px, 1.2vw, 18px);\n  border-bottom: 1px dotted var(--ink-3);\n}\n.tok-row:last-child { border-bottom: none; }\n.tok-scope-line {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n}\n.tok-scope {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(18px, 1.8vw, 26px);\n  color: var(--ink);\n  line-height: 1;\n}\n.tok-hit {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--ink-3);\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n}\n.tok-nums {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 12px;\n  align-items: end;\n  margin-top: 4px;\n}\n.tok-num {\n  font-family: var(--font-serif);\n  font-size: clamp(28px, 3.2vw, 48px);\n  line-height: 0.95;\n  letter-spacing: -0.02em;\n  white-space: nowrap;\n}\n.tok-in  { color: var(--ink); }\n.tok-out { color: var(--c-working); font-style: italic; }\n.tok-cap {\n  font-family: var(--font-mono);\n  font-size: 9px;\n  color: var(--ink-3);\n  letter-spacing: 0.25em;\n  text-transform: uppercase;\n  margin-top: 2px;\n}\n\n/* ============================================================\n   needConfirm — front-page \"EXTRA!\"\n   ============================================================ */\n#confirm {\n  position: fixed; inset: 0;\n  z-index: 50;\n  opacity: 0;\n  pointer-events: none;\n  background: var(--paper);\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  padding: clamp(40px, 6vw, 80px);\n  transition: opacity 0.5s;\n}\n#confirm.visible { opacity: 1; pointer-events: auto; }\n\n.confirm-rule-top,\n.confirm-rule-bot {\n  position: absolute;\n  left: 4%; right: 4%;\n  height: 4px;\n  background: var(--c-confirm);\n}\n.confirm-rule-top { top: 4%; box-shadow: 0 6px 0 var(--c-confirm), 0 -10px 0 0 transparent inset; }\n.confirm-rule-top::after,\n.confirm-rule-bot::before {\n  content: '';\n  position: absolute;\n  left: 0; right: 0;\n  height: 1px;\n  background: var(--c-confirm);\n}\n.confirm-rule-top::after { top: 10px; }\n.confirm-rule-bot { bottom: 4%; box-shadow: 0 -6px 0 var(--c-confirm); }\n\n.confirm-extra {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(20px, 2vw, 30px);\n  color: var(--c-confirm);\n  letter-spacing: 0.4em;\n  text-transform: uppercase;\n  margin-bottom: clamp(8px, 1vw, 14px);\n}\n\n.confirm-headline {\n  font-family: var(--font-serif);\n  font-size: clamp(90px, 16vw, 280px);\n  line-height: 0.92;\n  letter-spacing: -0.05em;\n  color: var(--ink);\n  text-align: center;\n  margin-bottom: clamp(16px, 2vw, 28px);\n  position: relative;\n}\n.confirm-headline::before,\n.confirm-headline::after {\n  content: '—';\n  font-style: italic;\n  color: var(--c-confirm);\n  opacity: 0.4;\n  margin: 0 0.5ch;\n}\n\n.confirm-stamp {\n  position: absolute;\n  top: 38%;\n  right: 8%;\n  font-family: var(--font-mono);\n  font-size: clamp(20px, 2.6vw, 36px);\n  font-weight: 700;\n  color: var(--c-confirm);\n  border: 4px solid var(--c-confirm);\n  padding: 14px 22px;\n  border-radius: 8px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  transform: rotate(-8deg);\n  opacity: 0.85;\n  animation: none;\n}\n@keyframes stamp-in {\n  from { transform: rotate(-8deg) scale(2); opacity: 0; }\n  to   { transform: rotate(-8deg) scale(1); opacity: 0.9; }\n}\n\n.confirm-byline {\n  font-family: var(--font-body);\n  font-style: italic;\n  font-size: clamp(16px, 1.6vw, 22px);\n  color: var(--ink-2);\n  text-align: center;\n  margin-bottom: clamp(20px, 2.4vw, 32px);\n}\n\n.confirm-list {\n  display: flex; flex-direction: column;\n  gap: 8px;\n  align-items: center;\n}\n.confirm-row {\n  display: flex; align-items: baseline; gap: 14px;\n  padding: 6px 20px;\n  border-top: 1px solid var(--ink-2);\n  border-bottom: 1px solid var(--ink-2);\n  animation: none;\n}\n@keyframes row-in {\n  from { opacity: 0; transform: translateY(8px); }\n  to   { opacity: 1; transform: none; }\n}\n.confirm-name {\n  font-family: var(--font-serif);\n  font-size: clamp(22px, 2.2vw, 32px);\n  color: var(--ink);\n}\n.confirm-id {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--c-confirm);\n  letter-spacing: 0.05em;\n}\n\n.confirm-time {\n  position: absolute;\n  bottom: 7%;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: 0.15em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n}\n\n/* error */\n#error-overlay {\n  position: fixed; inset: 0;\n  background: var(--paper);\n  display: none;\n  flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 14px;\n  z-index: 60;\n}\n.err-title {\n  font-family: var(--font-serif);\n  font-style: italic;\n  font-size: clamp(36px, 4vw, 60px);\n  color: var(--c-confirm);\n}\n.err-sub {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\u003c/style>\n\u003c/head>\n<body>\n\n<div id=\"stage\">\n  <header class=\"masthead\">\n    <div class=\"masthead-left\">\n      <strong id=\"m-vol\">VOL. CCXVII\u003c/strong><br>\n      <span id=\"m-edition\">EDITION · LIVE\u003c/span>\n    \u003c/div>\n    <div class=\"masthead-title\">\n      Claude<span class=\"amp\"> &amp; \u003c/span>Code\n    \u003c/div>\n    <div class=\"masthead-right\">\n      <strong id=\"m-date\">— —\u003c/strong><br>\n      <div class=\"price\">三个数据接口 · 五种状态\u003c/div>\n    \u003c/div>\n  \u003c/header>\n\n  <div class=\"status-strip\">\n    <span><span id=\"g-dot\" class=\"dot dot-idle\">\u003c/span><strong id=\"g-label\">IDLE\u003c/strong>\u003c/span>\n    <span class=\"grow\" id=\"g-summary\" style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">无活动 session\u003c/span>\n    <span class=\"bigclock\" id=\"bigclock\">\n      <span class=\"flip\" data-d=\"0\"><span>0\u003c/span>\u003c/span>\n      <span class=\"flip\" data-d=\"0\"><span>0\u003c/span>\u003c/span>\n      <span class=\"colon\">:\u003c/span>\n      <span class=\"flip\" data-d=\"0\"><span>0\u003c/span>\u003c/span>\n      <span class=\"flip\" data-d=\"0\"><span>0\u003c/span>\u003c/span>\n    \u003c/span>\n  \u003c/div>\n\n  <main class=\"body\">\n    <section class=\"sessions-col\">\n      <div class=\"s-head\">\n        <span class=\"s-title\">Bulletins<span class=\"ital\">— sessions in progress\u003c/span>\u003c/span>\n        <span class=\"s-meta\"><span id=\"sess-count\">0\u003c/span> ACTIVE\u003c/span>\n      \u003c/div>\n      <div class=\"sessions\" id=\"sessions\">\n        <div class=\"placeholder-news\">No bulletins on the wire.\u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    <div class=\"divider\">\u003c/div>\n\n    <aside class=\"token-col\">\n      <div class=\"s-head\">\n        <span class=\"s-title\">Usage<span class=\"ital\">— tokens consumed\u003c/span>\u003c/span>\n        <span class=\"s-meta\" id=\"tok-updated\">— —\u003c/span>\n      \u003c/div>\n      <div class=\"token-list\">\n        <div class=\"tok-row\">\n          <div class=\"tok-scope-line\"><span class=\"tok-scope\">今日\u003c/span><span class=\"tok-hit\" id=\"hit-today\">Cache —\u003c/span>\u003c/div>\n          <div class=\"tok-nums\">\n            <div><div class=\"tok-num tok-in\"  id=\"t-today-in\">—\u003c/div><div class=\"tok-cap\">输入 IN\u003c/div>\u003c/div>\n            <div><div class=\"tok-num tok-out\" id=\"t-today-out\">—\u003c/div><div class=\"tok-cap\">输出 OUT\u003c/div>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        <div class=\"tok-row\">\n          <div class=\"tok-scope-line\"><span class=\"tok-scope\">本月\u003c/span><span class=\"tok-hit\" id=\"hit-month\">Cache —\u003c/span>\u003c/div>\n          <div class=\"tok-nums\">\n            <div><div class=\"tok-num tok-in\"  id=\"t-month-in\">—\u003c/div><div class=\"tok-cap\">输入 IN\u003c/div>\u003c/div>\n            <div><div class=\"tok-num tok-out\" id=\"t-month-out\">—\u003c/div><div class=\"tok-cap\">输出 OUT\u003c/div>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n        <div class=\"tok-row\">\n          <div class=\"tok-scope-line\"><span class=\"tok-scope\">累计\u003c/span><span class=\"tok-hit\" id=\"hit-total\">Cache —\u003c/span>\u003c/div>\n          <div class=\"tok-nums\">\n            <div><div class=\"tok-num tok-in\"  id=\"t-total-in\">—\u003c/div><div class=\"tok-cap\">输入 IN\u003c/div>\u003c/div>\n            <div><div class=\"tok-num tok-out\" id=\"t-total-out\">—\u003c/div><div class=\"tok-cap\">输出 OUT\u003c/div>\u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/aside>\n  \u003c/main>\n\u003c/div>\n\n<div id=\"confirm\">\n  <div class=\"confirm-rule-top\">\u003c/div>\n  <div class=\"confirm-rule-bot\">\u003c/div>\n  <div class=\"confirm-extra\">— EXTRA · 号外 —\u003c/div>\n  <div class=\"confirm-headline\">等你拍板\u003c/div>\n  <div class=\"confirm-stamp\">URGENT\u003c/div>\n  <div class=\"confirm-byline\">Claude has reached a fork in the road and awaits your decision.\u003c/div>\n  <div class=\"confirm-list\" id=\"confirm-list\">\u003c/div>\n  <div class=\"confirm-time\" id=\"confirm-time\">— —\u003c/div>\n\u003c/div>\n\n<div id=\"error-overlay\">\n  <div class=\"err-title\">— 通讯中断 —\u003c/div>\n  <div class=\"err-sub\">CHECK WIFI · SERVER.PY\u003c/div>\n\u003c/div>\n\n<script>\n/* ==========================================================\n   Claude Status — shared data layer for all design variants.\n   Each variant subscribes via StatusCommon.init({...callbacks}).\n   ========================================================== */\n(function () {\n  const DAYS = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];\n  const pad2 = n => String(n).padStart(2, '0');\n\n  // ───── formatters ─────────────────────────────────────────\n  const fmtTime = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;\n  const fmtTimeHM = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;\n  const fmtDate = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} ${DAYS[d.getDay()]}`;\n\n  function timeAgo(iso) {\n    if (!iso) return '';\n    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);\n    if (diff < 5)    return '刚刚';\n    if (diff < 60)   return diff + 's';\n    if (diff < 3600) return Math.floor(diff/60) + 'm';\n    if (diff < 86400) return Math.floor(diff/3600) + 'h';\n    return Math.floor(diff/86400) + 'd';\n  }\n\n  function esc(s) {\n    return String(s ?? '').replace(/[&<>\"']/g, c => ({\n      '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\n    }[c]));\n  }\n\n  function fmtTokens(n) {\n    if (n === undefined || n === null) return '—';\n    if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';\n    return String(n);\n  }\n\n  function hitRate(bucket) {\n    if (!bucket) return null;\n    const denom = (bucket.input || 0) + (bucket.cache_read || 0);\n    if (!denom) return null;\n    return Math.round((bucket.cache_read || 0) / denom * 100);\n  }\n\n  // ───── state constants ─────────────────────────────────────\n  const STATE_LABEL = {\n    idle: '空闲', thinking: '思考中', working: '工作中',\n    needConfirm: '等你拍板', done: '完成'\n  };\n  const STATE_PRIORITY = { needConfirm: 0, working: 1, thinking: 2, done: 3, idle: 4 };\n\n  function sortSessions(arr) {\n    return [...arr].sort((a, b) => {\n      const pa = STATE_PRIORITY[a.state] ?? 5;\n      const pb = STATE_PRIORITY[b.state] ?? 5;\n      if (pa !== pb) return pa - pb;\n      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);\n    });\n  }\n\n  // ───── demo fixtures ───────────────────────────────────────\n  const NOW = () => Date.now();\n  function ago(ms) { return new Date(NOW() - ms).toISOString(); }\n\n  const DETAILS = [\n    { id: '3177462e-aaaa', project: 'artist-dashboard',  current_tool: 'Edit',     current_target: 'src/components/Dashboard.tsx', last_prompt: '把 M3 算法里的 INNER JOIN 改成加和逻辑' },\n    { id: '5fdd120d-bbbb', project: 'claude-code',       current_tool: 'Read',     current_target: 'server.py',                     last_prompt: '检查 server 启动逻辑有没有 race condition' },\n    { id: '8a91c2e0-cccc', project: 'status-light-pack', current_tool: 'Write',    current_target: 'dashboard.html',                last_prompt: '把 dashboard 重做一下，要 fancy 一点' },\n    { id: '12abef34-dddd', project: 'sketches',          current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'cd45ef67-eeee', project: 'design-notes',      current_tool: null,       current_target: null,                            last_prompt: null },\n    { id: 'a7b3c1d5-ffff', project: 'fan-insights',      current_tool: 'Bash',     current_target: 'pnpm test --watch',             last_prompt: '跑一下测试看看修复有没有问题' }\n  ];\n\n  function fixtureFor(mode) {\n    if (mode === 'empty') return { global_state: 'idle', sessions: [] };\n    if (mode === 'idle')  return {\n      global_state: 'idle',\n      sessions: [\n        { id: '12abef34-dddd', state: 'idle', project: 'sketches',     updated_at: ago(1_800_000) },\n        { id: 'cd45ef67-eeee', state: 'idle', project: 'design-notes', updated_at: ago(3_600_000) }\n      ]\n    };\n    if (mode === 'thinking') return {\n      global_state: 'thinking',\n      sessions: [\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(3_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) }\n      ]\n    };\n    if (mode === 'done') return {\n      global_state: 'done',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'done', project: 'artist-dashboard',  updated_at: ago(12_000) },\n        { id: '8a91c2e0-cccc', state: 'done', project: 'status-light-pack', updated_at: ago(90_000) }\n      ]\n    };\n    if (mode === 'needConfirm') return {\n      global_state: 'needConfirm',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'needConfirm', project: 'artist-dashboard', updated_at: ago(2_000) },\n        { id: '5fdd120d-bbbb', state: 'working',     project: 'claude-code',      updated_at: ago(15_000) }\n      ]\n    };\n    // working (default)\n    return {\n      global_state: 'working',\n      sessions: [\n        { id: '3177462e-aaaa', state: 'working',  project: 'artist-dashboard',  updated_at: ago(25_000) },\n        { id: '5fdd120d-bbbb', state: 'thinking', project: 'claude-code',       updated_at: ago(8_000) },\n        { id: 'a7b3c1d5-ffff', state: 'working',  project: 'fan-insights',      updated_at: ago(45_000) },\n        { id: '8a91c2e0-cccc', state: 'done',     project: 'status-light-pack', updated_at: ago(300_000) },\n        { id: '12abef34-dddd', state: 'idle',     project: 'sketches',          updated_at: ago(1_800_000) }\n      ]\n    };\n  }\n\n  const TOKEN_FIXTURE = {\n    today: { input: 1_234_567,   output: 89_012,    cache_read: 4_500_000 },\n    month: { input: 23_456_789,  output: 1_890_123, cache_read: 95_000_000 },\n    total: { input: 234_567_890, output: 18_901_234, cache_read: 980_000_000 }\n  };\n\n  // ───── init / subscribe ────────────────────────────────────\n  // opts: { onState({global_state, sessions}, detailList), onTokens(data), onError(bool) }\n  function init(opts = {}) {\n    const params = new URLSearchParams(location.search);\n    const demoMode = params.get('demo');\n    let current = null, detail = null;\n\n    function pushState() {\n      if (!current) return;\n      opts.onState && opts.onState(current, detail);\n    }\n\n    // Wake lock\n    (async () => {\n      if ('wakeLock' in navigator) {\n        try { await navigator.wakeLock.request('screen'); } catch (e) {}\n      }\n    })();\n\n    // Demo mode — inject fixture & exit (no polling)\n    if (demoMode) {\n      if (demoMode === 'error') {\n        opts.onError && opts.onError(true);\n        return;\n      }\n      current = fixtureFor(demoMode);\n      detail  = DETAILS;\n      const tok = { ...TOKEN_FIXTURE, last_updated: new Date().toISOString() };\n      opts.onTokens && opts.onTokens(tok);\n      pushState();\n      return;\n    }\n\n    // Live polling\n    // Relative-path fetch so the URL resolves correctly both:\n    //   - local:  http://claude.local:8765/current.json\n    //   - cloud:  https://artist.xn--fiqs8s/claude/state/current.json\n    // When running inside an iframe (srcdoc), use parent origin + path prefix.\n    function getApiBase() {\n      try {\n        if (window.parent && window.parent !== window) {\n          const po = window.parent.location.origin;\n          const pp = window.parent.location.pathname.replace(/\\/[^/]*$/, '');\n          if (po && po !== 'null') return po + (pp && pp !== '/' ? pp : '');\n        }\n      } catch (e) {}\n      // Direct navigation: use the current page's directory as base\n      let base = window.location.href.replace(/\\/[^/]*(\\?.*)?$/, '');\n      // If we're under /variants/ subdirectory (direct access fallback), strip it —\n      // current.json / sessions_detail.json / token_stats.json live one level up.\n      base = base.replace(/\\/variants$/, '');\n      return base;\n    }\n    const API_BASE = getApiBase();\n\n    let errCount = 0;\n\n    async function fetchCurrent() {\n      try {\n        const res = await fetch(API_BASE + '/current.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) throw new Error('HTTP ' + res.status);\n        current = await res.json();\n        errCount = 0;\n        opts.onError && opts.onError(false);\n        pushState();\n      } catch (e) {\n        if (++errCount >= 3) opts.onError && opts.onError(true);\n      }\n    }\n    async function fetchDetail() {\n      try {\n        const res = await fetch(API_BASE + '/sessions_detail.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        detail = await res.json();\n        pushState();\n      } catch (e) {}\n    }\n    async function fetchTokens() {\n      try {\n        const res = await fetch(API_BASE + '/token_stats.json?_=' + Date.now(), { cache: 'no-store' });\n        if (!res.ok) return;\n        opts.onTokens && opts.onTokens(await res.json());\n      } catch (e) {}\n    }\n\n    fetchCurrent(); fetchDetail(); fetchTokens();\n    setInterval(fetchCurrent, 1000);\n    setInterval(fetchDetail,  1000);\n    setInterval(fetchTokens,  5000);\n\n    // (file:// fallback removed — caused mock data injection in iframe srcdoc context)\n  }\n\n  // ───── export ──────────────────────────────────────────────\n  window.StatusCommon = {\n    pad2, fmtTime, fmtTimeHM, fmtDate, timeAgo, esc,\n    fmtTokens, hitRate, sortSessions,\n    STATE_LABEL, STATE_PRIORITY,\n    init\n  };\n\n  /* ============================================================\n     Responsive helpers — body data-attr drives theme CSS\n     ============================================================ */\n  function applyFormFactor() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const minD = Math.min(w, h), maxD = Math.max(w, h);\n    const portrait = h > w;\n    // size class\n    let size = 'desktop';\n    if (minD < 480)        size = 'phone';\n    else if (minD < 720)   size = 'tablet-sm';\n    else if (minD < 1100)  size = 'tablet';\n    else if (maxD > 2400)  size = 'desktop-xl';\n    document.body.dataset.size = size;\n    document.body.dataset.orient = portrait ? 'portrait' : 'landscape';\n    document.body.style.setProperty('--vw', w + 'px');\n    document.body.style.setProperty('--vh', h + 'px');\n  }\n  window.addEventListener('resize', applyFormFactor);\n  window.addEventListener('orientationchange', () => setTimeout(applyFormFactor, 100));\n  document.addEventListener('DOMContentLoaded', applyFormFactor);\n  applyFormFactor();\n\n  /* ============================================================\n     Theme picker — top-right floating button + sheet\n     ============================================================ */\n  // ?demo=... uses URL navigation; ?theme is just a default override\n  const ALL_THEMES = [\n    { id: 'aurora',   name: 'Aurora',     desc: '极光环境屏',  swatch: 'radial-gradient(circle at 30% 30%, #6a3bd6, #1e2e8a 60%, #061229)' },\n    { id: 'press',    name: 'Press',      desc: '编辑部大屏',  swatch: 'linear-gradient(135deg, #f3eee4 0%, #f3eee4 60%, #15110b 60%)' },\n    { id: 'glass',    name: 'Glass',      desc: '玻璃浮层',    swatch: 'linear-gradient(135deg, #4a5878 0%, #283454 50%, #050610 100%)' },\n    { id: 'garden',   name: 'Garden',     desc: '信息花园',    swatch: 'linear-gradient(180deg, #0a1820 0%, #1f3024 60%, #4a6a52 100%)' },\n    { id: 'lab',      name: 'Lab',        desc: '物理实验台',  swatch: 'linear-gradient(135deg, #e8e6e0 0%, #d8d5cc 60%, #ef8537 100%)' },\n    { id: 'jarvis',   name: 'Iron Man',   desc: 'J.A.R.V.I.S 战衣 HUD',  swatch: 'radial-gradient(circle at 50% 50%, #29c6ff 0%, #ff3a3a 50%, #0a0306 100%)' },\n    { id: 'stage',    name: 'Stage',      desc: '演出现场聚光灯',swatch: 'radial-gradient(circle at 50% 0%, #ff4ab8 0%, #6a18ff 40%, #0a0218 100%)' }\n  ];\n\n  function getCurrentThemeId() {\n    // assume file is named \"<theme>.html\"\n    const f = (location.pathname.split('/').pop() || '').replace('.html','');\n    return f || 'aurora';\n  }\n  function gotoTheme(id) {\n    if (!id || id === getCurrentThemeId()) { hidePicker(); return; }\n    try { localStorage.setItem('claude-status-theme', id); } catch(e) {}\n    const search = location.search; // preserve ?demo=...\n    location.href = id + '.html' + search;\n  }\n\n  let pickerOpen = false;\n  function ensurePicker() {\n    if (document.getElementById('__sc-picker')) return;\n\n    const css = `\n      #__sc-pick-btn {\n        position: fixed; top: 14px; right: 14px;\n        width: 44px; height: 44px; border-radius: 50%;\n        background: rgba(20,20,28,0.75);\n        backdrop-filter: blur(20px) saturate(160%);\n        border: 1px solid rgba(255,255,255,0.18);\n        color: #fff;\n        display: flex; align-items: center; justify-content: center;\n        cursor: pointer;\n        z-index: 9000;\n        box-shadow: 0 6px 20px rgba(0,0,0,0.35);\n        transition: transform 0.2s, background 0.2s;\n        -webkit-tap-highlight-color: transparent;\n        font-size: 0;\n      }\n      #__sc-pick-btn:hover { transform: scale(1.05); }\n      #__sc-pick-btn:active { transform: scale(0.96); }\n      #__sc-pick-btn svg { width: 22px; height: 22px; }\n      body[data-size=\"phone\"] #__sc-pick-btn { width: 38px; height: 38px; top: 10px; right: 10px; }\n      body[data-size=\"desktop-xl\"] #__sc-pick-btn { width: 52px; height: 52px; top: 22px; right: 22px; }\n\n      #__sc-picker {\n        position: fixed; inset: 0;\n        z-index: 9001;\n        background: rgba(0,0,0,0.55);\n        backdrop-filter: blur(8px);\n        display: none;\n        align-items: center; justify-content: center;\n        padding: 24px;\n      }\n      #__sc-picker.visible { display: flex; animation: __sc-fade 0.2s ease; }\n      @keyframes __sc-fade { from { opacity: 0; } to { opacity: 1; } }\n\n      .__sc-sheet {\n        max-width: min(560px, 92vw);\n        max-height: 86vh;\n        overflow: auto;\n        background: rgba(22,24,32,0.96);\n        backdrop-filter: blur(40px) saturate(180%);\n        border: 1px solid rgba(255,255,255,0.12);\n        border-radius: 24px;\n        padding: clamp(18px, 2vw, 28px);\n        color: #fff;\n        font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", sans-serif;\n        box-shadow: 0 30px 80px rgba(0,0,0,0.55);\n        animation: __sc-pop 0.25s cubic-bezier(0.2,1.5,0.4,1);\n      }\n      @keyframes __sc-pop {\n        from { opacity: 0; transform: translateY(20px) scale(0.95); }\n        to   { opacity: 1; transform: none; }\n      }\n      .__sc-head {\n        display: flex; align-items: baseline; justify-content: space-between;\n        margin-bottom: 14px;\n        padding-bottom: 12px;\n        border-bottom: 1px solid rgba(255,255,255,0.08);\n      }\n      .__sc-title {\n        font-size: 17px;\n        font-weight: 600;\n        letter-spacing: -0.01em;\n      }\n      .__sc-sub {\n        font-size: 11px;\n        color: rgba(255,255,255,0.5);\n        font-family: ui-monospace, \"JetBrains Mono\", Menlo, monospace;\n        letter-spacing: 0.1em;\n        text-transform: uppercase;\n      }\n\n      .__sc-grid {\n        display: grid;\n        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));\n        gap: 10px;\n      }\n      .__sc-card {\n        position: relative;\n        padding: 10px;\n        border-radius: 14px;\n        background: rgba(255,255,255,0.04);\n        border: 1px solid rgba(255,255,255,0.06);\n        cursor: pointer;\n        transition: transform 0.15s, background 0.15s, border-color 0.15s;\n        -webkit-tap-highlight-color: transparent;\n        text-align: left;\n      }\n      .__sc-card:hover { background: rgba(255,255,255,0.10); transform: translateY(-2px); border-color: rgba(255,255,255,0.18); }\n      .__sc-card.active { border-color: #6cf; background: rgba(80,180,255,0.10); }\n      .__sc-card.active::after {\n        content: '✓';\n        position: absolute;\n        top: 8px; right: 10px;\n        color: #6cf;\n        font-size: 13px;\n        font-weight: 700;\n      }\n      .__sc-swatch {\n        width: 100%; aspect-ratio: 16 / 9;\n        border-radius: 8px;\n        margin-bottom: 8px;\n        position: relative;\n        overflow: hidden;\n        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);\n      }\n      .__sc-name {\n        font-size: 13px;\n        font-weight: 600;\n      }\n      .__sc-desc {\n        font-size: 10px;\n        color: rgba(255,255,255,0.55);\n        margin-top: 2px;\n        letter-spacing: 0.02em;\n      }\n\n      .__sc-close {\n        margin-top: 14px;\n        width: 100%;\n        padding: 10px;\n        background: rgba(255,255,255,0.06);\n        border: 1px solid rgba(255,255,255,0.1);\n        border-radius: 10px;\n        color: rgba(255,255,255,0.8);\n        font: inherit; font-size: 12px;\n        cursor: pointer;\n        letter-spacing: 0.05em;\n      }\n      .__sc-close:hover { background: rgba(255,255,255,0.10); color: #fff; }\n    `;\n\n    const style = document.createElement('style');\n    style.textContent = css;\n    document.head.appendChild(style);\n\n    const btn = document.createElement('button');\n    btn.id = '__sc-pick-btn';\n    btn.setAttribute('aria-label', 'Switch theme');\n    btn.title = '切换主题';\n    btn.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3.2\"/>\n      <circle cx=\"12\" cy=\"12\" r=\"9\"/>\n      <path d=\"M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1\"/>\n    \u003c/svg>`;\n    btn.addEventListener('click', togglePicker);\n    document.body.appendChild(btn);\n\n    const sheet = document.createElement('div');\n    sheet.id = '__sc-picker';\n    sheet.innerHTML = `\n      <div class=\"__sc-sheet\">\n        <div class=\"__sc-head\">\n          <div class=\"__sc-title\">切换主题\u003c/div>\n          <div class=\"__sc-sub\">${ALL_THEMES.length} themes\u003c/div>\n        \u003c/div>\n        <div class=\"__sc-grid\">\n          ${ALL_THEMES.map(t => `\n            <button class=\"__sc-card ${t.id === getCurrentThemeId() ? 'active' : ''}\" data-theme=\"${t.id}\">\n              <div class=\"__sc-swatch\" style=\"background: ${t.swatch}\">\u003c/div>\n              <div class=\"__sc-name\">${t.name}\u003c/div>\n              <div class=\"__sc-desc\">${t.desc}\u003c/div>\n            \u003c/button>\n          `).join('')}\n        \u003c/div>\n        <button class=\"__sc-close\">关闭\u003c/button>\n      \u003c/div>\n    `;\n    sheet.addEventListener('click', (e) => {\n      if (e.target === sheet) hidePicker();\n      const card = e.target.closest('.__sc-card');\n      if (card) gotoTheme(card.dataset.theme);\n      if (e.target.classList.contains('__sc-close')) hidePicker();\n    });\n    document.body.appendChild(sheet);\n\n    // Esc to close\n    document.addEventListener('keydown', (e) => {\n      if (e.key === 'Escape' && pickerOpen) hidePicker();\n    });\n  }\n  function togglePicker() { pickerOpen ? hidePicker() : showPicker(); }\n  function showPicker() {\n    ensurePicker();\n    document.getElementById('__sc-picker').classList.add('visible');\n    pickerOpen = true;\n  }\n  function hidePicker() {\n    const el = document.getElementById('__sc-picker');\n    if (el) el.classList.remove('visible');\n    pickerOpen = false;\n  }\n  // Install picker once DOM is ready  (skip when running inside an iframe —\n  // the bundled dashboard's parent has its own picker)\n  const _inIframe = (() => { try { return window.self !== window.top; } catch (e) { return true; } })();\n  if (!_inIframe) {\n    if (document.readyState === 'loading') {\n      document.addEventListener('DOMContentLoaded', ensurePicker);\n    } else {\n      ensurePicker();\n    }\n  }\n  window.StatusCommon.showPicker = showPicker;\n  window.StatusCommon.themes = ALL_THEMES;\n})();\n\n\u003c/script>\n<script>\nconst C = window.StatusCommon;\n\n// ───── Flip clock ─────\nfunction setDigit(flip, d) {\n  if (flip.dataset.d === String(d)) return;\n  flip.dataset.d = d;\n  flip.classList.remove('flipping');\n  void flip.offsetWidth;\n  flip.classList.add('flipping');\n  const span = flip.firstElementChild;\n  setTimeout(() => { span.textContent = d; }, 350);\n}\nfunction tickClock() {\n  const now = new Date();\n  const hh = C.pad2(now.getHours());\n  const mm = C.pad2(now.getMinutes());\n  const flips = document.querySelectorAll('#bigclock .flip');\n  const digits = (hh + mm).split('');\n  digits.forEach((d, i) => setDigit(flips[i], d));\n\n  // masthead date — like newspaper\n  document.getElementById('m-date').textContent =\n    now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' }).toUpperCase() +\n    ' · ' + ['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()];\n  document.getElementById('confirm-time').textContent =\n    'FILED ' + hh + ':' + mm + ' · ' + ['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()];\n}\ntickClock();\nsetInterval(tickClock, 1000);\n\n// ───── Render sessions ─────\nfunction renderSessions(sessions, detail) {\n  const panel = document.getElementById('sessions');\n  document.getElementById('sess-count').textContent = sessions.length;\n\n  if (!sessions.length) {\n    panel.innerHTML = '<div class=\"placeholder-news\">No bulletins on the wire.\u003c/div>';\n    return;\n  }\n\n  const dmap = {};\n  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });\n\n  const sorted = C.sortSessions(sessions);\n  const VIS = 5;\n  const visible = sorted.slice(0, VIS);\n  const extra = sorted.length - visible.length;\n\n  panel.innerHTML = visible.map((s, i) => {\n    const d = dmap[s.id] || {};\n    const state = s.state || 'idle';\n    const project = d.project || s.project || '未知项目';\n    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;\n    const age = C.timeAgo(s.updated_at);\n\n    const toolHtml = tool\n      ? `<div class=\"b-tool\"><span class=\"b-tool-label\">FROM THE DESK OF\u003c/span>${C.esc(tool)}${target ? `<span class=\"b-tool-target\">${C.esc(target)}\u003c/span>` : ''}\u003c/div>` : '';\n    const pullHtml = prompt\n      ? `<div class=\"b-pull\">${C.esc(prompt)}\u003c/div>` : '';\n\n    return `\n      <article class=\"bulletin\" style=\"animation-delay:${i*80}ms\">\n        <div class=\"b-row1\">\n          <span class=\"b-badge badge-${state}\">${(C.STATE_LABEL[state] || state)}\u003c/span>\n          <span class=\"b-id\">№ ${C.esc((s.id||'').slice(0,8))}\u003c/span>\n          <span class=\"b-meta\">— ${age}\u003c/span>\n        \u003c/div>\n        <h3 class=\"b-headline\">${C.esc(project)}\u003c/h3>\n        ${toolHtml}${pullHtml}\n      \u003c/article>\n    `;\n  }).join('') + (extra > 0 ? `<div class=\"more\">— Continued on page A2 · +${extra} more —\u003c/div>` : '');\n}\n\n// ───── Render strip ─────\nfunction renderStrip(gs, sessions) {\n  const dot = document.getElementById('g-dot');\n  dot.className = 'dot dot-' + (gs || 'idle');\n  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();\n\n  const counts = {};\n  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });\n  const total = sessions.length;\n  const order = ['working','thinking','needConfirm','done','idle'];\n  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);\n  const summary = total === 0 ? 'NO ACTIVE SESSIONS'\n    : `${total} SESSION${total!==1?'S':''}${parts.length ? ' · ' + parts.join(' · ') : ''}`;\n  document.getElementById('g-summary').textContent = summary.toUpperCase();\n}\n\nfunction renderConfirm(sessions) {\n  const list = sessions.filter(s => s.state === 'needConfirm');\n  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `\n    <div class=\"confirm-row\" style=\"animation-delay:${i*120}ms\">\n      <span class=\"confirm-name\">${C.esc(s.project || '未知项目')}\u003c/span>\n      <span class=\"confirm-id\">№ ${C.esc((s.id||'').slice(0,8))}\u003c/span>\n    \u003c/div>`).join('');\n}\n\nfunction setNum(id, val) {\n  const el = document.getElementById(id);\n  if (!el) return;\n  const formatted = C.fmtTokens(val);\n  if (el.textContent === formatted) return;\n  el.style.transition = 'opacity .25s';\n  el.style.opacity = '0';\n  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; }, 220);\n}\nfunction renderTokens(data) {\n  if (!data) return;\n  const t = data.today || {}, m = data.month || {}, a = data.total || {};\n  setNum('t-today-in',  t.input);\n  setNum('t-today-out', t.output);\n  setNum('t-month-in',  m.input);\n  setNum('t-month-out', m.output);\n  setNum('t-total-in',  a.input);\n  setNum('t-total-out', a.output);\n\n  const th = C.hitRate(t), mh = C.hitRate(m), ah = C.hitRate(a);\n  document.getElementById('hit-today').textContent = th!==null?`CACHE ${th}%`:'CACHE —';\n  document.getElementById('hit-month').textContent = mh!==null?`CACHE ${mh}%`:'CACHE —';\n  document.getElementById('hit-total').textContent = ah!==null?`CACHE HIT ${ah}%`:'CACHE HIT —';\n  if (data.last_updated) {\n    document.getElementById('tok-updated').textContent = 'FILED ' + C.fmtTimeHM(new Date(data.last_updated));\n  }\n}\n\nC.init({\n  onState(cur, detail) {\n    const gs = cur.global_state || 'idle';\n    const sessions = cur.sessions || [];\n    const isConfirm = gs === 'needConfirm';\n    document.getElementById('stage').classList.toggle('hidden', isConfirm);\n    document.getElementById('confirm').classList.toggle('visible', isConfirm);\n    renderStrip(gs, sessions);\n    renderSessions(sessions, detail);\n    renderConfirm(sessions);\n    document.getElementById('error-overlay').style.display = 'none';\n  },\n  onTokens: renderTokens,\n  onError(isErr) {\n    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';\n  }\n});\n\u003c/script>\n\u003c/body>\n\u003c/html>\n", "glass": "<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, viewport-fit=cover\">\n<title>Status · Glass\u003c/title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --fg:    #f4f6ff;\n  --fg-2:  #c4c9e0;\n  --fg-3:  #8f95b3;\n  --fg-4:  #5d6280;\n\n  --c-working:  #ffc66b;\n  --c-thinking: #6fd6ff;\n  --c-done:     #7af0a8;\n  --c-idle:     #a48dff;\n  --c-confirm:  #ff5868;\n\n  --font-sans: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"SF Pro Text\", \"PingFang SC\", \"Helvetica Neue\", sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n}\n\n* { box-sizing: border-box; }\nhtml, body {\n  margin: 0; padding: 0;\n  width: 100%; height: 100%;\n  background: #050610;\n  color: var(--fg);\n  font-family: var(--font-sans);\n  font-variant-numeric: tabular-nums;\n  overflow: hidden;\n  -webkit-font-smoothing: antialiased;\n  letter-spacing: -0.005em;\n}\n\n/* ============================================================\n   Background — depth-layered light sources\n   ============================================================ */\n.scene {\n  position: fixed; inset: 0;\n  z-index: 0;\n  background:\n    radial-gradient(ellipse at 20% 20%, oklch(0.40 0.18 280) 0%, transparent 45%),\n    radial-gradient(ellipse at 80% 30%, oklch(0.35 0.12 220) 0%, transparent 45%),\n    radial-gradient(ellipse at 50% 100%, oklch(0.30 0.14 320) 0%, transparent 55%),\n    linear-gradient(180deg, #08091a 0%, #050610 100%);\n}\n.scene::before { /* slow moving light flares */\n  content: '';\n  position: absolute; inset: -30%;\n  background:\n    radial-gradient(circle at 30% 40%, oklch(0.65 0.15 250 / 0.20), transparent 40%),\n    radial-gradient(circle at 70% 60%, oklch(0.55 0.18 200 / 0.18), transparent 45%);\n  filter: blur(40px);\n  animation: scene-drift 28s ease-in-out infinite;\n}\n@keyframes scene-drift {\n  0%,100% { transform: translate(0,0); }\n  50%     { transform: translate(8%, -6%); }\n}\n\n/* Floating motes */\n.motes {\n  position: fixed; inset: 0;\n  z-index: 1;\n  pointer-events: none;\n}\n.mote {\n  position: absolute;\n  width: 3px; height: 3px;\n  border-radius: 50%;\n  background: white;\n  opacity: 0.4;\n  box-shadow: 0 0 12px white;\n  animation: mote-float linear infinite;\n}\n@keyframes mote-float {\n  0%   { transform: translateY(110vh) translateX(0); opacity: 0; }\n  10%  { opacity: 0.4; }\n  90%  { opacity: 0.4; }\n  100% { transform: translateY(-15vh) translateX(40px); opacity: 0; }\n}\n\n/* state-tinted overlay */\n.state-tint {\n  position: fixed; inset: 0;\n  z-index: 1;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity 1.4s, background 1.4s;\n  mix-blend-mode: screen;\n}\nbody[data-state=\"working\"]     .state-tint { background: radial-gradient(circle at 50% 60%, oklch(0.70 0.16 70 / 0.18), transparent 50%); opacity: 1; }\nbody[data-state=\"thinking\"]    .state-tint { background: radial-gradient(circle at 50% 30%, oklch(0.75 0.14 220 / 0.18), transparent 50%); opacity: 1; }\nbody[data-state=\"done\"]        .state-tint { background: radial-gradient(circle at 50% 50%, oklch(0.75 0.14 150 / 0.14), transparent 50%); opacity: 1; }\n\n/* ============================================================\n   Stage\n   ============================================================ */\n#stage {\n  position: relative; z-index: 5;\n  width: 100%; height: 100%;\n  padding: clamp(24px, 2.8vw, 44px);\n  display: grid;\n  grid-template-rows: auto 1fr;\n  gap: clamp(20px, 2vw, 32px);\n  perspective: 1400px;\n  transition: opacity 0.6s, transform 0.6s;\n}\n#stage.recede {\n  transform: translateZ(-100px) scale(0.92);\n  opacity: 0.35;\n  pointer-events: none;\n  filter: blur(2px);\n}\n\n/* ============================================================\n   Glass material — base for all panels & cards\n   ============================================================ */\n.glass {\n  position: relative;\n  background: oklch(0.30 0.04 270 / 0.32);\n  backdrop-filter: blur(40px) saturate(180%);\n  -webkit-backdrop-filter: blur(40px) saturate(180%);\n  border-radius: 26px;\n  box-shadow:\n    0 24px 60px -10px rgba(0,0,0,0.55),\n    0 4px 14px -2px rgba(0,0,0,0.35),\n    inset 0 1px 0 oklch(1 0 0 / 0.18),\n    inset 0 -1px 0 oklch(0 0 0 / 0.25);\n  overflow: hidden;\n}\n.glass::before { /* highlight on top */\n  content: '';\n  position: absolute;\n  inset: 0;\n  background:\n    linear-gradient(135deg, oklch(1 0 0 / 0.10) 0%, transparent 35%),\n    radial-gradient(140% 80% at 100% 0%, oklch(1 0 0 / 0.06), transparent 60%);\n  border-radius: inherit;\n  pointer-events: none;\n}\n.glass::after { /* moving specular highlight */\n  content: '';\n  position: absolute;\n  top: -50%; left: -100%;\n  width: 60%; height: 200%;\n  background: linear-gradient(105deg, transparent 30%, oklch(1 0 0 / 0.06) 50%, transparent 70%);\n  pointer-events: none;\n  transform: rotate(8deg);\n  animation: specular 9s linear infinite;\n}\n@keyframes specular {\n  0%   { left: -100%; }\n  100% { left: 200%; }\n}\n\n/* ============================================================\n   Top — clock & status\n   ============================================================ */\n.top {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: clamp(14px, 1.4vw, 22px);\n  align-items: stretch;\n}\n\n.pill {\n  padding: clamp(14px, 1.4vw, 20px) clamp(18px, 1.8vw, 26px);\n  border-radius: 999px;\n  display: inline-flex;\n  align-items: center;\n  gap: clamp(10px, 1vw, 16px);\n  font-family: var(--font-mono);\n  font-size: clamp(13px, 1.2vw, 16px);\n  font-weight: 500;\n  color: var(--fg);\n  letter-spacing: 0.02em;\n}\n.pill .label {\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  font-size: 0.85em;\n  color: var(--fg-2);\n}\n.pill .sep { color: var(--fg-4); }\n.pill .summary { color: var(--fg-3); }\n\n.dot {\n  width: 10px; height: 10px;\n  border-radius: 50%;\n  background: var(--c-idle);\n  position: relative;\n}\n.dot::after {\n  content: '';\n  position: absolute;\n  inset: -6px;\n  border-radius: 50%;\n  background: inherit;\n  opacity: 0.3;\n  filter: blur(4px);\n  z-index: -1;\n}\n.dot-working     { background: var(--c-working);  box-shadow: 0 0 16px var(--c-working); animation: none; }\n.dot-thinking    { background: var(--c-thinking); box-shadow: 0 0 16px var(--c-thinking); animation: none; }\n.dot-done        { background: var(--c-done);     box-shadow: 0 0 14px var(--c-done); }\n.dot-idle        { background: var(--c-idle);     box-shadow: 0 0 8px var(--c-idle); opacity: 0.65; }\n.dot-needConfirm { background: var(--c-confirm);  box-shadow: 0 0 20px var(--c-confirm); animation: none; }\n@keyframes dot-breathe {\n  0%,100% { transform: scale(1); }\n  50%     { transform: scale(1.3); filter: brightness(1.3); }\n}\n\n.clock-pill {\n  font-family: var(--font-mono);\n  font-size: clamp(22px, 2.6vw, 36px);\n  font-weight: 500;\n  letter-spacing: 0.02em;\n  flex-direction: column;\n  align-items: flex-end;\n  gap: 2px !important;\n  padding: clamp(12px, 1.4vw, 18px) clamp(20px, 2vw, 28px);\n}\n.clock-pill .time { line-height: 1; }\n.clock-pill .time .colon { color: var(--fg-3); animation: blink 2s ease-in-out infinite; }\n@keyframes blink { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }\n.clock-pill .date {\n  font-size: 0.4em;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n  font-weight: 500;\n}\n\n/* ============================================================\n   Body — sessions + tokens\n   ============================================================ */\n.body {\n  display: grid;\n  grid-template-columns: minmax(0, 1.7fr) minmax(280px, 1fr);\n  gap: clamp(20px, 2vw, 32px);\n  min-height: 0;\n}\n@media (orientation: portrait), (max-width: 820px) {\n  .body { grid-template-columns: 1fr; grid-template-rows: minmax(0,1.6fr) auto; }\n}\n\n/* Section heading */\n.s-head {\n  display: flex; align-items: baseline; justify-content: space-between;\n  padding: 0 clamp(10px, 1vw, 14px);\n  margin-bottom: clamp(12px, 1.2vw, 16px);\n}\n.s-title {\n  font-family: var(--font-sans);\n  font-size: clamp(18px, 1.7vw, 24px);\n  font-weight: 600;\n  color: var(--fg);\n  letter-spacing: -0.01em;\n}\n.s-count {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-3);\n  letter-spacing: 0.12em;\n}\n\n/* Sessions */\n.sessions-col { display: flex; flex-direction: column; min-height: 0; }\n.sessions-shelf {\n  flex: 1;\n  padding: clamp(14px, 1.2vw, 18px);\n  display: flex; flex-direction: column;\n  gap: clamp(10px, 1vw, 14px);\n  min-height: 0;\n  overflow: hidden;\n}\n.sessions-list {\n  flex: 1;\n  display: flex; flex-direction: column;\n  gap: clamp(8px, 1vw, 12px);\n  overflow-y: auto;\n  scrollbar-width: none;\n  padding-right: 4px;\n  min-height: 0;\n}\n.sessions-list::-webkit-scrollbar { display: none; }\n\n/* Card — floating glass capsule inside the shelf */\n.card {\n  position: relative;\n  padding: clamp(14px, 1.3vw, 18px) clamp(16px, 1.5vw, 22px);\n  border-radius: 18px;\n  background: oklch(0.30 0.04 270 / 0.38);\n  backdrop-filter: blur(20px) saturate(160%);\n  box-shadow:\n    0 10px 24px -6px rgba(0,0,0,0.5),\n    inset 0 1px 0 oklch(1 0 0 / 0.15),\n    inset 0 -1px 0 oklch(0 0 0 / 0.25);\n  overflow: hidden;\n  transform-style: preserve-3d;\n  animation: none;\n}\n@keyframes card-in {\n  from { opacity: 0; transform: translateY(10px) translateZ(-30px) rotateX(4deg); }\n  to   { opacity: 1; transform: none; }\n}\n\n.card::before { /* glow strip — state color */\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 4px;\n  background: var(--state-color, var(--c-idle));\n  box-shadow: 0 0 16px var(--state-color, var(--c-idle));\n  opacity: 0.8;\n}\n.card::after { /* glass highlight */\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(150deg, oklch(1 0 0 / 0.10) 0%, transparent 45%);\n  pointer-events: none;\n}\n.card.state-working     { --state-color: var(--c-working); }\n.card.state-thinking    { --state-color: var(--c-thinking); }\n.card.state-done        { --state-color: var(--c-done); }\n.card.state-idle        { --state-color: var(--c-idle); opacity: 0.6; }\n.card.state-needConfirm { --state-color: var(--c-confirm); }\n\n.c-row1 {\n  display: flex; align-items: center; gap: 10px;\n  margin-bottom: 4px;\n}\n.c-badge {\n  font-family: var(--font-mono);\n  font-size: 10px; font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: oklch(0.20 0.02 270 / 0.6);\n  color: var(--state-color, var(--fg-3));\n  border: 1px solid color-mix(in oklch, var(--state-color, var(--fg-4)), transparent 60%);\n  box-shadow: 0 0 10px color-mix(in oklch, var(--state-color, transparent), transparent 70%);\n  flex-shrink: 0;\n}\n.c-project {\n  font-size: clamp(16px, 1.5vw, 22px);\n  font-weight: 600;\n  color: var(--fg);\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  flex: 1; min-width: 0;\n}\n.c-id, .c-age {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--fg-4);\n  letter-spacing: 0.05em;\n}\n.c-age::before { content: '· '; }\n\n.c-tool {\n  font-family: var(--font-mono);\n  font-size: clamp(11px, 1vw, 14px);\n  color: var(--fg-2);\n  display: flex; align-items: baseline; gap: 8px;\n  margin-top: 4px; margin-bottom: 4px;\n  white-space: nowrap;\n}\n.c-tool-name { color: var(--c-thinking); font-weight: 500; }\n.c-tool-name::before { content: '↳ '; color: var(--fg-4); }\n.c-tool-target {\n  color: var(--fg-2);\n  overflow: hidden; text-overflow: ellipsis;\n  min-width: 0;\n}\n.c-prompt {\n  font-size: clamp(12px, 1.1vw, 14px);\n  color: var(--fg-3);\n  line-height: 1.45;\n  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n}\n.c-prompt::before { content: '\"'; color: var(--fg-4); margin-right: 2px; }\n.c-prompt::after  { content: '\"'; color: var(--fg-4); margin-left: 2px; }\n\n.placeholder {\n  flex: 1;\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.18em;\n  color: var(--fg-4);\n  text-transform: uppercase;\n}\n\n.more {\n  text-align: center;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--fg-4);\n  letter-spacing: 0.1em;\n}\n\n/* Token panel */\n.token-col { display: flex; flex-direction: column; min-height: 0; }\n.token-shelf {\n  flex: 1;\n  padding: clamp(14px, 1.2vw, 18px);\n  display: flex; flex-direction: column;\n  gap: clamp(10px, 1vw, 14px);\n  min-height: 0;\n}\n\n.tok-card {\n  position: relative;\n  flex: 1;\n  padding: clamp(14px, 1.3vw, 18px);\n  border-radius: 18px;\n  background: oklch(0.30 0.04 270 / 0.32);\n  backdrop-filter: blur(20px) saturate(160%);\n  box-shadow:\n    inset 0 1px 0 oklch(1 0 0 / 0.12),\n    inset 0 -1px 0 oklch(0 0 0 / 0.25);\n  overflow: hidden;\n  display: flex; flex-direction: column; gap: clamp(8px, 0.8vw, 12px);\n}\n.tok-card::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(150deg, oklch(1 0 0 / 0.08) 0%, transparent 45%);\n  pointer-events: none;\n}\n\n.tok-h {\n  display: flex; align-items: baseline; justify-content: space-between;\n}\n.tok
