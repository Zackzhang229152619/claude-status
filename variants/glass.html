<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Status · Glass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --fg:    #f4f6ff;
  --fg-2:  #c4c9e0;
  --fg-3:  #8f95b3;
  --fg-4:  #5d6280;

  --c-working:  #ffc66b;
  --c-thinking: #6fd6ff;
  --c-done:     #7af0a8;
  --c-idle:     #a48dff;
  --c-confirm:  #ff5868;

  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #050610;
  color: var(--fg);
  font-family: var(--font-sans);
  font-variant-numeric: tabular-nums;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
}

/* ============================================================
   Background — depth-layered light sources
   ============================================================ */
.scene {
  position: fixed; inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, oklch(0.40 0.18 280) 0%, transparent 45%),
    radial-gradient(ellipse at 80% 30%, oklch(0.35 0.12 220) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, oklch(0.30 0.14 320) 0%, transparent 55%),
    linear-gradient(180deg, #08091a 0%, #050610 100%);
}
.scene::before { /* slow moving light flares */
  content: '';
  position: absolute; inset: -30%;
  background:
    radial-gradient(circle at 30% 40%, oklch(0.65 0.15 250 / 0.20), transparent 40%),
    radial-gradient(circle at 70% 60%, oklch(0.55 0.18 200 / 0.18), transparent 45%);
  filter: blur(40px);
  animation: scene-drift 28s ease-in-out infinite;
}
@keyframes scene-drift {
  0%,100% { transform: translate(0,0); }
  50%     { transform: translate(8%, -6%); }
}

/* Floating motes */
.motes {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
}
.mote {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: white;
  opacity: 0.4;
  box-shadow: 0 0 12px white;
  animation: mote-float linear infinite;
}
@keyframes mote-float {
  0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
  10%  { opacity: 0.4; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-15vh) translateX(40px); opacity: 0; }
}

/* state-tinted overlay */
.state-tint {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.4s, background 1.4s;
  mix-blend-mode: screen;
}
body[data-state="working"]     .state-tint { background: radial-gradient(circle at 50% 60%, oklch(0.70 0.16 70 / 0.18), transparent 50%); opacity: 1; }
body[data-state="thinking"]    .state-tint { background: radial-gradient(circle at 50% 30%, oklch(0.75 0.14 220 / 0.18), transparent 50%); opacity: 1; }
body[data-state="done"]        .state-tint { background: radial-gradient(circle at 50% 50%, oklch(0.75 0.14 150 / 0.14), transparent 50%); opacity: 1; }

/* ============================================================
   Stage
   ============================================================ */
#stage {
  position: relative; z-index: 5;
  width: 100%; height: 100%;
  padding: clamp(24px, 2.8vw, 44px);
  display: grid;
  grid-template-rows: auto 1fr;
  gap: clamp(20px, 2vw, 32px);
  perspective: 1400px;
  transition: opacity 0.6s, transform 0.6s;
}
#stage.recede {
  transform: translateZ(-100px) scale(0.92);
  opacity: 0.35;
  pointer-events: none;
  filter: blur(2px);
}

/* ============================================================
   Glass material — base for all panels & cards
   ============================================================ */
.glass {
  position: relative;
  background: oklch(0.30 0.04 270 / 0.32);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-radius: 26px;
  box-shadow:
    0 24px 60px -10px rgba(0,0,0,0.55),
    0 4px 14px -2px rgba(0,0,0,0.35),
    inset 0 1px 0 oklch(1 0 0 / 0.18),
    inset 0 -1px 0 oklch(0 0 0 / 0.25);
  overflow: hidden;
}
.glass::before { /* highlight on top */
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, oklch(1 0 0 / 0.10) 0%, transparent 35%),
    radial-gradient(140% 80% at 100% 0%, oklch(1 0 0 / 0.06), transparent 60%);
  border-radius: inherit;
  pointer-events: none;
}
.glass::after { /* moving specular highlight */
  content: '';
  position: absolute;
  top: -50%; left: -100%;
  width: 60%; height: 200%;
  background: linear-gradient(105deg, transparent 30%, oklch(1 0 0 / 0.06) 50%, transparent 70%);
  pointer-events: none;
  transform: rotate(8deg);
  animation: specular 9s linear infinite;
}
@keyframes specular {
  0%   { left: -100%; }
  100% { left: 200%; }
}

/* ============================================================
   Top — clock & status
   ============================================================ */
.top {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: clamp(14px, 1.4vw, 22px);
  align-items: stretch;
}

.pill {
  padding: clamp(14px, 1.4vw, 20px) clamp(18px, 1.8vw, 26px);
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: clamp(10px, 1vw, 16px);
  font-family: var(--font-mono);
  font-size: clamp(13px, 1.2vw, 16px);
  font-weight: 500;
  color: var(--fg);
  letter-spacing: 0.02em;
}
.pill .label {
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 0.85em;
  color: var(--fg-2);
}
.pill .sep { color: var(--fg-4); }
.pill .summary { color: var(--fg-3); }

.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--c-idle);
  position: relative;
}
.dot::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: inherit;
  opacity: 0.3;
  filter: blur(4px);
  z-index: -1;
}
.dot-working     { background: var(--c-working);  box-shadow: 0 0 16px var(--c-working); animation: none; }
.dot-thinking    { background: var(--c-thinking); box-shadow: 0 0 16px var(--c-thinking); animation: none; }
.dot-done        { background: var(--c-done);     box-shadow: 0 0 14px var(--c-done); }
.dot-idle        { background: var(--c-idle);     box-shadow: 0 0 8px var(--c-idle); opacity: 0.65; }
.dot-needConfirm { background: var(--c-confirm);  box-shadow: 0 0 20px var(--c-confirm); animation: none; }
@keyframes dot-breathe {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.3); filter: brightness(1.3); }
}

.clock-pill {
  font-family: var(--font-mono);
  font-size: clamp(22px, 2.6vw, 36px);
  font-weight: 500;
  letter-spacing: 0.02em;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px !important;
  padding: clamp(12px, 1.4vw, 18px) clamp(20px, 2vw, 28px);
}
.clock-pill .time { line-height: 1; }
.clock-pill .time .colon { color: var(--fg-3); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
.clock-pill .date {
  font-size: 0.4em;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--fg-3);
  font-weight: 500;
}

/* ============================================================
   Body — sessions + tokens
   ============================================================ */
.body {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(280px, 1fr);
  gap: clamp(20px, 2vw, 32px);
  min-height: 0;
}
@media (orientation: portrait), (max-width: 820px) {
  .body { grid-template-columns: 1fr; grid-template-rows: minmax(0,1.6fr) auto; }
}

/* Section heading */
.s-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 clamp(10px, 1vw, 14px);
  margin-bottom: clamp(12px, 1.2vw, 16px);
}
.s-title {
  font-family: var(--font-sans);
  font-size: clamp(18px, 1.7vw, 24px);
  font-weight: 600;
  color: var(--fg);
  letter-spacing: -0.01em;
}
.s-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
  letter-spacing: 0.12em;
}

/* Sessions */
.sessions-col { display: flex; flex-direction: column; min-height: 0; }
.sessions-shelf {
  flex: 1;
  padding: clamp(14px, 1.2vw, 18px);
  display: flex; flex-direction: column;
  gap: clamp(10px, 1vw, 14px);
  min-height: 0;
  overflow: hidden;
}
.sessions-list {
  flex: 1;
  display: flex; flex-direction: column;
  gap: clamp(8px, 1vw, 12px);
  overflow-y: auto;
  scrollbar-width: none;
  padding-right: 4px;
  min-height: 0;
}
.sessions-list::-webkit-scrollbar { display: none; }

/* Card — floating glass capsule inside the shelf */
.card {
  position: relative;
  padding: clamp(14px, 1.3vw, 18px) clamp(16px, 1.5vw, 22px);
  border-radius: 18px;
  background: oklch(0.30 0.04 270 / 0.38);
  backdrop-filter: blur(20px) saturate(160%);
  box-shadow:
    0 10px 24px -6px rgba(0,0,0,0.5),
    inset 0 1px 0 oklch(1 0 0 / 0.15),
    inset 0 -1px 0 oklch(0 0 0 / 0.25);
  overflow: hidden;
  transform-style: preserve-3d;
  animation: none;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(10px) translateZ(-30px) rotateX(4deg); }
  to   { opacity: 1; transform: none; }
}

.card::before { /* glow strip — state color */
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--state-color, var(--c-idle));
  box-shadow: 0 0 16px var(--state-color, var(--c-idle));
  opacity: 0.8;
}
.card::after { /* glass highlight */
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(150deg, oklch(1 0 0 / 0.10) 0%, transparent 45%);
  pointer-events: none;
}
.card.state-working     { --state-color: var(--c-working); }
.card.state-thinking    { --state-color: var(--c-thinking); }
.card.state-done        { --state-color: var(--c-done); }
.card.state-idle        { --state-color: var(--c-idle); opacity: 0.6; }
.card.state-needConfirm { --state-color: var(--c-confirm); }

.c-row1 {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 4px;
}
.c-badge {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  padding: 4px 10px;
  border-radius: 999px;
  background: oklch(0.20 0.02 270 / 0.6);
  color: var(--state-color, var(--fg-3));
  border: 1px solid color-mix(in oklch, var(--state-color, var(--fg-4)), transparent 60%);
  box-shadow: 0 0 10px color-mix(in oklch, var(--state-color, transparent), transparent 70%);
  flex-shrink: 0;
}
.c-project {
  font-size: clamp(16px, 1.5vw, 22px);
  font-weight: 600;
  color: var(--fg);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.c-id, .c-age {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-4);
  letter-spacing: 0.05em;
}
.c-age::before { content: '· '; }

.c-tool {
  font-family: var(--font-mono);
  font-size: clamp(11px, 1vw, 14px);
  color: var(--fg-2);
  display: flex; align-items: baseline; gap: 8px;
  margin-top: 4px; margin-bottom: 4px;
  white-space: nowrap;
}
.c-tool-name { color: var(--c-thinking); font-weight: 500; }
.c-tool-name::before { content: '↳ '; color: var(--fg-4); }
.c-tool-target {
  color: var(--fg-2);
  overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.c-prompt {
  font-size: clamp(12px, 1.1vw, 14px);
  color: var(--fg-3);
  line-height: 1.45;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.c-prompt::before { content: '"'; color: var(--fg-4); margin-right: 2px; }
.c-prompt::after  { content: '"'; color: var(--fg-4); margin-left: 2px; }

.placeholder {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  color: var(--fg-4);
  text-transform: uppercase;
}

.more {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-4);
  letter-spacing: 0.1em;
}

/* Token panel */
.token-col { display: flex; flex-direction: column; min-height: 0; }
.token-shelf {
  flex: 1;
  padding: clamp(14px, 1.2vw, 18px);
  display: flex; flex-direction: column;
  gap: clamp(10px, 1vw, 14px);
  min-height: 0;
}

.tok-card {
  position: relative;
  flex: 1;
  padding: clamp(14px, 1.3vw, 18px);
  border-radius: 18px;
  background: oklch(0.30 0.04 270 / 0.32);
  backdrop-filter: blur(20px) saturate(160%);
  box-shadow:
    inset 0 1px 0 oklch(1 0 0 / 0.12),
    inset 0 -1px 0 oklch(0 0 0 / 0.25);
  overflow: hidden;
  display: flex; flex-direction: column; gap: clamp(8px, 0.8vw, 12px);
}
.tok-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(150deg, oklch(1 0 0 / 0.08) 0%, transparent 45%);
  pointer-events: none;
}

.tok-h {
  display: flex; align-items: baseline; justify-content: space-between;
}
.tok-scope {
  font-size: clamp(14px, 1.3vw, 18px);
  font-weight: 600;
  color: var(--fg);
}
.tok-hit {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--c-done);
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 999px;
  background: oklch(0.30 0.08 150 / 0.18);
  border: 1px solid oklch(0.60 0.10 150 / 0.30);
}
.tok-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(10px, 1vw, 16px);
  align-items: end;
}
.tok-stat { display: flex; flex-direction: column; gap: 4px; }
.tok-num {
  font-family: var(--font-mono);
  font-size: clamp(24px, 2.6vw, 38px);
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.tok-in  { color: var(--fg); text-shadow: 0 0 20px oklch(0.80 0.10 240 / 0.5); }
.tok-out { color: var(--c-working); text-shadow: 0 0 20px oklch(0.80 0.16 70 / 0.5); }
.tok-cap {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--fg-4);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* ============================================================
   needConfirm — red glass plate rises from below
   ============================================================ */
#confirm {
  position: fixed; inset: 0;
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s;
  background:
    radial-gradient(ellipse at 50% 50%,
      oklch(0.35 0.20 25 / 0.55) 0%,
      oklch(0.10 0.08 25 / 0.85) 70%);
  backdrop-filter: blur(40px) saturate(150%);
  perspective: 1200px;
}
#confirm.visible { opacity: 1; pointer-events: auto; }

.confirm-plate {
  position: relative;
  padding: clamp(40px, 5vw, 80px) clamp(60px, 8vw, 140px);
  border-radius: 40px;
  background: oklch(0.32 0.10 25 / 0.55);
  backdrop-filter: blur(30px) saturate(180%);
  box-shadow:
    0 40px 100px -10px oklch(0.20 0.20 25 / 0.7),
    0 12px 30px -6px rgba(0,0,0,0.5),
    inset 0 1px 0 oklch(1 0 0 / 0.20),
    inset 0 -1px 0 oklch(0 0 0 / 0.30),
    inset 0 0 0 1px oklch(0.65 0.20 25 / 0.40);
  text-align: center;
  transform: translateY(60px) scale(0.92);
  opacity: 0;
  animation: plate-rise 0.7s cubic-bezier(0.18, 1, 0.32, 1) 0.1s forwards;
}
#confirm.visible .confirm-plate { /* re-trigger via class */ }
@keyframes plate-rise {
  to { transform: none; opacity: 1; }
}
.confirm-plate::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(160deg, oklch(1 0 0 / 0.15) 0%, transparent 40%);
  pointer-events: none;
}

.confirm-eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-mono);
  font-size: clamp(11px, 1.1vw, 14px);
  letter-spacing: 0.4em;
  color: oklch(0.96 0.05 25);
  padding: 8px 20px;
  border-radius: 999px;
  background: oklch(0.25 0.10 25 / 0.6);
  border: 1px solid oklch(0.70 0.20 25 / 0.5);
  margin-bottom: clamp(20px, 3vw, 36px);
  text-transform: uppercase;
}
.confirm-text {
  font-size: clamp(80px, 13vw, 220px);
  font-weight: 800;
  color: oklch(0.97 0.04 25);
  letter-spacing: -0.04em;
  line-height: 1.0;
  text-shadow:
    0 4px 30px oklch(0.70 0.22 25 / 0.7),
    0 0 80px oklch(0.70 0.22 25 / 0.4);
  margin-bottom: clamp(20px, 2.4vw, 32px);
}
.confirm-list {
  display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.confirm-row {
  display: inline-flex; align-items: baseline; gap: 16px;
  padding: 10px 22px;
  border-radius: 999px;
  background: oklch(0.25 0.06 25 / 0.55);
  border: 1px solid oklch(0.70 0.20 25 / 0.45);
  backdrop-filter: blur(16px);
  box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.12);
  animation: none;
}
@keyframes row-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
.confirm-name {
  font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 600;
  color: oklch(0.97 0.04 25);
}
.confirm-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: oklch(0.85 0.08 25);
  letter-spacing: 0.05em;
}

.confirm-clock {
  position: absolute;
  top: clamp(20px, 2.6vw, 36px);
  right: clamp(24px, 2.8vw, 40px);
  font-family: var(--font-mono);
  font-size: clamp(16px, 1.5vw, 22px);
  font-weight: 500;
  color: oklch(0.88 0.08 25);
  letter-spacing: 0.02em;
}

/* error */
#error-overlay {
  position: fixed; inset: 0;
  background: oklch(0.10 0.04 270 / 0.90);
  backdrop-filter: blur(30px);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
  z-index: 80;
}
.err-title {
  font-size: clamp(20px, 2.2vw, 30px);
  font-weight: 600;
  color: var(--c-confirm);
}
.err-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
</style>
</head>
<body data-state="idle">

<div class="scene"></div>
<div class="motes" id="motes"></div>
<div class="state-tint"></div>

<div id="stage">
  <header class="top">
    <div class="pill glass">
      <span id="g-dot" class="dot dot-idle"></span>
      <span class="label" id="g-label">IDLE</span>
    </div>
    <div class="pill glass">
      <span class="summary" id="g-summary" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">无活动 session</span>
    </div>
    <div class="pill glass clock-pill">
      <span class="time" id="clock"><span>00</span><span class="colon">:</span><span>00</span></span>
      <span class="date" id="date">— —</span>
    </div>
  </header>

  <main class="body">
    <section class="sessions-col">
      <div class="s-head">
        <span class="s-title">Sessions</span>
        <span class="s-count"><span id="sess-count">0</span> ACTIVE</span>
      </div>
      <div class="glass sessions-shelf">
        <div class="sessions-list" id="sessions">
          <div class="placeholder">awaiting signal</div>
        </div>
      </div>
    </section>

    <aside class="token-col">
      <div class="s-head">
        <span class="s-title">Tokens</span>
        <span class="s-count" id="tok-updated">— —</span>
      </div>
      <div class="token-shelf">
        <div class="tok-card">
          <div class="tok-h"><span class="tok-scope">今日</span><span class="tok-hit" id="hit-today">缓存 —</span></div>
          <div class="tok-stats">
            <div class="tok-stat"><span class="tok-num tok-in"  id="t-today-in">—</span><span class="tok-cap">输入</span></div>
            <div class="tok-stat"><span class="tok-num tok-out" id="t-today-out">—</span><span class="tok-cap">输出</span></div>
          </div>
        </div>
        <div class="tok-card">
          <div class="tok-h"><span class="tok-scope">本月</span><span class="tok-hit" id="hit-month">缓存 —</span></div>
          <div class="tok-stats">
            <div class="tok-stat"><span class="tok-num tok-in"  id="t-month-in">—</span><span class="tok-cap">输入</span></div>
            <div class="tok-stat"><span class="tok-num tok-out" id="t-month-out">—</span><span class="tok-cap">输出</span></div>
          </div>
        </div>
        <div class="tok-card">
          <div class="tok-h"><span class="tok-scope">累计</span><span class="tok-hit" id="hit-total">缓存命中 —</span></div>
          <div class="tok-stats">
            <div class="tok-stat"><span class="tok-num tok-in"  id="t-total-in">—</span><span class="tok-cap">输入</span></div>
            <div class="tok-stat"><span class="tok-num tok-out" id="t-total-out">—</span><span class="tok-cap">输出</span></div>
          </div>
        </div>
      </div>
    </aside>
  </main>
</div>

<div id="confirm" aria-hidden="true">
  <div class="confirm-plate">
    <div class="confirm-eyebrow"><span class="dot dot-needConfirm"></span><span>NEED CONFIRMATION</span></div>
    <div class="confirm-text">等你拍板</div>
    <div class="confirm-list" id="confirm-list"></div>
  </div>
  <div class="confirm-clock" id="confirm-clock">--:--</div>
</div>

<div id="error-overlay">
  <div class="err-title">连接 Mac 失败</div>
  <div class="err-sub">CHECK WIFI · SERVER.PY</div>
</div>

<script src="_common.js"></script>
<script>
const C = window.StatusCommon;

// ───── Spawn motes ─────
(function spawnMotes() {
  const wrap = document.getElementById('motes');
  for (let i = 0; i < 25; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    m.style.left = Math.random() * 100 + '%';
    m.style.animationDuration = (15 + Math.random() * 18) + 's';
    m.style.animationDelay = (-Math.random() * 30) + 's';
    m.style.opacity = (0.2 + Math.random() * 0.4);
    m.style.transform = `scale(${0.5 + Math.random()})`;
    wrap.appendChild(m);
  }
})();

// ───── Clock ─────
function tickClock() {
  const now = new Date();
  const hh = C.pad2(now.getHours());
  const mm = C.pad2(now.getMinutes());
  document.getElementById('clock').innerHTML = `<span>${hh}</span><span class="colon">:</span><span>${mm}</span>`;
  document.getElementById('date').textContent = C.fmtDate(now);
  document.getElementById('confirm-clock').textContent = hh + ':' + mm;
}
tickClock();
setInterval(tickClock, 1000);

// ───── Sessions ─────
function renderSessions(sessions, detail) {
  const panel = document.getElementById('sessions');
  document.getElementById('sess-count').textContent = sessions.length;

  if (!sessions.length) {
    panel.innerHTML = '<div class="placeholder">awaiting signal</div>';
    return;
  }
  const dmap = {};
  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });
  const sorted = C.sortSessions(sessions);
  const VIS = 5;
  const visible = sorted.slice(0, VIS);
  const extra = sorted.length - visible.length;

  panel.innerHTML = visible.map((s, i) => {
    const d = dmap[s.id] || {};
    const state = s.state || 'idle';
    const project = d.project || s.project || '未知项目';
    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;
    const age = C.timeAgo(s.updated_at);
    const toolHtml = tool
      ? `<div class="c-tool"><span class="c-tool-name">${C.esc(tool)}</span>${target?`<span class="c-tool-target">${C.esc(target)}</span>`:''}</div>` : '';
    const promptHtml = prompt
      ? `<div class="c-prompt">${C.esc(prompt)}</div>` : '';
    return `
      <div class="card state-${state}" style="animation-delay:${i*70}ms">
        <div class="c-row1">
          <span class="c-badge">${C.STATE_LABEL[state] || state}</span>
          <span class="c-project">${C.esc(project)}</span>
          <span class="c-id">${C.esc((s.id||'').slice(0,8))}</span>
          <span class="c-age">${age}</span>
        </div>
        ${toolHtml}${promptHtml}
      </div>`;
  }).join('') + (extra > 0 ? `<div class="more">+ ${extra} 更多 session</div>` : '');
}

function renderTop(gs, sessions) {
  document.getElementById('g-dot').className = 'dot dot-' + (gs || 'idle');
  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();
  const counts = {};
  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });
  const total = sessions.length;
  const order = ['working','thinking','needConfirm','done','idle'];
  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);
  const summary = total === 0 ? '无活动 session'
    : `${total} session${total!==1?'s':''}` + (parts.length ? ` · ${parts.join(' · ')}` : '');
  document.getElementById('g-summary').textContent = summary;
  document.body.dataset.state = gs || 'idle';
}

function renderConfirm(sessions) {
  const list = sessions.filter(s => s.state === 'needConfirm');
  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `
    <div class="confirm-row" style="animation-delay:${i*100 + 300}ms">
      <span class="confirm-name">${C.esc(s.project || '未知项目')}</span>
      <span class="confirm-id">${C.esc((s.id||'').slice(0,8))}</span>
    </div>`).join('');
}

function setNum(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const formatted = C.fmtTokens(val);
  if (el.textContent === formatted) return;
  el.style.transition = 'opacity .25s, transform .25s';
  el.style.opacity = '0'; el.style.transform = 'translateY(-4px)';
  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 220);
}
function renderTokens(data) {
  if (!data) return;
  const t = data.today || {}, m = data.month || {}, a = data.total || {};
  setNum('t-today-in', t.input); setNum('t-today-out', t.output);
  setNum('t-month-in', m.input); setNum('t-month-out', m.output);
  setNum('t-total-in', a.input); setNum('t-total-out', a.output);
  const th=C.hitRate(t),mh=C.hitRate(m),ah=C.hitRate(a);
  document.getElementById('hit-today').textContent = th!==null?`缓存 ${th}%`:'缓存 —';
  document.getElementById('hit-month').textContent = mh!==null?`缓存 ${mh}%`:'缓存 —';
  document.getElementById('hit-total').textContent = ah!==null?`缓存命中 ${ah}%`:'缓存命中 —';
  if (data.last_updated) document.getElementById('tok-updated').textContent = C.fmtTimeHM(new Date(data.last_updated)) + ' UPDATED';
}

C.init({
  onState(cur, detail) {
    const gs = cur.global_state || 'idle';
    const sessions = cur.sessions || [];
    const isConfirm = gs === 'needConfirm';
    document.getElementById('stage').classList.toggle('recede', isConfirm);
    document.getElementById('confirm').classList.toggle('visible', isConfirm);
    renderTop(gs, sessions);
    renderSessions(sessions, detail);
    renderConfirm(sessions);
    document.getElementById('error-overlay').style.display = 'none';
  },
  onTokens: renderTokens,
  onError(isErr) {
    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';
  }
});
</script>
</body>
</html>
