<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Status · Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper:    #e8e6e0;
  --paper-2:  #d8d5cc;
  --paper-3:  #c2bfb4;
  --ink:      #15171a;
  --ink-2:    #3a3d44;
  --ink-3:    #6a6e78;
  --ink-4:    #9a9da6;
  --rule:     #15171a;

  --c-working:  #ef8537;
  --c-thinking: #2c8eb3;
  --c-done:     #4aa463;
  --c-idle:     #888;
  --c-confirm:  #d52d3a;

  --tube-glass: rgba(50,55,65,0.12);
  --tube-liquid-in:  #2c8eb3;
  --tube-liquid-out: #ef8537;
  --tube-liquid-tot: #4aa463;

  --font-sans:  "Space Grotesk", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  --font-mono:  "JetBrains Mono", ui-monospace, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-sans);
  font-variant-numeric: tabular-nums;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* paper texture + grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(0deg, rgba(0,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 1;
}
body::after { /* paper grain */
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='400' height='400' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity: 0.06;
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 2;
}

/* ============================================================
   Stage
   ============================================================ */
#stage {
  position: relative;
  z-index: 3;
  width: 100%; height: 100%;
  padding: clamp(20px, 2.4vw, 36px);
  display: grid;
  grid-template-rows: auto 1fr;
  gap: clamp(16px, 1.6vw, 24px);
  transition: opacity 0.6s;
}
#stage.hidden { opacity: 0; pointer-events: none; }

/* ============================================================
   Top — lab header
   ============================================================ */
.top {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: clamp(14px, 1.6vw, 24px);
  align-items: center;
  padding-bottom: clamp(12px, 1.2vw, 18px);
  border-bottom: 1.5px solid var(--rule);
}
.lab-id {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-2);
}
.lab-id .big {
  display: block;
  font-family: var(--font-sans);
  font-size: clamp(18px, 1.8vw, 26px);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-transform: none;
}

.status-pill {
  justify-self: center;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border: 1.5px solid var(--rule);
  border-radius: 999px;
  background: var(--paper-2);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink);
  position: relative;
  overflow: hidden;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--c-idle);
  display: inline-block;
  flex-shrink: 0;
  border: 1.5px solid var(--rule);
}
.dot-working     { background: var(--c-working);  animation: none; }
.dot-thinking    { background: var(--c-thinking); animation: none; }
.dot-done        { background: var(--c-done); }
.dot-needConfirm { background: var(--c-confirm);  animation: none; }
@keyframes soft-breathe {
  0%,100% { transform: scale(1);    filter: brightness(1); }
  50%     { transform: scale(1.08); filter: brightness(1.2); }
}
@keyframes pulse-d {
  0%,100% { box-shadow: 0 0 0 0 currentColor; }
  50%     { box-shadow: 0 0 0 6px color-mix(in srgb, currentColor 0%, transparent); transform: scale(1.15); }
}

.clock-area {
  text-align: right;
  font-family: var(--font-mono);
}
.clock {
  font-size: clamp(28px, 3.4vw, 44px);
  font-weight: 700;
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.clock .colon { animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
.date {
  margin-top: 4px;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
}

/* ============================================================
   Body — tank (left) + tubes (right)
   ============================================================ */
.body {
  display: grid;
  grid-template-columns: minmax(0, 1.6fr) auto;
  gap: clamp(16px, 1.8vw, 28px);
  min-height: 0;
}

@media (orientation: portrait), (max-width: 820px) {
  .body { grid-template-columns: 1fr; grid-template-rows: minmax(0,1.6fr) auto; }
}

/* Tank */
.tank {
  position: relative;
  border: 2px solid var(--rule);
  border-radius: 4px;
  background: var(--paper-2);
  overflow: hidden;
  min-height: 0;
}
.tank-label {
  position: absolute;
  top: 14px; left: 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-3);
  z-index: 10;
}
.tank-count {
  position: absolute;
  top: 14px; right: 16px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--ink-3);
  z-index: 10;
}

/* corner brackets */
.tank::before, .tank::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--rule);
}
.tank::before {
  top: 6px; right: 6px;
  border-top: 2px solid; border-right: 2px solid;
}
.tank::after {
  bottom: 6px; left: 6px;
  border-bottom: 2px solid; border-left: 2px solid;
}

/* specimens float area */
.specimens {
  position: absolute;
  inset: 40px 16px 16px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  grid-auto-rows: min-content;
  gap: clamp(10px, 1.2vw, 18px);
  align-content: start;
  overflow: hidden;
}

.specimen {
  position: relative;
  padding: 12px 14px;
  background: var(--paper);
  border: 1.5px solid var(--rule);
  border-radius: 12px;
  animation: none;
  transform-origin: center;
  --float-x: 0;
}
@keyframes spec-in {
  from { opacity: 0; transform: translateY(20px) scale(0.85); }
  to   { opacity: 1; }
}
@keyframes float {
  0%,100% { transform: translate(calc(var(--float-x) * -1px), -2px) rotate(calc(var(--rot, 0.3) * -1deg)); }
  50%     { transform: translate(calc(var(--float-x) * 1px),  3px) rotate(calc(var(--rot, 0.3) * 1deg)); }
}

/* tag label on specimen */
.spec-tag {
  position: absolute;
  top: -10px; left: 12px;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--paper);
  padding: 2px 8px;
  border: 1.5px solid var(--rule);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  font-weight: 700;
  text-transform: uppercase;
}
.spec-tag .swatch {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--c-idle);
}
.spec-tag.tag-working     { color: var(--c-working);  } .spec-tag.tag-working .swatch     { background: var(--c-working);  }
.spec-tag.tag-thinking    { color: var(--c-thinking); } .spec-tag.tag-thinking .swatch    { background: var(--c-thinking); }
.spec-tag.tag-done        { color: var(--c-done);     } .spec-tag.tag-done .swatch        { background: var(--c-done);     }
.spec-tag.tag-needConfirm { color: var(--c-confirm);  background: var(--c-confirm); border-color: var(--c-confirm); }
.spec-tag.tag-needConfirm { color: #fff; } .spec-tag.tag-needConfirm .swatch { background: #fff; border: 1.5px solid #fff; }
.spec-tag.tag-idle        { color: var(--ink-4); }     .spec-tag.tag-idle .swatch        { background: var(--ink-4); }

.spec-name {
  font-size: clamp(15px, 1.4vw, 19px);
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-top: 4px;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.spec-tool {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-2);
  letter-spacing: 0.02em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.spec-tool-name { font-weight: 700; color: var(--c-thinking); }
.spec-tool-name::before { content: '◇ '; opacity: 0.6; }
.spec-tool-target { color: var(--ink-2); }
.spec-tool-target::before { content: ' · '; color: var(--ink-4); }
.spec-meta {
  display: flex; align-items: baseline; gap: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  text-transform: uppercase;
  border-top: 1px dashed var(--ink-4);
  padding-top: 5px;
  margin-top: 4px;
}
.spec-prompt {
  font-size: 11px;
  color: var(--ink-2);
  margin-top: 2px;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-style: italic;
}
.spec-prompt::before { content: '“'; color: var(--ink-4); }
.spec-prompt::after  { content: '”'; color: var(--ink-4); }

/* state-specific specimen styling */
.specimen.state-working     { background: color-mix(in srgb, var(--c-working) 8%, var(--paper)); }
.specimen.state-thinking    { background: color-mix(in srgb, var(--c-thinking) 8%, var(--paper)); }
.specimen.state-done        { background: color-mix(in srgb, var(--c-done) 6%, var(--paper)); }
.specimen.state-idle        { opacity: 0.6; --rot: 0.1; --float-x: 0.5; }
.specimen.state-needConfirm {
  background: color-mix(in srgb, var(--c-confirm) 12%, var(--paper));
  animation: none;
}
@keyframes alarm-shake {
  0%,100% { transform: translate(0,0); }
  25%     { transform: translate(-1px, 0); }
  75%     { transform: translate( 1px, 0); }
}

.empty-tank {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--ink-4);
  text-transform: uppercase;
  text-align: center;
  margin: auto;
  padding: 40px;
}

/* ============================================================
   Tubes (right) — 3 test tubes
   ============================================================ */
.tubes-rack {
  display: grid;
  grid-template-columns: repeat(3, minmax(80px, 110px));
  gap: clamp(8px, 1vw, 14px);
  align-items: stretch;
  padding-top: 0;
}
.tube-col {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
  min-height: 0;
}
.tube-scope {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: center;
}
.tube-scope b {
  display: block;
  font-family: var(--font-sans);
  font-size: clamp(14px, 1.3vw, 18px);
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
  text-transform: none;
}

.tube-shell {
  position: relative;
  flex: 1;
  min-height: 200px;
  background: var(--paper-2);
  border: 1.5px solid var(--rule);
  border-radius: 50px / 12px;
  border-bottom-left-radius: 50px;
  border-bottom-right-radius: 50px;
  overflow: hidden;
}
.tube-shell::before { /* glass highlight */
  content: '';
  position: absolute;
  left: 10%; top: 8px;
  width: 4px;
  height: 80%;
  background: oklch(1 0 0 / 0.5);
  border-radius: 2px;
  z-index: 4;
}
.tube-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}
.tube-readout {
  position: absolute;
  bottom: 8px; left: 0; right: 0;
  text-align: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: clamp(13px, 1.2vw, 17px);
  color: var(--ink);
  z-index: 5;
  letter-spacing: -0.01em;
  text-shadow: 0 0 6px rgba(255,255,255,0.8);
}

.tube-stats {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--ink-3);
  letter-spacing: 0.1em;
  text-align: center;
  text-transform: uppercase;
}
.tube-stats .out { color: var(--c-working); font-weight: 700; }
.tube-stats .hit { color: var(--c-done);   font-weight: 700; display: block; margin-top: 2px; }

/* ============================================================
   needConfirm — emergency klaxon
   ============================================================ */
#confirm {
  position: fixed; inset: 0;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background:
    repeating-linear-gradient(45deg,
      var(--c-confirm) 0px, var(--c-confirm) 40px,
      #1c0508 40px, #1c0508 80px);
  animation: alarm-bg 1.4s linear infinite;
  transition: opacity 0.4s;
}
#confirm.visible { opacity: 1; pointer-events: auto; }
@keyframes alarm-bg {
  from { background-position: 0 0; }
  to   { background-position: 80px 0; }
}

.confirm-inner {
  position: relative;
  background: var(--paper);
  border: 4px solid var(--ink);
  border-radius: 8px;
  padding: clamp(30px, 4vw, 60px) clamp(40px, 6vw, 100px);
  text-align: center;
  box-shadow: 8px 8px 0 var(--ink);
  animation: confirm-pop 0.5s cubic-bezier(.2,1.5,.4,1) backwards;
}
@keyframes confirm-pop {
  from { transform: translateY(40px) scale(0.85); opacity: 0; }
  to   { transform: none; opacity: 1; }
}

.confirm-eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-mono);
  font-size: clamp(11px, 1.1vw, 14px);
  letter-spacing: 0.3em;
  color: var(--c-confirm);
  padding: 6px 16px;
  border: 2px solid var(--c-confirm);
  border-radius: 4px;
  background: var(--paper);
  margin-bottom: clamp(18px, 2vw, 28px);
  text-transform: uppercase;
  font-weight: 700;
}
.confirm-text {
  font-family: var(--font-sans);
  font-size: clamp(80px, 13vw, 220px);
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.04em;
  line-height: 0.95;
  margin-bottom: clamp(20px, 3vw, 32px);
}
.confirm-list {
  display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.confirm-row {
  display: inline-flex; align-items: baseline; gap: 14px;
  padding: 8px 20px;
  border: 1.5px solid var(--ink);
  background: var(--paper-2);
  border-radius: 6px;
  animation: none;
}
@keyframes row-in {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: none; }
}
.confirm-name {
  font-size: clamp(18px, 2vw, 26px);
  font-weight: 600;
  color: var(--ink);
}
.confirm-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
}
.confirm-clock {
  position: absolute;
  top: clamp(20px, 2.4vw, 30px);
  right: clamp(24px, 2.6vw, 36px);
  font-family: var(--font-mono);
  font-size: clamp(20px, 2vw, 28px);
  font-weight: 700;
  color: var(--paper);
  background: var(--ink);
  padding: 6px 14px;
  border-radius: 4px;
  letter-spacing: -0.02em;
  z-index: 60;
}

/* error */
#error-overlay {
  position: fixed; inset: 0;
  background: var(--paper);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
  z-index: 60;
}
.err-title {
  font-size: clamp(22px, 2.4vw, 32px);
  font-weight: 700;
  color: var(--c-confirm);
  letter-spacing: -0.01em;
}
.err-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
}
</style>
</head>
<body>

<div id="stage">
  <header class="top">
    <div class="lab-id">
      <span class="big">CLAUDE LAB · 实验台</span>
      EXPERIMENT №<span id="exp-no">0001</span> · LIVE FEED
    </div>
    <div class="status-pill">
      <span id="g-dot" class="dot dot-idle"></span>
      <span id="g-label">IDLE</span>
      <span style="opacity:0.4">·</span>
      <span id="g-summary">无样本</span>
    </div>
    <div class="clock-area">
      <div class="clock" id="clock"><span>00</span><span class="colon">:</span><span>00</span></div>
      <div class="date" id="date">— —</div>
    </div>
  </header>

  <main class="body">
    <section class="tank">
      <div class="tank-label">SPECIMENS · 培养皿 A-01</div>
      <div class="tank-count"><span id="sess-count">0</span> SAMPLES</div>
      <div class="specimens" id="specimens">
        <div class="empty-tank">— specimen tray empty —</div>
      </div>
    </section>

    <aside class="tubes-rack">
      <div class="tube-col">
        <div class="tube-scope">TODAY<b>今日</b></div>
        <div class="tube-shell">
          <canvas class="tube-canvas" data-scope="today"></canvas>
          <div class="tube-readout" id="t-today-in">—</div>
        </div>
        <div class="tube-stats">
          IN · <span class="out" id="t-today-out">—</span> OUT<span class="hit" id="hit-today">缓存 —</span>
        </div>
      </div>

      <div class="tube-col">
        <div class="tube-scope">MONTH<b>本月</b></div>
        <div class="tube-shell">
          <canvas class="tube-canvas" data-scope="month"></canvas>
          <div class="tube-readout" id="t-month-in">—</div>
        </div>
        <div class="tube-stats">
          IN · <span class="out" id="t-month-out">—</span> OUT<span class="hit" id="hit-month">缓存 —</span>
        </div>
      </div>

      <div class="tube-col">
        <div class="tube-scope">TOTAL<b>累计</b></div>
        <div class="tube-shell">
          <canvas class="tube-canvas" data-scope="total"></canvas>
          <div class="tube-readout" id="t-total-in">—</div>
        </div>
        <div class="tube-stats">
          IN · <span class="out" id="t-total-out">—</span> OUT<span class="hit" id="hit-total">命中 —</span>
        </div>
      </div>
    </aside>
  </main>
</div>

<div id="confirm" aria-hidden="true">
  <div class="confirm-clock" id="confirm-clock">--:--</div>
  <div class="confirm-inner">
    <div class="confirm-eyebrow">⚠ ATTENTION REQUIRED · 等你拍板</div>
    <div class="confirm-text">等你拍板</div>
    <div class="confirm-list" id="confirm-list"></div>
  </div>
</div>

<div id="error-overlay">
  <div class="err-title">— 通讯链路中断 —</div>
  <div class="err-sub">CHECK WIFI · SERVER.PY</div>
</div>

<script src="_common.js"></script>
<script>
const C = window.StatusCommon;

// ───── Random experiment number on load ─────
document.getElementById('exp-no').textContent =
  String(Math.floor(Date.now() / 1000) % 10000).padStart(4, '0');

// ───── Clock ─────
function tickClock() {
  const now = new Date();
  const hh = C.pad2(now.getHours()), mm = C.pad2(now.getMinutes());
  document.getElementById('clock').innerHTML =
    `<span>${hh}</span><span class="colon">:</span><span>${mm}</span>`;
  document.getElementById('date').textContent = C.fmtDate(now);
  document.getElementById('confirm-clock').textContent = hh + ':' + mm;
}
tickClock();
setInterval(tickClock, 1000);

// ───── Specimens ─────
function hashId(id) {
  let h = 0; for (let i = 0; i < id.length; i++) h = ((h << 5) - h) + id.charCodeAt(i);
  return Math.abs(h);
}

function renderSpecimens(sessions, detail) {
  const wrap = document.getElementById('specimens');
  document.getElementById('sess-count').textContent = String(sessions.length).padStart(2,'0');

  if (!sessions.length) {
    wrap.innerHTML = '<div class="empty-tank">— specimen tray empty —</div>';
    return;
  }

  const dmap = {};
  (detail || []).forEach(d => { if (d.id) dmap[d.id] = d; });
  const sorted = C.sortSessions(sessions);
  const VIS = 6;
  const visible = sorted.slice(0, VIS);

  wrap.innerHTML = visible.map((s, i) => {
    const d = dmap[s.id] || {};
    const state = s.state || 'idle';
    const project = d.project || s.project || '未知样本';
    const tool = d.current_tool, target = d.current_target, prompt = d.last_prompt;
    const age = C.timeAgo(s.updated_at);
    const h = hashId(s.id || ('s'+i));

    const dur = (5.5 + (h % 30) / 10).toFixed(1) + 's';
    const fx  = ((h % 6) + 2);
    const rot = (0.2 + (h % 7) / 10).toFixed(2);
    const delay = (-(h % 50) / 10).toFixed(1) + 's';

    const toolHtml = tool
      ? `<div class="spec-tool"><span class="spec-tool-name">${C.esc(tool)}</span>${target?`<span class="spec-tool-target">${C.esc(target)}</span>`:''}</div>` : '';
    const promptHtml = prompt
      ? `<div class="spec-prompt">${C.esc(prompt)}</div>` : '';

    return `
      <div class="specimen state-${state}" style="--float-dur:${dur}; --float-x:${fx}; --rot:${rot}; animation-delay: ${i*70}ms, ${delay};">
        <span class="spec-tag tag-${state}"><span class="swatch"></span>${C.STATE_LABEL[state] || state}</span>
        <div class="spec-name">${C.esc(project)}</div>
        ${toolHtml}${promptHtml}
        <div class="spec-meta">
          <span>SAMPLE №${C.esc((s.id||'').slice(0,8))}</span>
          <span style="margin-left:auto">T+${age}</span>
        </div>
      </div>`;
  }).join('');
}

// ───── Top status ─────
function renderTop(gs, sessions) {
  document.getElementById('g-dot').className = 'dot dot-' + (gs || 'idle');
  document.getElementById('g-label').textContent = (C.STATE_LABEL[gs] || '空闲').toUpperCase();
  const counts = {};
  sessions.forEach(s => { counts[s.state] = (counts[s.state] || 0) + 1; });
  const total = sessions.length;
  const order = ['working','thinking','needConfirm','done','idle'];
  const parts = order.filter(k => counts[k]).map(k => `${counts[k]} ${k}`);
  const summary = total === 0 ? '无样本'
    : `${total} 样本` + (parts.length ? ` · ${parts.join(' · ')}` : '');
  document.getElementById('g-summary').textContent = summary;
}

function renderConfirm(sessions) {
  const list = sessions.filter(s => s.state === 'needConfirm');
  document.getElementById('confirm-list').innerHTML = list.map((s, i) => `
    <div class="confirm-row" style="animation-delay:${i*120}ms">
      <span class="confirm-name">${C.esc(s.project || '未知样本')}</span>
      <span class="confirm-id">№ ${C.esc((s.id||'').slice(0,8))}</span>
    </div>`).join('');
}

// ───── Tubes ─────
const tubeFills = { today: 0, month: 0, total: 0 };
const tubeTargets = { today: 0, month: 0, total: 0 };
const tubeColors = {
  today: { fill: '#7cb6cc', deep: '#2c8eb3' },
  month: { fill: '#f3b574', deep: '#ef8537' },
  total: { fill: '#8dcc9b', deep: '#4aa463' }
};
const tubeBubbles = { today: [], month: [], total: [] };

function initTubes() {
  document.querySelectorAll('.tube-canvas').forEach(c => {
    const scope = c.dataset.scope;
    function resize() {
      c.width  = c.offsetWidth  * devicePixelRatio;
      c.height = c.offsetHeight * devicePixelRatio;
    }
    resize();
    new ResizeObserver(resize).observe(c);

    const ctx = c.getContext('2d');
    const col = tubeColors[scope];

    function frame(t) {
      const w = c.width, h = c.height;
      ctx.clearRect(0, 0, w, h);

      // ease current fill toward target
      tubeFills[scope] += (tubeTargets[scope] - tubeFills[scope]) * 0.03;
      const fillRatio = Math.max(0.05, Math.min(0.95, tubeFills[scope]));
      const surfaceY = h * (1 - fillRatio);
      const amp = 4 * devicePixelRatio;

      // liquid body
      ctx.fillStyle = col.fill;
      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, surfaceY);
      for (let x = 0; x <= w; x += 4) {
        const y = surfaceY + Math.sin(x * 0.03 + t * 0.003) * amp;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fill();

      // surface highlight
      ctx.strokeStyle = col.deep;
      ctx.lineWidth = 1.5 * devicePixelRatio;
      ctx.beginPath();
      for (let x = 0; x <= w; x += 4) {
        const y = surfaceY + Math.sin(x * 0.03 + t * 0.003) * amp;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // bubbles
      if (Math.random() < 0.025 + fillRatio * 0.06) {
        tubeBubbles[scope].push({
          x: Math.random() * w,
          y: h - 6 * devicePixelRatio,
          r: (1 + Math.random() * 2) * devicePixelRatio,
          v: 0.3 + Math.random() * 0.7
        });
      }
      tubeBubbles[scope] = tubeBubbles[scope].filter(b => b.y > surfaceY);
      tubeBubbles[scope].forEach(b => {
        b.y -= b.v * devicePixelRatio;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
      });

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
}
initTubes();

// log-scale token amount → 0..1 fill
function toFill(n) {
  if (!n) return 0.05;
  const log = Math.log10(n);
  // map log [3..11] → [0.15..0.92]
  return Math.max(0.08, Math.min(0.92, (log - 3) / 8 * 0.77 + 0.15));
}

function setNum(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  const formatted = C.fmtTokens(val);
  if (el.textContent === formatted) return;
  el.style.transition = 'opacity .25s, transform .25s';
  el.style.opacity = '0'; el.style.transform = 'translateY(-2px)';
  setTimeout(() => { el.textContent = formatted; el.style.opacity = '1'; el.style.transform = 'none'; }, 220);
}
function renderTokens(data) {
  if (!data) return;
  const t = data.today || {}, m = data.month || {}, a = data.total || {};
  setNum('t-today-in', t.input); setNum('t-today-out', t.output);
  setNum('t-month-in', m.input); setNum('t-month-out', m.output);
  setNum('t-total-in', a.input); setNum('t-total-out', a.output);
  const th=C.hitRate(t),mh=C.hitRate(m),ah=C.hitRate(a);
  document.getElementById('hit-today').textContent = th!==null?`缓存 ${th}%`:'缓存 —';
  document.getElementById('hit-month').textContent = mh!==null?`缓存 ${mh}%`:'缓存 —';
  document.getElementById('hit-total').textContent = ah!==null?`命中 ${ah}%`:'命中 —';
  tubeTargets.today = toFill(t.input);
  tubeTargets.month = toFill(m.input);
  tubeTargets.total = toFill(a.input);
}

C.init({
  onState(cur, detail) {
    const gs = cur.global_state || 'idle';
    const sessions = cur.sessions || [];
    const isConfirm = gs === 'needConfirm';
    document.getElementById('stage').classList.toggle('hidden', isConfirm);
    document.getElementById('confirm').classList.toggle('visible', isConfirm);
    renderTop(gs, sessions);
    renderSpecimens(sessions, detail);
    renderConfirm(sessions);
    document.getElementById('error-overlay').style.display = 'none';
  },
  onTokens: renderTokens,
  onError(isErr) {
    document.getElementById('error-overlay').style.display = isErr ? 'flex' : 'none';
  }
});
</script>
